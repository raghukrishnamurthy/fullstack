transport_mode: ethernet-only
supported_port_ranges:
  uplinks:
    - fabric: "1"
      start: 33
      end: 36
  server_ports:
    - fabric: "1"
      start: 1
      end: 32

port_defaults:
  uplink_ports:
    default_mode: port-channel
  uplink_port_channels:
    default:
      - name: default-uplink-pc
        pc_id: 100
        member_ports:
          - "1/33"
          - "1/34"
        admin_speed: Auto
        fec: Auto
  server_ports:
    recommended_speed: Auto
    default_role: server

