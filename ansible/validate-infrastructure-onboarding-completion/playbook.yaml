---
- name: Validate infrastructure onboarding completion
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    default_intersight_query_rules_json: |
      {
        "Blade": {
          "resource_path": "/compute/PhysicalSummaries",
          "serial_field": "Serial",
          "discovery_field": "Lifecycle",
          "allowed_discovery_states": ["Active"]
        },
        "Rack": {
          "resource_path": "/compute/PhysicalSummaries",
          "serial_field": "Serial",
          "discovery_field": "ManagementMode",
          "allowed_discovery_states": ["IMM", "IntersightStandalone"]
        },
        "FabricInterconnect": {
          "resource_path": "/network/Elements",
          "serial_field": "Serial",
          "discovery_field": "Operability",
          "allowed_discovery_states": ["online"],
          "pair_validation": true
        }
      }
    discovery_model: "{{ discovery_model_json | from_json }}"
    onboarding_readiness: "{{ discovery_model.derived.onboarding_readiness | default({}) }}"
    onboarding_action_execution: "{{ discovery_model.derived.onboarding_action_execution | default({}) }}"
    initial_intersight_validation: "{{ discovery_model.derived.intersight_validation | default({}) }}"
    initial_placement_validation: "{{ discovery_model.derived.placement_validation | default({}) }}"
    baseline_expectation_validation: "{{ discovery_model.derived.baseline_expectation_validation | default({}) }}"
    platform_intersight: "{{ discovery_model.platform.intersight | default({}) }}"
    raw_platform: "{{ discovery_model.platform.raw_platform | default({}) }}"
    placement_intersight: "{{ discovery_model.placement.intersight | default({}) }}"
    inventory_devices: "{{ discovery_model.inventory.devices | default([]) }}"
    inventory_domains: "{{ discovery_model.inventory.domains | default([]) }}"
    claim_candidate_targets: "{{ onboarding_readiness.claim_candidate_targets | default([]) }}"
    reachability_only_targets: "{{ onboarding_readiness.reachability_only_targets | default([]) }}"
    claim_execution_results: "{{ onboarding_action_execution.claim_execution_results | default([]) }}"
    baseline_expectation_results: "{{ baseline_expectation_validation.results | default([]) }}"
    baseline_expectation_errors: "{{ baseline_expectation_validation.errors | default([]) }}"
    missing_devices: "{{ initial_intersight_validation.missing_devices | default([]) }}"
    not_ready_devices: "{{ initial_intersight_validation.not_ready_devices | default([]) }}"
    present_devices: "{{ initial_intersight_validation.present_devices | default([]) }}"
    live_validation_enabled: "{{ discovery_model.derived.intersight_live_validation_enabled | default(false) | bool }}"
    raw_intersight_endpoint: "{{ platform_intersight.endpoint | default('') | string | trim }}"
    derived_intersight_mode: "{{ platform_intersight.deployment_mode | default('saas') | string | lower }}"
    normalized_intersight_endpoint: "{{ raw_intersight_endpoint }}"
    effective_resource_group: "{{ placement_intersight.resource_group | default(placement_intersight.organization | default('')) }}"
    intersight_validate_certs: >-
      {{
        (raw_platform.intersight.validate_certs | default('false' if derived_intersight_mode == 'pva' else 'true') | string | lower)
        in ['true', '1', 'yes']
      }}
    intersight_query_rules: "{{ default_intersight_query_rules_json | from_json }}"
    api_key_id_ref: "{{ platform_intersight.credentials.api_key_id_ref | default('') }}"
    api_private_key_ref: "{{ platform_intersight.credentials.api_private_key_ref | default('') }}"
    api_key_id_env_name: "{{ (api_key_id_ref is string and api_key_id_ref.startswith('env://')) | ternary(api_key_id_ref | regex_replace('^env://', ''), '') }}"
    api_private_key_env_name: "{{ (api_private_key_ref is string and api_private_key_ref.startswith('env://')) | ternary(api_private_key_ref | regex_replace('^env://', ''), '') }}"
    resolved_api_key_id: "{{ lookup('ansible.builtin.env', api_key_id_env_name) if (api_key_id_env_name | length > 0) else '' }}"
    resolved_api_private_key: "{{ lookup('ansible.builtin.env', api_private_key_env_name) if (api_private_key_env_name | length > 0) else '' }}"
    wait_for_completion_normalized: "{{ (wait_for_completion | default('false') | string | lower) in ['true', '1', 'yes'] }}"
    validation_poll_interval_normalized: "{{ validation_poll_interval | default(60) | int }}"
    validation_timeout_seconds_normalized: "{{ validation_timeout_seconds | default(3600) | int }}"
    validation_max_attempts_normalized: >-
      {{
        1
        if not wait_for_completion_normalized
        else
        (
          ((validation_timeout_seconds_normalized | float) / (((validation_poll_interval_normalized | int) if (validation_poll_interval_normalized | int) > 0 else 1) | float))
          | round(0, 'ceil')
          | int
        ) + 1
      }}
    runtime_live_validation_capable: >-
      {{
        (normalized_intersight_endpoint | length > 0)
        and (resolved_api_key_id | string | trim | length > 0)
        and (resolved_api_private_key | string | trim | length > 0)
      }}

  pre_tasks:
    - name: Validate onboarding completion input contract
      ansible.builtin.assert:
        that:
          - discovery_model_json is defined
          - discovery_model_json | string | trim | length > 0
        fail_msg: "discovery_model_json is required"
      tags:
        - always
        - validate
        - precheck

    - name: Validate polling configuration inputs
      ansible.builtin.assert:
        that:
          - validation_poll_interval_normalized >= 0
          - validation_timeout_seconds_normalized >= 0
          - validation_max_attempts_normalized > 0
        fail_msg: "validation_poll_interval and validation_timeout_seconds must be 0 or greater"
      tags:
        - always
        - validate
        - precheck

  tasks:
    - name: Build live validation query batches
      ansible.builtin.set_fact:
        live_validation_device_batches: []
      tags:
        - validate
        - completion

    - name: Build blade readiness query batch for polling
      ansible.builtin.set_fact:
        live_validation_device_batches: "{{ live_validation_device_batches + [blade_batch] }}"
      vars:
        blade_serials: >-
          {{
            inventory_devices
            | selectattr('category', 'equalto', 'server')
            | selectattr('attributes.form_factor', 'defined')
            | selectattr('attributes.form_factor', 'equalto', 'blade')
            | selectattr('serial', 'defined')
            | map(attribute='serial')
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        blade_batch:
          category: Blade
          serial_numbers: "{{ blade_serials }}"
          rule: "{{ intersight_query_rules.Blade }}"
          serial_filter: "{{ blade_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      when: blade_serials | length > 0
      tags:
        - validate
        - completion

    - name: Build rack readiness query batch for polling
      ansible.builtin.set_fact:
        live_validation_device_batches: "{{ live_validation_device_batches + [rack_batch] }}"
      vars:
        rack_serials: >-
          {{
            inventory_devices
            | selectattr('category', 'equalto', 'server')
            | selectattr('attributes.form_factor', 'defined')
            | selectattr('attributes.form_factor', 'equalto', 'rack')
            | selectattr('serial', 'defined')
            | map(attribute='serial')
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        rack_batch:
          category: Rack
          serial_numbers: "{{ rack_serials }}"
          rule: "{{ intersight_query_rules.Rack }}"
          serial_filter: "{{ rack_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      when: rack_serials | length > 0
      tags:
        - validate
        - completion

    - name: Build FI pair readiness query batch for polling
      ansible.builtin.set_fact:
        live_validation_device_batches: "{{ live_validation_device_batches + [fi_batch] }}"
      vars:
        fi_serials: >-
          {{
            (
              inventory_devices
              | selectattr('serial', 'defined')
              | list
            )
            | json_query("[?contains(`" ~ ((item.members | default([])) | to_json) ~ "`, id)].serial")
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        fi_batch:
          category: FabricInterconnect
          domain_id: "{{ item.domain_id }}"
          serial_numbers: "{{ fi_serials }}"
          rule: "{{ intersight_query_rules.FabricInterconnect }}"
          serial_filter: "{{ fi_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      loop: "{{ inventory_domains | selectattr('type', 'defined') | selectattr('type', 'equalto', 'fi_pair') | list }}"
      loop_control:
        label: "{{ item.domain_id }}"
      when: fi_serials | length > 0
      tags:
        - validate
        - completion

    - name: Initialize live completion polling facts
      ansible.builtin.set_fact:
        completion_polling_done: false
        polled_present_devices: "{{ present_devices }}"
        polled_missing_devices: "{{ missing_devices }}"
        polled_not_ready_devices: "{{ not_ready_devices }}"
        polled_fi_pair_validation_errors: []
        polled_placement_validation: "{{ initial_placement_validation }}"
        live_validation_attempt_summary:
          requested: "{{ wait_for_completion_normalized }}"
          runtime_capable: "{{ runtime_live_validation_capable }}"
          poll_interval_seconds: "{{ validation_poll_interval_normalized }}"
          timeout_seconds: "{{ validation_timeout_seconds_normalized }}"
          max_attempts: "{{ validation_max_attempts_normalized }}"
          attempts_executed: 0
          completed: false
      tags:
        - validate
        - completion

    - name: Poll live Intersight readiness until completion or timeout
      ansible.builtin.include_tasks: tasks/poll_live_completion_pass.yaml
      loop: "{{ range(1, (validation_max_attempts_normalized | int) + 1) | list }}"
      loop_control:
        label: "attempt {{ item }}"
      vars:
        readiness_attempt_number: "{{ item }}"
      when:
        - runtime_live_validation_capable
        - wait_for_completion_normalized or live_validation_enabled
        - not (completion_polling_done | default(false))
      tags:
        - validate
        - completion

    - name: Summarize claim execution outcomes
      ansible.builtin.set_fact:
        successful_claim_results: >-
          {{
            claim_execution_results
            | selectattr('status', 'defined')
            | selectattr('status', 'in', ['submitted', 'already_claimed', 'already_compliant'])
            | list
          }}
        blocking_claim_results: >-
          {{
            claim_execution_results
            | selectattr('status', 'defined')
            | rejectattr('status', 'in', ['submitted', 'already_claimed', 'already_compliant', 'not_applicable'])
            | list
          }}
      tags:
        - validate
        - completion

    - name: Build onboarding completeness lists
      ansible.builtin.set_fact:
        onboarding_present_devices: "{{ polled_present_devices | default(present_devices) }}"
        onboarding_missing_devices: "{{ polled_missing_devices | default(missing_devices) }}"
        onboarding_not_ready_devices: "{{ polled_not_ready_devices | default(not_ready_devices) }}"
        onboarding_completeness_checks:
          expected_claimable_target_count: "{{ claim_candidate_targets | length }}"
          expected_reachability_only_target_count: "{{ reachability_only_targets | length }}"
          present_device_count: "{{ (polled_present_devices | default(present_devices)) | length }}"
          missing_device_count: "{{ (polled_missing_devices | default(missing_devices)) | length }}"
          not_ready_device_count: "{{ (polled_not_ready_devices | default(not_ready_devices)) | length }}"
          baseline_expectation_error_count: "{{ baseline_expectation_errors | length }}"
          baseline_expectation_result_count: "{{ baseline_expectation_results | length }}"
          wait_for_completion_requested: "{{ wait_for_completion_normalized }}"
          wait_attempts_executed: "{{ live_validation_attempt_summary.attempts_executed | default(0) }}"
      tags:
        - validate
        - completion

    - name: Build onboarding completion result
      ansible.builtin.set_fact:
        onboarding_completion:
          ready: "{{ completion_ready }}"
          status: "{{ completion_status }}"
          next_action: "{{ completion_next_action }}"
          blockers: "{{ completion_blockers }}"
          readiness_success: "{{ completion_ready }}"
          summary:
            claim_candidate_count: "{{ claim_candidate_targets | length }}"
            reachability_only_target_count: "{{ reachability_only_targets | length }}"
            successful_claim_result_count: "{{ successful_claim_results | length }}"
            blocking_claim_result_count: "{{ blocking_claim_results | length }}"
            live_validation_enabled: "{{ effective_live_validation_enabled }}"
            present_device_count: "{{ onboarding_present_devices | length }}"
            missing_device_count: "{{ onboarding_missing_devices | length }}"
            not_ready_device_count: "{{ onboarding_not_ready_devices | length }}"
            baseline_expectation_error_count: "{{ baseline_expectation_errors | length }}"
          device_readiness:
            present_devices: "{{ onboarding_present_devices }}"
            missing_devices: "{{ onboarding_missing_devices }}"
            not_ready_devices: "{{ onboarding_not_ready_devices }}"
            fi_pair_errors: "{{ polled_fi_pair_validation_errors | default([]) }}"
          baseline_expectation_validation:
            results: "{{ baseline_expectation_results }}"
            errors: "{{ baseline_expectation_errors }}"
          source_checks:
            preflight_status: "{{ onboarding_readiness.status | default('unknown') }}"
            preflight_ready: "{{ onboarding_readiness.ready | default(false) | bool }}"
            action_requested: "{{ onboarding_action_execution.requested | default(false) | bool }}"
            action_status: "{{ onboarding_action_execution.status | default('not_requested') }}"
            placement_ready: "{{ effective_placement_ready }}"
            baseline_expectation_error_count: "{{ baseline_expectation_errors | length }}"
            device_readiness_available: "{{ effective_live_validation_enabled }}"
            wait_for_completion_requested: "{{ wait_for_completion_normalized }}"
            wait_attempt_summary: "{{ live_validation_attempt_summary }}"
            completeness_check_summary: "{{ onboarding_completeness_checks }}"
      vars:
        preflight_ready: "{{ onboarding_readiness.ready | default(false) | bool }}"
        preflight_status: "{{ onboarding_readiness.status | default('unknown') | string }}"
        action_requested: "{{ onboarding_action_execution.requested | default(false) | bool }}"
        baseline_expectations_passed: "{{ (baseline_expectation_errors | length) == 0 }}"
        effective_live_validation_enabled: "{{ runtime_live_validation_capable or live_validation_enabled }}"
        effective_placement_ready: "{{ (polled_placement_validation | default(initial_placement_validation)).ready | default(true) | bool }}"
        live_completion_ready: >-
          {{
            effective_live_validation_enabled
            and (onboarding_missing_devices | length == 0)
            and (onboarding_not_ready_devices | length == 0)
            and ((polled_fi_pair_validation_errors | default([])) | length == 0)
            and effective_placement_ready
            and baseline_expectations_passed
            and preflight_ready
          }}
        claim_submission_succeeded: >-
          {{
            action_requested
            and (claim_candidate_targets | length > 0)
            and (blocking_claim_results | length == 0)
            and (successful_claim_results | length > 0)
          }}
        completion_blockers: >-
          {%- set blockers = [] -%}
          {%- if not preflight_ready -%}
          {%- for blocker in (onboarding_readiness.blockers | default([])) -%}
          {%- set _ = blockers.append(blocker) -%}
          {%- endfor -%}
          {%- endif -%}
          {%- if baseline_expectation_errors | length > 0 -%}
          {%- for blocker in baseline_expectation_errors -%}
          {%- set _ = blockers.append(blocker.message | default(blocker | string)) -%}
          {%- endfor -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and not effective_placement_ready -%}
          {%- for blocker in ((polled_placement_validation | default(initial_placement_validation)).errors | default([])) -%}
          {%- set _ = blockers.append(blocker) -%}
          {%- endfor -%}
          {%- endif -%}
          {%- if action_requested and (blocking_claim_results | length > 0) -%}
          {%- set _ = blockers.append('One or more onboarding claim actions ended in a blocking state') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_claim_results | length == 0) and (successful_claim_results | length == 0) and ((claim_candidate_targets | length) > 0) -%}
          {%- set _ = blockers.append('Onboarding apply was requested, but no successful claim-capable action results were produced') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (onboarding_missing_devices | length > 0) -%}
          {%- set _ = blockers.append('One or more expected devices are still missing from the Intersight readiness view') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (onboarding_not_ready_devices | length > 0) -%}
          {%- set _ = blockers.append('One or more discovered devices are present but not yet ready in Intersight') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (((polled_fi_pair_validation_errors | default([])) | length) > 0) -%}
          {%- set _ = blockers.append('Fabric Interconnect pair validation has not yet settled in Intersight') -%}
          {%- endif -%}
          {%- if wait_for_completion_normalized and runtime_live_validation_capable and not live_completion_ready and not (live_validation_attempt_summary.completed | default(false) | bool) -%}
          {%- set _ = blockers.append('Validation polling reached the configured timeout before onboarding completed') -%}
          {%- endif -%}
          {%- if (not action_requested) and preflight_ready and (not live_completion_ready) -%}
          {%- set _ = blockers.append('Onboarding actions have not been executed or verified complete for all claim-capable targets') -%}
          {%- endif -%}
          {{ blockers }}
        completion_ready: "{{ live_completion_ready }}"
        completion_status: >-
          {{
            'completed'
            if live_completion_ready
            else 'needs_live_validation'
            if (preflight_status == 'needs_live_validation')
            else 'fix_baseline_expectations'
            if (baseline_expectation_errors | length > 0)
            else preflight_status
            if ((not preflight_ready) and (preflight_status | length > 0) and (preflight_status != 'blocked'))
            else 'blocked'
            if (completion_blockers | length > 0 and not preflight_ready)
            else 'action_failed'
            if (action_requested and (blocking_claim_results | length > 0))
            else 'onboarding_submitted'
            if claim_submission_succeeded
            else 'ready_for_execution'
            if preflight_ready
            else 'blocked'
          }}
        completion_next_action: >-
          {{
            'proceed_to_infrastructure_network_provisioning'
            if live_completion_ready
            else 'run_live_intersight_validation'
            if (completion_status == 'needs_live_validation')
            else 'fix_baseline_expectations'
            if (completion_status == 'fix_baseline_expectations')
            else 'review_validation_results'
            if (completion_status == 'blocked')
            else 'review_claim_failures'
            if (completion_status == 'action_failed')
            else 'wait_for_intersight_management_settlement'
            if (completion_status == 'onboarding_submitted')
            else 'run_onboarding_apply'
          }}
      tags:
        - validate
        - completion

  post_tasks:
    - name: Validate onboarding completion output contract
      ansible.builtin.assert:
        that:
          - onboarding_completion is defined
          - onboarding_completion.status is defined
          - onboarding_completion.next_action is defined
        fail_msg: "validate-infrastructure-onboarding-completion did not produce the expected output contract"
      tags:
        - always
        - verify

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          phase_ready: "{{ 'true' if (onboarding_completion.ready | bool) else 'false' }}"
          phase_status: "{{ onboarding_completion.status }}"
          phase_readiness_json: "{{ onboarding_completion | to_json }}"
      delegate_to: localhost
      run_once: true
      tags: always
      ignore_errors: true
