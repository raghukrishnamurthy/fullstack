---
- name: Validate infrastructure onboarding completion
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    default_intersight_query_rules_json: |
      {
        "Rack": {
          "resource_path": "/compute/PhysicalSummaries",
          "serial_field": "Serial",
          "discovery_field": "ManagementMode",
          "allowed_discovery_states": ["IMM", "IntersightStandalone"]
        },
        "FabricInterconnect": {
          "resource_path": "/network/Elements",
          "serial_field": "Serial",
          "discovery_field": "Operability",
          "allowed_discovery_states": ["online"],
          "pair_validation": true
        }
      }
    discovery_model: "{{ (discovery_model_json | from_json) if (discovery_model_json | default('') | string | trim | length > 0) else {} }}"
    platform_root: "{{ (platform_yaml | from_yaml) if (platform_yaml | default('') | string | trim | length > 0) else {} }}"
    platform_data: "{{ platform_root.platform | default(platform_root) }}"
    inventory_root: "{{ (inventory_yaml | from_yaml) if (inventory_yaml | default('') | string | trim | length > 0) else {} }}"
    inventory_data: "{{ inventory_root.inventory | default(inventory_root) }}"
    onboarding_action_execution: >-
      {{
        discovery_model.derived.onboarding_action_execution
        | default({})
        if (discovery_model | length) > 0
        else {}
      }}
    platform_intersight: >-
      {{
        discovery_model.platform.intersight
        | default({})
        if (discovery_model | length) > 0
        else (platform_data.intersight | default({}))
      }}
    raw_platform: >-
      {{
        discovery_model.platform.raw_platform
        | default({})
        if (discovery_model | length) > 0
        else platform_data
      }}
    inventory_devices: >-
      {{
        discovery_model.inventory.devices
        | default([])
        if (discovery_model | length) > 0
        else (inventory_data.devices | default([]))
      }}
    inventory_domains: >-
      {{
        discovery_model.inventory.domains
        | default([])
        if (discovery_model | length) > 0
        else (inventory_data.domains | default([]))
      }}
    inventory_storage: >-
      {{
        discovery_model.inventory.storage
        | default([])
        if (discovery_model | length) > 0
        else (inventory_data.storage | default([]))
      }}
    claim_execution_results_input: "{{ claim_execution_results_json | default('') }}"
    claim_execution_results: >-
      {{
        (
          claim_execution_results_input
          if (claim_execution_results_input is not string)
          else ((claim_execution_results_input | from_json) if (claim_execution_results_input | string | trim | length > 0) else [])
        )
        if (claim_execution_results_input | default('') | string | trim | length) > 0
        else (onboarding_action_execution.claim_execution_results | default([]))
      }}
    live_validation_enabled: >-
      {{
        discovery_model.derived.intersight_live_validation_enabled | default(false) | bool
        if (discovery_model | length) > 0
        else true
      }}
    raw_intersight_endpoint: "{{ platform_intersight.endpoint | default('') | string | trim }}"
    derived_intersight_mode: "{{ platform_intersight.deployment_mode | default('saas') | string | lower }}"
    normalized_intersight_endpoint: "{{ raw_intersight_endpoint }}"
    intersight_validate_certs: >-
      {{
        (raw_platform.intersight.validate_certs | default('false' if derived_intersight_mode == 'pva' else 'true') | string | lower)
        in ['true', '1', 'yes']
      }}
    intersight_query_rules: "{{ default_intersight_query_rules_json | from_json }}"
    api_key_id_direct: "{{ platform_intersight.credentials.api_key_id | default('') | string | trim }}"
    api_private_key_direct: "{{ platform_intersight.credentials.api_private_key | default('') | string }}"
    api_key_id_ref: "{{ platform_intersight.credentials.api_key_id_ref | default('') }}"
    api_private_key_ref: "{{ platform_intersight.credentials.api_private_key_ref | default('') }}"
    wait_for_completion_requested: "{{ wait_for_completion | default('false') }}"
    validation_poll_interval_requested: "{{ validation_poll_interval | default(60) }}"
    validation_timeout_seconds_requested: "{{ validation_timeout_seconds | default(3600) }}"
    runtime_live_validation_capable: >-
      {{
        (normalized_intersight_endpoint | length > 0)
        and (resolved_api_key_id | string | trim | length > 0)
        and (resolved_api_private_key | string | trim | length > 0)
      }}
    direct_rack_inventory_devices: >-
      {{
        inventory_devices
        | selectattr('category', 'equalto', 'server')
        | selectattr('mgmt_ip', 'defined')
        | selectattr('mgmt_ip', 'truthy')
        | selectattr('attributes.form_factor', 'defined')
        | selectattr('attributes.form_factor', 'equalto', 'rack')
        | selectattr('attributes.management_type', 'defined')
        | selectattr('attributes.management_type', 'equalto', 'standalone')
        | list
      }}
    direct_rack_serials: >-
      {{
        direct_rack_inventory_devices
        | map(attribute='serial')
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}
    direct_fi_pair_domains: >-
      {{
        inventory_domains
        | selectattr('type', 'defined')
        | selectattr('type', 'equalto', 'fi_pair')
        | list
      }}
    direct_fi_pair_serials: >-
      {{
        (
          inventory_devices
          | selectattr('category', 'equalto', 'fabric_interconnect')
          | selectattr('serial', 'defined')
          | map(attribute='serial')
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
        )
      }}
    direct_target_serials: "{{ (direct_rack_serials + direct_fi_pair_serials) | unique | list }}"
    direct_target_categories:
      - Rack
      - FabricInterconnect
    expected_direct_claim_target_count: "{{ (direct_fi_pair_domains | length) + (direct_rack_serials | length) }}"
    assist_managed_storage_inventory: >-
      {{
        inventory_storage
        | selectattr('assist', 'defined')
        | selectattr('assist', 'truthy')
        | list
      }}
    expected_storage_claim_target_ids: >-
      {{
        assist_managed_storage_inventory
        | map(attribute='id')
        | map('default', '')
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | list
      }}
    expected_storage_claim_target_count: "{{ expected_storage_claim_target_ids | length }}"
    present_direct_rack_count: "{{ polled_present_devices | default([]) | selectattr('category', 'equalto', 'Rack') | list | length }}"
    present_direct_fi_pair_count: >-
      {{
        direct_fi_pair_domains | length
        if ((polled_fi_pair_validation_errors | default([]) | length) == 0)
        and (
          (
            polled_present_devices | default([])
            | selectattr('category', 'equalto', 'FabricInterconnect')
            | map(attribute='serial')
            | list
          ) | length
        ) == (direct_fi_pair_serials | length)
        else 0
      }}
    present_direct_target_count: "{{ (present_direct_rack_count | int) + (present_direct_fi_pair_count | int) }}"

  pre_tasks:
    - name: Resolve shared Intersight API key id secret
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../shared/tasks/lib_resolve_secret_value.yaml"
      vars:
        secret_value_direct: "{{ api_key_id_direct }}"
        secret_value_ref: "{{ api_key_id_ref }}"
        secret_resolved_fact_name: resolved_api_key_id
        secret_ref_fact_name: resolved_api_key_id_ref_normalized
        secret_env_name_fact_name: resolved_api_key_id_env_name
        secret_file_path_fact_name: resolved_api_key_id_file_path
        secret_source_fact_name: resolved_api_key_id_source
      tags:
        - always
        - validate
        - precheck

    - name: Resolve shared Intersight API private key secret
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../shared/tasks/lib_resolve_secret_value.yaml"
      vars:
        secret_value_direct: "{{ api_private_key_direct }}"
        secret_value_ref: "{{ api_private_key_ref }}"
        secret_resolved_fact_name: resolved_api_private_key
        secret_ref_fact_name: resolved_api_private_key_ref_normalized
        secret_env_name_fact_name: resolved_api_private_key_env_name
        secret_file_path_fact_name: resolved_api_private_key_file_path
        secret_source_fact_name: resolved_api_private_key_source
      tags:
        - always
        - validate
        - precheck

    - name: Normalize polling configuration inputs
      ansible.builtin.set_fact:
        wait_for_completion_normalized: "{{ (wait_for_completion_requested | string | lower) in ['true', '1', 'yes'] }}"
        validation_poll_interval_normalized: "{{ validation_poll_interval_requested | int }}"
        validation_timeout_seconds_normalized: "{{ validation_timeout_seconds_requested | int }}"
      tags:
        - always
        - validate
        - precheck

    - name: Compute max validation attempts
      ansible.builtin.set_fact:
        validation_max_attempts_normalized: >-
          {{
            1
            if not wait_for_completion_normalized
            else
            (
              ((validation_timeout_seconds_normalized | float) / (((validation_poll_interval_normalized | int) if (validation_poll_interval_normalized | int) > 0 else 1) | float))
              | round(0, 'ceil')
              | int
            ) + 1
          }}
      tags:
        - always
        - validate
        - precheck

    - name: Validate onboarding completion input contract
      ansible.builtin.assert:
        that:
          - >
            (
              discovery_model_json is defined
              and discovery_model_json | string | trim | length > 0
            )
            or
            (
              platform_yaml is defined
              and platform_yaml | string | trim | length > 0
              and inventory_yaml is defined
              and inventory_yaml | string | trim | length > 0
            )
        fail_msg: "validate-infrastructure-onboarding requires discovery_model_json or raw platform_yaml plus inventory_yaml"
      tags:
        - always
        - validate
        - precheck

    - name: Validate polling configuration inputs
      ansible.builtin.assert:
        that:
          - (validation_poll_interval_normalized | int) >= 0
          - (validation_timeout_seconds_normalized | int) >= 0
          - (validation_max_attempts_normalized | int) > 0
        fail_msg: "validation_poll_interval and validation_timeout_seconds must be 0 or greater"
      tags:
        - always
        - validate
        - precheck

  tasks:
    - name: Build live validation query batches
      ansible.builtin.set_fact:
        live_validation_device_batches: []
      tags:
        - validate
        - completion

    - name: Build rack readiness query batch for polling
      ansible.builtin.set_fact:
        live_validation_device_batches: "{{ live_validation_device_batches + [rack_batch] }}"
      vars:
        rack_batch:
          category: Rack
          serial_numbers: "{{ direct_rack_serials }}"
          rule: "{{ intersight_query_rules.Rack }}"
          serial_filter: "{{ direct_rack_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      when: direct_rack_serials | length > 0
      tags:
        - validate
        - completion

    - name: Build FI pair readiness query batch for polling
      ansible.builtin.set_fact:
        live_validation_device_batches: "{{ live_validation_device_batches + [fi_batch] }}"
      vars:
        fi_serials: >-
          {{
            (
              inventory_devices
              | selectattr('id', 'defined')
              | selectattr('id', 'in', (item.members | default([])))
              | selectattr('serial', 'defined')
              | map(attribute='serial')
              | list
            )
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        fi_batch:
          category: FabricInterconnect
          domain_id: "{{ item.domain_id }}"
          serial_numbers: "{{ fi_serials }}"
          rule: "{{ intersight_query_rules.FabricInterconnect }}"
          serial_filter: "{{ fi_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      loop: "{{ inventory_domains | selectattr('type', 'defined') | selectattr('type', 'equalto', 'fi_pair') | list }}"
      loop_control:
        label: "{{ item.domain_id }}"
      when: fi_serials | length > 0
      tags:
        - validate
        - completion

    - name: Initialize live completion polling facts
      ansible.builtin.set_fact:
        completion_polling_done: false
        polled_present_devices: []
        polled_missing_devices: []
        polled_not_ready_devices: []
        polled_fi_pair_validation_errors: []
        polled_placement_validation:
          ready: true
          errors: []
        live_validation_attempt_summary:
          requested: "{{ wait_for_completion_normalized }}"
          runtime_capable: "{{ runtime_live_validation_capable }}"
          poll_interval_seconds: "{{ validation_poll_interval_normalized }}"
          timeout_seconds: "{{ validation_timeout_seconds_normalized }}"
          max_attempts: "{{ validation_max_attempts_normalized }}"
          attempts_executed: 0
          completed: false
      tags:
        - validate
        - completion

    - name: Poll live Intersight readiness until completion or timeout
      ansible.builtin.include_tasks: tasks/poll_live_completion_pass.yaml
      loop: "{{ range(1, (validation_max_attempts_normalized | int) + 1) | list }}"
      loop_control:
        label: "attempt {{ item }}"
      vars:
        readiness_attempt_number: "{{ item }}"
      when:
        - runtime_live_validation_capable
        - wait_for_completion_normalized or live_validation_enabled
        - not (completion_polling_done | default(false))
      tags:
        - validate
        - completion

    - name: Filter direct-target claim execution outcomes
      ansible.builtin.set_fact:
        direct_claim_execution_results: >-
          {{
            (claim_execution_results | default([]))
            | selectattr('serial', 'defined')
            | selectattr('serial', 'in', direct_target_serials)
            | list
          }}
      tags:
        - validate
        - completion

    - name: Summarize claim execution outcomes
      ansible.builtin.set_fact:
        successful_claim_results: >-
          {{
            direct_claim_execution_results
            | selectattr('status', 'defined')
            | selectattr('status', 'in', ['successful', 'submitted', 'already_claimed', 'already_compliant'])
            | list
          }}
        blocking_claim_results: >-
          {{
            direct_claim_execution_results
            | selectattr('status', 'defined')
            | rejectattr('status', 'in', ['successful', 'submitted', 'already_claimed', 'already_compliant', 'not_applicable'])
            | list
          }}
        storage_claim_execution_results: >-
          {{
            (claim_execution_results | default([]))
            | selectattr('target_category', 'defined')
            | selectattr('target_category', 'equalto', 'storage')
            | selectattr('management_type', 'defined')
            | selectattr('management_type', 'equalto', 'assist_managed')
            | list
          }}
        successful_storage_claim_results: >-
          {{
            storage_claim_execution_results
            | selectattr('status', 'defined')
            | selectattr('status', 'in', ['successful', 'submitted', 'already_claimed', 'already_compliant'])
            | list
          }}
        blocking_storage_claim_results: >-
          {{
            storage_claim_execution_results
            | selectattr('status', 'defined')
            | rejectattr('status', 'in', ['successful', 'submitted', 'already_claimed', 'already_compliant', 'not_applicable'])
            | list
          }}
      tags:
        - validate
        - completion

    - name: Build simplified onboarding completion result
      ansible.builtin.set_fact:
        onboarding_completion:
          ready: "{{ completion_ready }}"
          status: "{{ completion_status }}"
          next_action: "{{ completion_next_action }}"
          blockers: "{{ completion_blockers }}"
          readiness_success: "{{ completion_ready }}"
          summary:
            direct_fi_pair_count: "{{ direct_fi_pair_domains | length }}"
            direct_rack_count: "{{ direct_rack_serials | length }}"
            direct_target_count: "{{ expected_direct_claim_target_count }}"
            successful_claim_result_count: "{{ successful_claim_results | length }}"
            blocking_claim_result_count: "{{ blocking_claim_results | length }}"
            storage_target_count: "{{ expected_storage_claim_target_count }}"
            successful_storage_claim_result_count: "{{ successful_storage_claim_results | length }}"
            blocking_storage_claim_result_count: "{{ blocking_storage_claim_results | length }}"
            live_validation_enabled: "{{ effective_live_validation_enabled }}"
            present_direct_target_count: "{{ present_direct_target_count }}"
            present_direct_rack_count: "{{ present_direct_rack_count }}"
            present_direct_fi_pair_count: "{{ present_direct_fi_pair_count }}"
            present_device_count: "{{ polled_present_devices | length }}"
            missing_device_count: "{{ polled_missing_devices | length }}"
            not_ready_device_count: "{{ polled_not_ready_devices | length }}"
          device_readiness:
            present_devices: "{{ polled_present_devices }}"
            missing_devices: "{{ polled_missing_devices }}"
            not_ready_devices: "{{ polled_not_ready_devices }}"
            fi_pair_errors: "{{ polled_fi_pair_validation_errors | default([]) }}"
          claim_execution:
            direct_results: "{{ direct_claim_execution_results }}"
            storage_results: "{{ storage_claim_execution_results }}"
          source_checks:
            action_requested: "{{ action_requested }}"
            action_status: "{{ onboarding_action_execution.status | default('not_requested') }}"
            device_readiness_available: "{{ effective_live_validation_enabled }}"
            wait_for_completion_requested: "{{ wait_for_completion_normalized }}"
            wait_attempt_summary: "{{ live_validation_attempt_summary }}"
      vars:
        action_requested: "{{ onboarding_action_execution.requested | default(false) | bool }}"
        effective_live_validation_enabled: "{{ runtime_live_validation_capable or live_validation_enabled }}"
        live_completion_ready: >-
          {{
            effective_live_validation_enabled
            and (polled_missing_devices | length == 0)
            and (polled_not_ready_devices | length == 0)
            and ((polled_fi_pair_validation_errors | default([])) | length == 0)
          }}
        direct_claims_ready: >-
          {{
            (not action_requested)
            or
            (
              (blocking_claim_results | length == 0)
              and (
                (expected_direct_claim_target_count | int) == 0
                or (successful_claim_results | length) >= (expected_direct_claim_target_count | int)
              )
            )
          }}
        storage_claims_ready: >-
          {{
            (not action_requested)
            or
            (
              (blocking_storage_claim_results | length == 0)
              and (
                (expected_storage_claim_target_count | int) == 0
                or (successful_storage_claim_results | length) >= (expected_storage_claim_target_count | int)
              )
            )
          }}
        completion_blockers: >-
          {%- set blockers = [] -%}
          {%- if action_requested and (blocking_claim_results | length > 0) -%}
          {%- set _ = blockers.append('One or more onboarding claim actions ended in a blocking state') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_claim_results | length == 0) and (successful_claim_results | length == 0) and (expected_direct_claim_target_count | int > 0) -%}
          {%- set _ = blockers.append('Onboarding apply was requested, but no successful direct-target claim results were produced') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_claim_results | length == 0) and (successful_claim_results | length > 0) and ((successful_claim_results | length) < (expected_direct_claim_target_count | int)) -%}
          {%- set _ = blockers.append('Onboarding apply did not produce successful claim results for every direct target') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_storage_claim_results | length > 0) -%}
          {%- set _ = blockers.append('One or more Assist-managed storage claims ended in a blocking state') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_storage_claim_results | length == 0) and (expected_storage_claim_target_count | int > 0) and (successful_storage_claim_results | length == 0) -%}
          {%- set _ = blockers.append('Onboarding apply was requested, but no successful Assist-managed storage claim results were produced') -%}
          {%- endif -%}
          {%- if action_requested and (blocking_storage_claim_results | length == 0) and ((successful_storage_claim_results | length) < (expected_storage_claim_target_count | int)) and (expected_storage_claim_target_count | int > 0) -%}
          {%- set _ = blockers.append('Onboarding apply did not produce successful claim results for every Assist-managed storage target') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (polled_missing_devices | length > 0) -%}
          {%- set _ = blockers.append('One or more direct onboarding targets are still missing from the Intersight readiness view') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (polled_not_ready_devices | length > 0) -%}
          {%- set _ = blockers.append('One or more direct onboarding targets are present but not yet ready in Intersight') -%}
          {%- endif -%}
          {%- if effective_live_validation_enabled and (((polled_fi_pair_validation_errors | default([])) | length) > 0) -%}
          {%- set _ = blockers.append('Fabric Interconnect pair validation has not yet settled in Intersight') -%}
          {%- endif -%}
          {%- if wait_for_completion_normalized and runtime_live_validation_capable and not live_completion_ready and not (live_validation_attempt_summary.completed | default(false) | bool) -%}
          {%- set _ = blockers.append('Validation polling reached the configured timeout before direct onboarding targets completed') -%}
          {%- endif -%}
          {%- if (not action_requested) and (not live_completion_ready) -%}
          {%- set _ = blockers.append('Onboarding actions have not been executed or verified complete for all direct targets') -%}
          {%- endif -%}
          {{ blockers }}
        completion_ready: "{{ live_completion_ready and direct_claims_ready and storage_claims_ready }}"
        completion_status: >-
          {{
            'completed'
            if (live_completion_ready and direct_claims_ready and storage_claims_ready)
            else 'action_failed'
            if (action_requested and ((blocking_claim_results | length > 0) or (blocking_storage_claim_results | length > 0)))
            else 'onboarding_submitted'
            if action_requested
            else 'blocked'
          }}
        completion_next_action: >-
          {{
            'proceed_to_infrastructure_network_provisioning'
            if live_completion_ready
            else 'review_claim_failures'
            if (completion_status == 'action_failed')
            else 'wait_for_intersight_management_settlement'
            if (completion_status == 'onboarding_submitted')
            else 'run_onboarding_apply'
          }}
      tags:
        - validate
        - completion

  post_tasks:
    - name: Validate onboarding completion output contract
      ansible.builtin.assert:
        that:
          - onboarding_completion is defined
          - onboarding_completion.status is defined
          - onboarding_completion.next_action is defined
        fail_msg: "validate-infrastructure-onboarding did not produce the expected output contract"
      tags:
        - always
        - verify

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          phase_ready: "{{ 'true' if (onboarding_completion.ready | bool) else 'false' }}"
          phase_status: "{{ onboarding_completion.status }}"
          phase_readiness_json: "{{ onboarding_completion | to_json }}"
      delegate_to: localhost
      run_once: true
      tags: always
      ignore_errors: true
