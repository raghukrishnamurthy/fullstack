---
- name: Resolve deployment model teardown
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Build no-op destroy result
      ansible.builtin.set_fact:
        destroy_status: successful
        destroy_results_json: >-
          {{
            [
              {
                "status": "skipped",
                "reason": "noop_destroy_behavior",
                "messages": [
                  "build-infrastructure-domain-model does not create or mutate remote resources"
                ]
              }
            ] | to_json
          }}
      tags:
        - always
        - teardown

    - name: Export destroy outputs
      torque.collections.export_torque_outputs:
        outputs:
          destroy_status: "{{ destroy_status }}"
          destroy_results_json: "{{ destroy_results_json }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - teardown
        - outputs
