---
- name: Resolve direct per-target credential presence
  ansible.builtin.set_fact:
    target_has_direct_claim_credentials: >-
      {{
        (claim_target.claim_username | default('') | string | trim | length) > 0
        and (
          (claim_target.claim_password_ref | default('') | string | trim | length) > 0
          or (claim_target.claim_password | default('') | string | trim | length) > 0
        )
      }}
  tags:
    - configure
    - verify

- name: Resolve per-device credential from serial-keyed bundle
  ansible.builtin.set_fact:
    bundle_per_device_credential: >-
      {{
        (
          (
            device_credentials_bundle.per_device
            | default({})
          )
          [
            claim_target.serial | default('')
          ]
        )
        if (
          (claim_target.serial | default('') | string | trim | length) > 0
          and (
            device_credentials_bundle.per_device
            | default({})
          ) is mapping
          and (
            claim_target.serial | default('')
          ) in (
            device_credentials_bundle.per_device
            | default({})
          )
        )
        else {}
      }}
  when: not (target_has_direct_claim_credentials | bool)
  tags:
    - configure
    - verify

- name: Resolve global credential fallback from bundle
  ansible.builtin.set_fact:
    bundle_global_credential: >-
      {{
        (
          bundle_globals[claim_target.target_category]
          if (
            (claim_target.target_category | default('') | string | trim | length) > 0
            and (claim_target.target_category in bundle_globals)
          )
          else
          bundle_globals[claim_target.form_factor]
          if (
            (claim_target.form_factor | default('') | string | trim | length) > 0
            and (claim_target.form_factor in bundle_globals)
          )
          else
          bundle_globals[claim_target.management_type]
          if (
            (claim_target.management_type | default('') | string | trim | length) > 0
            and (claim_target.management_type in bundle_globals)
          )
          else
          bundle_globals['global']
          if ('global' in bundle_globals)
          else {}
        )
      }}
  vars:
    bundle_globals: "{{ device_credentials_bundle.globals | default({}) }}"
  when: not (target_has_direct_claim_credentials | bool)
  tags:
    - configure
    - verify

- name: Derive matching credential candidates for claim target
  ansible.builtin.set_fact:
    matching_target_credentials: >-
      {{
        credential_candidates
        | selectattr('credential_role', 'defined')
        | selectattr('credential_role', 'equalto', 'target')
        | selectattr('target_category', 'defined')
        | selectattr('target_category', 'equalto', (claim_target.target_category | default('')))
        | list
      }}
  when: not (target_has_direct_claim_credentials | bool)
  tags:
    - configure
    - verify

- name: Narrow matching credentials by form factor when specified
  ansible.builtin.set_fact:
    matching_target_credentials: >-
      {{
        (
          matching_target_credentials
          | rejectattr('target_form_factor', 'defined')
          | list
        )
        +
        (
          matching_target_credentials
          | selectattr('target_form_factor', 'defined')
          | selectattr('target_form_factor', 'equalto', (claim_target.form_factor | default('')))
          | list
        )
      }}
  when:
    - not (target_has_direct_claim_credentials | bool)
    - (claim_target.form_factor | default('') | string | trim | length) > 0
  tags:
    - configure
    - verify

- name: Narrow matching credentials by management type when specified
  ansible.builtin.set_fact:
    matching_target_credentials: >-
      {{
        (
          matching_target_credentials
          | rejectattr('target_management_type', 'defined')
          | list
        )
        +
        (
          matching_target_credentials
          | selectattr('target_management_type', 'defined')
          | selectattr('target_management_type', 'equalto', (claim_target.management_type | default('')))
          | list
        )
      }}
  when:
    - not (target_has_direct_claim_credentials | bool)
    - (claim_target.management_type | default('') | string | trim | length) > 0
  tags:
    - configure
    - verify

- name: Resolve selected target credential for claim target
  ansible.builtin.set_fact:
    selected_target_credential: >-
      {{
        bundle_per_device_credential
        if (bundle_per_device_credential | default({}) | length) > 0
        else
        bundle_global_credential
        if (bundle_global_credential | default({}) | length) > 0
        else
        ((matching_target_credentials | default([]) | first) | default({}, true))
      }}
  when: not (target_has_direct_claim_credentials | bool)
  tags:
    - configure
    - verify

- name: Build normalized claim target defaults
  ansible.builtin.set_fact:
    normalized_claim_target_defaults:
      canonical_endpoint: >-
        {{
          claim_target.canonical_endpoint
          | default(claim_target.endpoint | default(''))
        }}
      normalized_claim_key: >-
        {{
          claim_target.normalized_claim_key
          | default(
              claim_target.claim_serial_number
              | default(
                  claim_target.serial
                  | default(
                      claim_target.endpoint
                      | default(claim_target.target_id | default(''))
                    )
                )
            )
        }}
      claim_submission_required: "{{ claim_target.claim_submission_required | default(true) | bool }}"
  tags:
    - configure
    - verify

- name: Append resolved claim target
  ansible.builtin.set_fact:
    resolved_claim_targets: >-
      {{
        (resolved_claim_targets | default([]))
        + [
            (
              claim_target
              | combine(
                  normalized_claim_target_defaults,
                  recursive=True
                )
              | combine(
                  (
                    {}
                    if (target_has_direct_claim_credentials | bool)
                    else {
                      'claim_username': (selected_target_credential.username | default('')),
                      'claim_password_ref': (selected_target_credential.password_ref | default('')),
                      'claim_password': (selected_target_credential.password | default(''))
                    }
                  ),
                  recursive=True
                )
            )
          ]
      }}
  tags:
    - configure
    - outputs
