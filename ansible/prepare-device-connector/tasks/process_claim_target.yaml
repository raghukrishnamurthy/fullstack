---
- name: Normalize connector prepare claim target payload
  ansible.builtin.set_fact:
    claim_target_payload: >-
      {{
        claim_target
        | combine(
            {
              'selected_target_credential': {
                'username': (claim_target.claim_username | default('')),
                'password_ref': (claim_target.claim_password_ref | default('')),
                'password': (claim_target.claim_password | default(''))
              },
              'endpoint': (
                claim_target.endpoint
                | default(claim_target.canonical_endpoint | default(''))
              ),
              'target_category': (
                claim_target.target_category
                | default(claim_target.category | default(''))
              )
            },
            recursive=True
          )
      }}
  no_log: false
  tags:
    - prepare
    - verify

- name: Bypass connector prepare for Assist targets
  ansible.builtin.set_fact:
    connector_prepare_execution_result:
      endpoint: "{{ claim_target_payload.endpoint | default('') }}"
      device_type: "{{ claim_target_payload.device_type | default(claim_target_payload.target_category | default('unknown')) }}"
      status: not_applicable
      reason: assist_claim_uses_backend_specific_flow
      messages:
        - "Assist targets skip shared connector preparation and are handled in the claim grain."
  when: (claim_target_payload.target_category | default('')) == 'assist'
  tags:
    - prepare
    - verify

- name: Run shared connector prepare implementation
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../build-infrastructure-domain-model/tasks/execute_device_connector_prepare.yaml"
  vars:
    validation_mode: "{{ internal_validation_mode }}"
  when: (claim_target_payload.target_category | default('')) != 'assist'
  tags:
    - prepare
    - verify

- name: Append connector prepare execution result
  ansible.builtin.set_fact:
    connector_prep_results: "{{ (connector_prep_results | default([])) + [connector_prepare_execution_result] }}"
  tags:
    - prepare
    - outputs

- name: Append prepared claim target when connector prepare did not fail
  ansible.builtin.set_fact:
    prepared_claim_targets: >-
      {{
        (prepared_claim_targets | default([]))
        + [
            (
              claim_target_payload
              | combine(
                  {
                    'connector_prepare_execution': connector_prepare_execution_result
                  },
                  recursive=True
                )
            )
          ]
      }}
  when: (connector_prepare_execution_result.status | default('')) != 'connector_prepare_failed'
  tags:
    - prepare
    - outputs
