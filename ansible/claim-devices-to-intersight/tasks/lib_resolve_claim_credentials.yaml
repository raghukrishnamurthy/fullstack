---
- name: Resolve shared claim credential inputs
  ansible.builtin.set_fact:
    claim_target_username: >-
      {{
        claim_target_context.claim_username
        | default(
            (claim_target_context.selected_target_credential.username | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
        | trim
      }}
    claim_target_password_ref: >-
      {{
        claim_target_context.claim_password_ref
        | default(
            (claim_target_context.selected_target_credential.password_ref | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
        | trim
      }}
    claim_target_password_direct: >-
      {{
        claim_target_context.claim_password
        | default(
            (claim_target_context.selected_target_credential.password | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
      }}
  tags:
    - claim
    - aggregate

- name: Resolve shared claim password env name
  ansible.builtin.set_fact:
    claim_target_password_env_name: >-
      {{
        (claim_target_password_ref | regex_replace('^env://', ''))
        if (
          (claim_target_password_ref | string | trim | length) > 0
          and (claim_target_password_ref | string).startswith('env://')
        )
        else ''
      }}
  tags:
    - claim
    - aggregate

- name: Resolve shared claim password value
  ansible.builtin.set_fact:
    claim_target_password: >-
      {{
        claim_target_password_direct
        if (claim_target_password_direct | trim | length) > 0
        else
        lookup('ansible.builtin.env', claim_target_password_env_name)
        if (claim_target_password_env_name | string | trim | length) > 0
        else ''
      }}
  no_log: "{{ claim_credentials_no_log | default(true) | bool }}"
  tags:
    - claim
    - aggregate
