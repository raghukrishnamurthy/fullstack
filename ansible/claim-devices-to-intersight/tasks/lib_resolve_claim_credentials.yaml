---
- name: Resolve shared claim credential inputs
  ansible.builtin.set_fact:
    claim_target_username: >-
      {{
        claim_target_context.claim_username
        | default(
            (claim_target_context.selected_target_credential.username | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
        | trim
      }}
    claim_target_password_ref: >-
      {{
        claim_target_context.claim_password_ref
        | default(
            (claim_target_context.selected_target_credential.password_ref | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
        | trim
      }}
    claim_target_password_direct: >-
      {{
        claim_target_context.claim_password
        | default(
            (claim_target_context.selected_target_credential.password | default(''))
            if (claim_use_selected_target_credential | default(false) | bool)
            else ''
          )
        | string
      }}
  tags:
    - claim
    - aggregate

- name: Resolve shared claim password secret
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../shared/tasks/lib_resolve_secret_value.yaml"
  vars:
    secret_value_direct: "{{ claim_target_password_direct }}"
    secret_value_ref: "{{ claim_target_password_ref }}"
    secret_resolved_fact_name: claim_target_password
    secret_ref_fact_name: claim_target_password_ref_normalized
    secret_env_name_fact_name: claim_target_password_env_name
    secret_file_path_fact_name: claim_target_password_file_path
    secret_source_fact_name: claim_target_password_source
    secret_no_log: "{{ claim_credentials_no_log | default(true) | bool }}"
  tags:
    - claim
    - aggregate
