---
- name: Resolve SaaS storage claim target context
  ansible.builtin.set_fact:
    claim_target_context: "{{ hostvars[inventory_hostname].claim_target_context | default({}) }}"
    resolved_endpoint: "{{ (claim_target_context.endpoint | default(claim_target_context.canonical_endpoint | default(''))) | string | trim }}"
    storage_platform: "{{ claim_target_context.storage_platform | default('') | string | trim | lower }}"
    assist_name: "{{ claim_target_context.assist_name | default('') | string | trim }}"
    normalized_claim_key: >-
      {{
        (
          claim_target_context.normalized_claim_key
          | default(claim_target_context.target_id | default(resolved_endpoint))
        )
        | string
        | trim
      }}
  tags:
    - claim
    - aggregate

- name: Resolve SaaS storage target type
  ansible.builtin.set_fact:
    storage_target_type: >-
      {{
        {
          'pure': 'PureStorageFlashArray'
        }.get(storage_platform, '')
      }}
    claim_target_username: "{{ claim_target_context.claim_username | default('') | string | trim }}"
    claim_target_password_ref: "{{ claim_target_context.claim_password_ref | default('') | string | trim }}"
    claim_target_password_direct: "{{ claim_target_context.claim_password | default('') | string }}"
    claim_target_password_env_name: >-
      {{
        (claim_target_context.claim_password_ref | regex_replace('^env://', ''))
        if (
          (claim_target_context.claim_password_ref | default('') | string | trim | length) > 0
          and (claim_target_context.claim_password_ref | string).startswith('env://')
        )
        else ''
      }}
  tags:
    - claim
    - aggregate

- name: Resolve SaaS storage target password value
  ansible.builtin.set_fact:
    claim_target_password: >-
      {{
        claim_target_password_direct
        if (claim_target_password_direct | trim | length) > 0
        else
        lookup('ansible.builtin.env', claim_target_password_env_name)
        if (claim_target_password_env_name | string | trim | length) > 0
        else ''
      }}
  no_log: true
  tags:
    - claim
    - aggregate

- name: Validate SaaS storage claim inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | length > 0
      - storage_target_type | length > 0
      - assist_name | length > 0
      - claim_target_username | length > 0
      - claim_target_password | length > 0
    fail_msg: "Storage claim requires endpoint, supported platform, assist name, username, and password"
  tags:
    - claim
    - verify

- name: Resolve duplicate logical target state for SaaS storage
  ansible.builtin.set_fact:
    canonical_claim_endpoint: "{{ (hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') }}"
    claim_duplicate_detected: >-
      {{
        (normalized_claim_key | string | trim | length) > 0
        and ((hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') | string | trim | length) > 0
      }}
  tags:
    - claim
    - aggregate

- name: Skip duplicate logical SaaS storage target before submission
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ canonical_claim_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: saas_storage_target_claim
      status: skipped
      changed: false
      reason: duplicate_logical_target
      registration_found: false
      registration_moid: ''
      deployment_name: "{{ internal_deployment_name | default('') }}"
      messages:
        - "Skipped storage claim submission because this target resolves to the same logical target as {{ canonical_claim_endpoint }}."
  when: claim_duplicate_detected | default(false) | bool
  tags:
    - claim
    - aggregate

- name: Lookup referenced Assist target on SaaS
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq 'IntersightAssist' and Name eq '{{ assist_name }}'"
      $top: 2
    return_list: true
  register: storage_assist_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Lookup existing SaaS storage target
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: existing_storage_target_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Resolve SaaS account reference for storage target creation
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /iam/Accounts
    query_params:
      $top: 1
    return_list: true
  register: saas_account_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Record missing Assist lookup for SaaS storage claim
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: saas_storage_target_claim
      status: failed
      changed: false
      reason: assist_not_found
      registration_found: false
      registration_moid: ''
      deployment_name: "{{ internal_deployment_name | default('') }}"
      messages:
        - "Storage target Assist '{{ assist_name }}' was not found in the current Intersight control plane."
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) == 0
  tags:
    - claim
    - aggregate

- name: Record unusable Assist state for SaaS storage claim
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: saas_storage_target_claim
      status: failed
      changed: false
      reason: assist_not_ready
      registration_found: false
      registration_moid: ''
      deployment_name: "{{ internal_deployment_name | default('') }}"
      messages:
        - "Storage target Assist '{{ assist_name }}' exists but is not Connected."
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) > 0
    - (((storage_assist_lookup.api_response | default([]) | first | default({})).Status | default('') | string | lower) != 'connected')
  tags:
    - claim
    - aggregate

- name: Record existing SaaS storage target without resubmission
  ansible.builtin.set_fact:
    existing_storage_target: "{{ existing_storage_target_lookup.api_response | default([]) | first | default({}) }}"
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: saas_storage_target_claim
      status: already_claimed
      changed: false
      reason: already_compliant
      registration_found: false
      registration_moid: ''
      deployment_name: "{{ internal_deployment_name | default('') }}"
      target_moid: "{{ existing_storage_target.Moid | default('') }}"
      target_status: "{{ existing_storage_target.Status | default('') }}"
      target_workflow_moid: "{{ (existing_storage_target.WorkflowInfo | default({})).Moid | default('') }}"
      messages:
        - "Storage target already exists and does not require claim resubmission."
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Build SaaS storage target request body
  ansible.builtin.set_fact:
    saas_storage_target_request_body:
      Name: "{{ resolved_endpoint }}"
      TargetType: "{{ storage_target_type }}"
      ManagementLocation: IntersightAssist
      Account:
        ClassId: mo.MoRef
        ObjectType: iam.Account
        Moid: "{{ (saas_account_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Assist:
        ClassId: mo.MoRef
        ObjectType: asset.Target
        Moid: "{{ (storage_assist_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Connections:
        - ClassId: asset.HttpConnection
          ObjectType: asset.HttpConnection
          ManagementAddress: "{{ resolved_endpoint }}"
          Port: 443
          IsSecure: true
          Credential:
            ClassId: asset.UsernamePasswordCredential
            ObjectType: asset.UsernamePasswordCredential
            Username: "{{ claim_target_username }}"
            Password: "{{ claim_target_password }}"
      Services:
        - ClassId: asset.WorkloadOptimizerService
          ObjectType: asset.WorkloadOptimizerService
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Submit SaaS storage target claim
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    update_method: post
    api_body: "{{ saas_storage_target_request_body }}"
  register: saas_storage_claim_result
  failed_when: false
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Derive SaaS storage claim error text
  ansible.builtin.set_fact:
    storage_claim_error_text: "{{ (saas_storage_claim_result.msg | default('')) ~ ' ' ~ (saas_storage_claim_result.api_response | default({}) | to_json) }}"
    storage_claim_error_text_lower: "{{ ((saas_storage_claim_result.msg | default('')) ~ ' ' ~ (saas_storage_claim_result.api_response | default({}) | to_json)) | lower }}"
  when:
    - claim_result is not defined
    - saas_storage_claim_result is defined
  tags:
    - claim

- name: Record SaaS storage claim result
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: saas_storage_target_claim
      status: >-
        {%- if (saas_storage_claim_result.failed | default(false) | bool) -%}
        failed
        {%- elif 'already exists' in storage_claim_error_text_lower -%}
        already_claimed
        {%- elif 'conflict' in storage_claim_error_text_lower -%}
        conflict
        {%- else -%}
        submitted
        {%- endif -%}
      changed: "{{ saas_storage_claim_result.changed | default(false) | bool }}"
      reason: >-
        {%- if (saas_storage_claim_result.failed | default(false) | bool) -%}
        claim_submission_failed
        {%- elif 'already exists' in storage_claim_error_text_lower -%}
        already_compliant
        {%- elif 'conflict' in storage_claim_error_text_lower -%}
        conflict
        {%- else -%}
        claimed_and_configured
        {%- endif -%}
      registration_found: false
      registration_moid: ''
      deployment_name: "{{ internal_deployment_name | default('') }}"
      target_moid: "{{ (saas_storage_claim_result.api_response | default({})).Moid | default('') }}"
      target_status: "{{ (saas_storage_claim_result.api_response | default({})).Status | default('') }}"
      target_workflow_moid: "{{ ((saas_storage_claim_result.api_response | default({})).WorkflowInfo | default({})).Moid | default('') }}"
      assist_name: "{{ assist_name }}"
      storage_platform: "{{ storage_platform }}"
      messages:
        - >-
          {%- if (saas_storage_claim_result.failed | default(false) | bool) -%}
          {{ saas_storage_claim_result.msg | default('Storage target claim submission failed') }}
          {%- elif 'already exists' in storage_claim_error_text_lower -%}
          Storage target already exists.
          {%- elif 'conflict' in storage_claim_error_text_lower -%}
          Intersight reported a conflict while attempting the storage claim.
          {%- else -%}
          Storage target claim submitted successfully.
          {%- endif -%}
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Collect SaaS storage claim result for target on localhost
  ansible.builtin.set_fact:
    claim_results: "{{ (hostvars['localhost'].claim_results | default([])) + [claim_result] }}"
    successful_result_items: >-
      {{ (hostvars['localhost'].successful_result_items | default([])) + ([claim_result] if claim_result.status in ['submitted', 'already_claimed'] else []) }}
    failed_result_items: >-
      {{ (hostvars['localhost'].failed_result_items | default([])) + ([claim_result] if claim_result.status == 'failed' else []) }}
    conflict_result_items: >-
      {{ (hostvars['localhost'].conflict_result_items | default([])) + ([claim_result] if claim_result.status == 'conflict' else []) }}
    skipped_result_items: >-
      {{ (hostvars['localhost'].skipped_result_items | default([])) + ([claim_result] if claim_result.status == 'skipped' else []) }}
    changed_result_items: >-
      {{ (hostvars['localhost'].changed_result_items | default([])) + ([claim_result] if (claim_result.changed | default(false) | bool) else []) }}
    seen_claim_target_map: >-
      {{
        (hostvars['localhost'].seen_claim_target_map | default({}))
        | combine(
            {
              (claim_result.normalized_claim_key): (claim_result.canonical_endpoint | default(claim_result.endpoint))
            },
            recursive=True
          )
        if ((claim_result.normalized_claim_key | default('') | string | trim | length) > 0 and (claim_result.status | default('')) != 'failed')
        else (hostvars['localhost'].seen_claim_target_map | default({}))
      }}
  delegate_to: localhost
  delegate_facts: true
  tags:
    - aggregate
