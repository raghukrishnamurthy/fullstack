---
- name: Resolve SaaS storage claim target context
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_context.yaml"
  vars:
    claim_normalized_key_fallback: "{{ (hostvars[inventory_hostname].claim_target_context | default({})).target_id | default('') }}"
  tags:
    - claim
    - aggregate

- name: Resolve SaaS storage target type
  ansible.builtin.set_fact:
    storage_platform: "{{ claim_target_context.storage_platform | default('') | string | trim | lower }}"
    assist_name: "{{ claim_target_context.assist_name | default('') | string | trim }}"
  tags:
    - claim
    - aggregate

- name: Resolve SaaS storage target type mapping
  ansible.builtin.set_fact:
    storage_target_type: >-
      {{
        {
          'pure': 'PureStorageFlashArray'
        }.get(storage_platform, '')
      }}
  tags:
    - claim
    - aggregate

- name: Resolve SaaS storage claim credentials
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_credentials.yaml"
  vars:
    claim_credentials_no_log: true
  tags:
    - claim
    - aggregate

- name: Validate SaaS storage claim inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | length > 0
      - storage_target_type | length > 0
      - assist_name | length > 0
      - claim_target_username | length > 0
      - claim_target_password | length > 0
    fail_msg: "Storage claim requires endpoint, supported platform, assist name, username, and password"
  tags:
    - claim
    - verify

- name: Resolve duplicate logical target state for SaaS storage
  ansible.builtin.set_fact:
    canonical_claim_endpoint: "{{ (hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') }}"
    claim_duplicate_detected: >-
      {{
        (normalized_claim_key | string | trim | length) > 0
        and ((hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') | string | trim | length) > 0
      }}
  tags:
    - claim
    - aggregate

- name: Skip duplicate logical SaaS storage target before submission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: saas_storage_target_claim
    static_storage_status: skipped
    static_storage_reason: duplicate_logical_target
    static_storage_message: "Skipped storage claim submission because this target resolves to the same logical target as {{ canonical_claim_endpoint }}."
    static_storage_canonical_endpoint: "{{ canonical_claim_endpoint }}"
    static_storage_include_changed: true
    static_storage_changed: false
    static_storage_include_registration_fields: true
    static_storage_registration_found: false
    static_storage_registration_moid: ''
  when: claim_duplicate_detected | default(false) | bool
  tags:
    - claim
    - aggregate

- name: Lookup referenced Assist target on SaaS
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq 'IntersightAssist' and Name eq '{{ assist_name }}'"
      $top: 2
    return_list: true
  register: storage_assist_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Lookup existing SaaS storage target
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: existing_storage_target_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Resolve SaaS account reference for storage target creation
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /iam/Accounts
    query_params:
      $top: 1
    return_list: true
  register: saas_account_lookup
  failed_when: false
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Record missing Assist lookup for SaaS storage claim
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: saas_storage_target_claim
    static_storage_status: failed
    static_storage_reason: assist_not_found
    static_storage_message: "Storage target Assist '{{ assist_name }}' was not found in the current Intersight control plane."
    static_storage_include_changed: true
    static_storage_changed: false
    static_storage_include_registration_fields: true
    static_storage_registration_found: false
    static_storage_registration_moid: ''
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) == 0
  tags:
    - claim
    - aggregate

- name: Record unusable Assist state for SaaS storage claim
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: saas_storage_target_claim
    static_storage_status: failed
    static_storage_reason: assist_not_ready
    static_storage_message: "Storage target Assist '{{ assist_name }}' exists but is not Connected."
    static_storage_include_changed: true
    static_storage_changed: false
    static_storage_include_registration_fields: true
    static_storage_registration_found: false
    static_storage_registration_moid: ''
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) > 0
    - (((storage_assist_lookup.api_response | default([]) | first | default({})).Status | default('') | string | lower) != 'connected')
  tags:
    - claim
    - aggregate

- name: Record existing SaaS storage target without resubmission
  ansible.builtin.set_fact:
    existing_storage_target: "{{ existing_storage_target_lookup.api_response | default([]) | first | default({}) }}"
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Record existing SaaS storage target without resubmission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: saas_storage_target_claim
    static_storage_status: already_claimed
    static_storage_reason: already_compliant
    static_storage_message: "Storage target already exists and does not require claim resubmission."
    static_storage_include_changed: true
    static_storage_changed: false
    static_storage_include_registration_fields: true
    static_storage_registration_found: false
    static_storage_registration_moid: ''
    static_storage_include_target_fields: true
    static_storage_target_moid: "{{ existing_storage_target.Moid | default('') }}"
    static_storage_target_status: "{{ existing_storage_target.Status | default('') }}"
    static_storage_target_workflow_moid: "{{ (existing_storage_target.WorkflowInfo | default({})).Moid | default('') }}"
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Build SaaS storage target request body
  ansible.builtin.set_fact:
    saas_storage_target_request_body:
      Name: "{{ resolved_endpoint }}"
      TargetType: "{{ storage_target_type }}"
      ManagementLocation: IntersightAssist
      Account:
        ClassId: mo.MoRef
        ObjectType: iam.Account
        Moid: "{{ (saas_account_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Assist:
        ClassId: mo.MoRef
        ObjectType: asset.Target
        Moid: "{{ (storage_assist_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Connections:
        - ClassId: asset.HttpConnection
          ObjectType: asset.HttpConnection
          ManagementAddress: "{{ resolved_endpoint }}"
          Port: 443
          IsSecure: true
          Credential:
            ClassId: asset.UsernamePasswordCredential
            ObjectType: asset.UsernamePasswordCredential
            Username: "{{ claim_target_username }}"
            Password: "{{ claim_target_password }}"
      Services:
        - ClassId: asset.WorkloadOptimizerService
          ObjectType: asset.WorkloadOptimizerService
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Submit SaaS storage target claim
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    update_method: post
    api_body: "{{ saas_storage_target_request_body }}"
  register: saas_storage_claim_result
  failed_when: false
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Derive SaaS storage claim error text
  ansible.builtin.set_fact:
    storage_claim_error_text: "{{ (saas_storage_claim_result.msg | default('')) ~ ' ' ~ (saas_storage_claim_result.api_response | default({}) | to_json) }}"
    storage_claim_error_text_lower: "{{ ((saas_storage_claim_result.msg | default('')) ~ ' ' ~ (saas_storage_claim_result.api_response | default({}) | to_json)) | lower }}"
  when:
    - claim_result is not defined
    - saas_storage_claim_result is defined
  tags:
    - claim

- name: Verify SaaS storage target appears after submission
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: submitted_storage_target_lookup
  failed_when: false
  when:
    - claim_result is not defined
    - saas_storage_claim_result is defined
    - not (saas_storage_claim_result.failed | default(false) | bool)
    - "'already exists' not in (storage_claim_error_text_lower | default(''))"
    - "'conflict' not in (storage_claim_error_text_lower | default(''))"
  tags:
    - claim
    - verify

- name: Resolve SaaS storage target evidence state
  ansible.builtin.set_fact:
    saas_storage_target_found: "{{ (submitted_storage_target_lookup.api_response | default([]) | length) > 0 }}"
  when:
    - claim_result is not defined
    - saas_storage_claim_result is defined
    - not (saas_storage_claim_result.failed | default(false) | bool)
  tags:
    - claim
    - verify

- name: Resolve normalized SaaS storage claim outcome
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_post_operation_outcome.yaml"
  vars:
    post_api_failed: "{{ saas_storage_claim_result.failed | default(false) | bool }}"
    post_failure_reason: claim_submission_failed
    post_failure_message: "{{ saas_storage_claim_result.msg | default('Storage target claim submission failed') }}"
    post_already_claimed: "{{ 'already exists' in (storage_claim_error_text_lower | default('')) }}"
    post_already_claimed_message: "Storage target already exists."
    post_conflict: "{{ 'conflict' in (storage_claim_error_text_lower | default('')) }}"
    post_conflict_message: "Intersight reported a conflict while attempting the storage claim."
    post_evidence_required: "{{ not ('already exists' in (storage_claim_error_text_lower | default('')) or 'conflict' in (storage_claim_error_text_lower | default('')) or (saas_storage_claim_result.failed | default(false) | bool)) }}"
    post_evidence_found: "{{ saas_storage_target_found | default(false) | bool }}"
    post_evidence_missing_reason: claim_not_visible_after_submission
    post_evidence_missing_message: "Storage target claim submission completed but the target did not appear in Intersight."
    post_success_status: submitted
    post_success_reason: claimed_and_configured
    post_success_message: "Storage target claim submitted successfully."
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Record SaaS storage claim result
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_storage_claim_result.yaml"
  vars:
    storage_claim_execution_mode: saas_storage_target_claim
    storage_claim_status_override: "{{ post_operation_status }}"
    storage_claim_reason_override: "{{ post_operation_reason }}"
    storage_claim_message_override: "{{ post_operation_message }}"
    storage_claim_api_failed: "{{ saas_storage_claim_result.failed | default(false) | bool }}"
    storage_claim_failure_message: "{{ saas_storage_claim_result.msg | default('Storage target claim submission failed') }}"
    storage_claim_api_message: "{{ saas_storage_claim_result.msg | default('Storage target claim submission failed') }}"
    storage_claim_api_response: >-
      {{
        (submitted_storage_target_lookup.api_response | default([]) | first | default({}))
        if (
          (submitted_storage_target_lookup is defined)
          and ((submitted_storage_target_lookup.api_response | default([]) | length) > 0)
        )
        else (saas_storage_claim_result.api_response | default({}))
      }}
    storage_claim_error_text_lower: "{{ storage_claim_error_text_lower | default('') }}"
    storage_claim_conflict_message: "Intersight reported a conflict while attempting the storage claim."
    storage_claim_include_changed: true
    storage_claim_changed: "{{ saas_storage_claim_result.changed | default(false) | bool }}"
    storage_claim_include_registration_fields: true
    storage_claim_registration_found: false
    storage_claim_registration_moid: ''
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Collect SaaS storage claim result for target on localhost
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_collect_claim_result.yaml"
  vars:
    claim_track_seen_map: true
    claim_seen_map_only_if_absent: false
  tags:
    - aggregate
