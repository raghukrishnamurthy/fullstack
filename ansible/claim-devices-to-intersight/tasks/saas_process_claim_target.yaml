---
- name: Resolve SaaS claim target context
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_context.yaml"
  tags:
    - claim
    - aggregate

- name: Resolve per-target SaaS claim credentials
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_credentials.yaml"
  vars:
    claim_credentials_no_log: false
  tags:
    - claim
    - aggregate

- name: Determine whether target is an Assist claim candidate
  ansible.builtin.set_fact:
    assist_claim_target: >-
      {{
        (claim_target_context.target_category | default('')) == 'assist'
        or (claim_target_context.device_type | default('') | string | lower) == 'assist'
      }}
  tags:
    - claim
    - aggregate

- name: Build per-target desired credentials for inline SaaS claim readiness
  ansible.builtin.set_fact:
    claim_readiness_credential_candidates: >-
      {{
        (
          (claim_target_context.target_credential_candidates | default([]))
          + (claim_target_context.manufacturing_credential_candidates | default([]))
          + (
              [
                {
                  'username': (claim_target_context.claim_username | default('')),
                  'password': (claim_target_context.claim_password | default('')),
                  'password_ref': (claim_target_context.claim_password_ref | default(''))
                }
              ]
              if (
                (claim_target_context.claim_username | default('') | string | trim | length) > 0
                and (
                  (claim_target_context.claim_password | default('') | string | trim | length) > 0
                  or (claim_target_context.claim_password_ref | default('') | string | trim | length) > 0
                )
              )
              else []
            )
          + (
              [claim_target_context.selected_target_credential]
              if ((claim_target_context.selected_target_credential | default({})) | length) > 0
              else []
            )
        )
        if (
          (claim_target_context.target_category | default('')) == 'server'
          and (claim_target_context.form_factor | default('')) == 'rack'
          and (claim_target_context.management_type | default('')) == 'standalone'
        )
        else (
          [
            {
              'username': (claim_target_context.claim_username | default('')),
              'password': (claim_target_context.claim_password | default('')),
              'password_ref': (claim_target_context.claim_password_ref | default(''))
            }
          ]
          if (
            (claim_target_context.claim_username | default('') | string | trim | length) > 0
            and (
              (claim_target_context.claim_password | default('') | string | trim | length) > 0
              or (claim_target_context.claim_password_ref | default('') | string | trim | length) > 0
            )
          )
          else (
            [claim_target_context.selected_target_credential]
            if ((claim_target_context.selected_target_credential | default({})) | length) > 0
            else []
          )
        )
      }}
  tags:
    - claim
    - aggregate

- name: Initialize ordered credentials for inline SaaS claim readiness
  ansible.builtin.set_fact:
    resolved_target_desired_credentials: []
  tags:
    - claim
    - aggregate

- name: Append resolved inline SaaS claim readiness credential
  ansible.builtin.set_fact:
    resolved_target_desired_credentials: >-
      {{
        (resolved_target_desired_credentials | default([]))
        + [
            {
              'username': (claim_readiness_candidate.username | default('') | string | trim),
              'password': (resolved_claim_readiness_password | string)
            }
          ]
      }}
  vars:
    claim_readiness_password_ref: "{{ claim_readiness_candidate.password_ref | default('') | string | trim }}"
    resolved_claim_readiness_password: >-
      {{
        (claim_readiness_candidate.password | default('') | string)
        if (claim_readiness_candidate.password | default('') | string | length) > 0
        else
        lookup(
          'ansible.builtin.file',
          (claim_readiness_password_ref | regex_replace('^file://', '')),
          errors='ignore'
        )
        if (claim_readiness_password_ref.startswith('file://'))
        else
        lookup(
          'ansible.builtin.env',
          (claim_readiness_password_ref | regex_replace('^env://', ''))
        )
        if (claim_readiness_password_ref.startswith('env://'))
        else ''
      }}
  loop: "{{ claim_readiness_credential_candidates | default([]) }}"
  loop_control:
    loop_var: claim_readiness_candidate
    label: "{{ claim_readiness_candidate.username | default('') }}"
  when:
    - claim_readiness_candidate is mapping
    - (claim_readiness_candidate.username | default('') | string | trim | length) > 0
    - (resolved_claim_readiness_password | string | trim | length) > 0
  no_log: true
  tags:
    - claim
    - aggregate

- name: Build per-target desired credentials for inline SaaS claim readiness
  ansible.builtin.set_fact:
    resolved_target_desired_credentials: "{{ resolved_target_desired_credentials | default([]) }}"
  tags:
    - claim
    - aggregate

- name: Refresh SaaS claim readiness inline
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - "{{ claim_readiness_helper_path | default(playbook_dir ~ '/tools/run_claim_readiness.py') }}"
  environment:
    ENDPOINT: "{{ resolved_endpoint }}"
    DESIRED_CREDENTIALS_JSON: "{{ resolved_target_desired_credentials | default([]) | to_json }}"
    PREPARED_TARGETS_JSON: "{{ [claim_target_context] | to_json }}"
    VALIDATE_CERTS: "{{ (claim_endpoint_validate_certs | default(false) | bool) | ternary('true', 'false') }}"
    TIMEOUT: "{{ internal_helper_timeout_seconds | default(20) | string }}"
  register: claim_readiness_helper_result
  changed_when: false
  no_log: false
  when:
    - (resolved_target_desired_credentials | default([]) | length) > 0
    - claim_target_context.device_type | default('') | string | lower in ['imc', 'imm']
    - not (assist_claim_target | default(false) | bool)
  tags:
    - claim
    - verify

- name: Validate Assist SaaS claim inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | string | trim | length > 0
      - not ((resolved_endpoint | default('')) is match('^\\d{1,3}(\\.\\d{1,3}){3}$'))
      - claim_target_username | string | trim | length > 0
      - claim_target_password | string | trim | length > 0
    fail_msg: "Assist SaaS claim requires an FQDN endpoint plus direct, file-backed, or env-backed claim credentials"
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
  tags:
    - claim
    - verify

- name: Login to Assist for SaaS claim preparation
  ansible.builtin.uri:
    url: "https://{{ resolved_endpoint }}/iam/adminlogin"
    method: POST
    headers:
      Content-Type: application/json
      X-Requested-With: XMLHttpRequest
      Referer: "https://{{ resolved_endpoint }}/"
      Origin: "https://{{ resolved_endpoint }}"
      Host: "{{ resolved_endpoint }}"
    body_format: json
    body:
      Username: "{{ claim_target_username | regex_replace('@local$', '') }}"
      Password: "{{ claim_target_password }}"
    return_content: true
    validate_certs: "{{ claim_endpoint_validate_certs | default(false) | bool }}"
    timeout: "{{ internal_helper_timeout_seconds | default(20) | int }}"
  register: assist_login_result
  failed_when: false
  no_log: true
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
  tags:
    - claim
    - verify

- name: Query Assist connector systems for SaaS claim preparation
  ansible.builtin.uri:
    url: "https://{{ resolved_endpoint }}/connector/Systems"
    method: GET
    headers:
      Origin: "https://{{ resolved_endpoint }}"
      Referer: "https://{{ resolved_endpoint }}/"
      Host: "{{ resolved_endpoint }}"
      X-Requested-With: XMLHttpRequest
      Cache-Control: no-cache
      Content-Type: application/json
      Cookie: "{{ assist_login_result.cookies_string | default('') }}"
    return_content: true
    validate_certs: "{{ claim_endpoint_validate_certs | default(false) | bool }}"
    timeout: "{{ internal_helper_timeout_seconds | default(20) | int }}"
  register: assist_systems_result
  failed_when: false
  no_log: true
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_login_result.status | default(0) | int) == 200
  tags:
    - claim
    - verify

- name: Parse Assist connector systems payload
  ansible.builtin.set_fact:
    assist_systems_payload: >-
      {{
        (
          (assist_systems_result.content | default('[]') | from_json)
          | first
          | default({})
        )
        if ((assist_systems_result.content | default('') | string | trim | length) > 0)
        else {}
      }}
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - assist_systems_result is defined
    - (assist_systems_result.status | default(0) | int) == 200
  tags:
    - claim
    - verify

- name: Resolve Assist connector ownership state
  ansible.builtin.set_fact:
    assist_claim_state: "{{ assist_systems_payload.AccountOwnershipState | default('') }}"
    assist_connection_dns: "{{ assist_systems_payload.ConnectionDns | default('') }}"
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - assist_systems_payload is defined
  tags:
    - claim
    - verify

- name: Stop Assist SaaS claim when login or connector inspection fails
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_target_category: assist
    static_direct_management_type: "{{ claim_target_context.management_type | default('device_connector') }}"
    static_direct_normalized_claim_key: "{{ (claim_target_context.normalized_claim_key | default(resolved_endpoint)) | string | trim }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: failed
    static_direct_reason: assist_login_or_connector_probe_failed
    static_direct_message: "Assist login or connector query failed during SaaS claim preparation."
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_device_type: assist
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: ''
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_login_result.status | default(0) | int) != 200 or (assist_systems_result.status | default(0) | int) != 200
  tags:
    - claim
    - aggregate

- name: Record already-claimed Assist without SaaS resubmission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_target_category: assist
    static_direct_management_type: "{{ claim_target_context.management_type | default('device_connector') }}"
    static_direct_normalized_claim_key: "{{ (claim_target_context.normalized_claim_key | default(resolved_endpoint)) | string | trim }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: already_claimed
    static_direct_reason: already_compliant
    static_direct_message: "Assist is already claimed and does not require SaaS claim submission."
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_device_type: assist
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: "{{ assist_systems_payload.DeviceRegistrationMoid | default('') }}"
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_claim_state | string | lower) == 'claimed'
  tags:
    - claim
    - aggregate

- name: Query Assist device identifier for SaaS claim
  ansible.builtin.uri:
    url: "https://{{ resolved_endpoint }}/connector/DeviceIdentifiers"
    method: GET
    headers:
      Origin: "https://{{ resolved_endpoint }}"
      Referer: "https://{{ resolved_endpoint }}/"
      Host: "{{ resolved_endpoint }}"
      X-Requested-With: XMLHttpRequest
      Cache-Control: no-cache
      Content-Type: application/json
      Cookie: "{{ assist_login_result.cookies_string | default('') }}"
    return_content: true
    validate_certs: "{{ claim_endpoint_validate_certs | default(false) | bool }}"
    timeout: "{{ internal_helper_timeout_seconds | default(20) | int }}"
  register: assist_device_identifier_result
  failed_when: false
  no_log: true
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_claim_state | string | lower) == 'not claimed'
  tags:
    - claim
    - verify

- name: Query Assist security token for SaaS claim
  ansible.builtin.uri:
    url: "https://{{ resolved_endpoint }}/connector/SecurityTokens"
    method: GET
    headers:
      Origin: "https://{{ resolved_endpoint }}"
      Referer: "https://{{ resolved_endpoint }}/"
      Host: "{{ resolved_endpoint }}"
      X-Requested-With: XMLHttpRequest
      Cache-Control: no-cache
      Content-Type: application/json
      Cookie: "{{ assist_login_result.cookies_string | default('') }}"
    return_content: true
    validate_certs: "{{ claim_endpoint_validate_certs | default(false) | bool }}"
    timeout: "{{ internal_helper_timeout_seconds | default(20) | int }}"
  register: assist_security_token_result
  failed_when: false
  no_log: true
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_claim_state | string | lower) == 'not claimed'
  tags:
    - claim
    - verify

- name: Apply Assist SaaS claim inputs from connector data
  ansible.builtin.set_fact:
    effective_target_context: >-
      {{
        (effective_target_context | default(claim_target_context))
        | combine(
            {
              'claim_serial_number': (
                (
                  assist_device_identifier_result.content | default('[]') | from_json
                ) | first | default({})
              ).Id | default(''),
              'claim_security_token': (
                (
                  assist_security_token_result.content | default('[]') | from_json
                ) | first | default({})
              ).Token | default(''),
              'device_type': 'assist'
            },
            recursive=True
          )
      }}
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_claim_state | string | lower) == 'not claimed'
    - (assist_device_identifier_result.status | default(0) | int) == 200
    - (assist_security_token_result.status | default(0) | int) == 200
  tags:
    - claim
    - verify

- name: Stop Assist SaaS claim when identifier or token lookup fails
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_target_category: assist
    static_direct_management_type: "{{ claim_target_context.management_type | default('device_connector') }}"
    static_direct_normalized_claim_key: "{{ (claim_target_context.normalized_claim_key | default(resolved_endpoint)) | string | trim }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: failed
    static_direct_reason: assist_claim_inputs_unavailable
    static_direct_message: "Assist device identifier or claim token could not be retrieved for SaaS claim."
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_device_type: assist
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: ''
  when:
    - claim_result is not defined
    - assist_claim_target | default(false) | bool
    - (assist_claim_state | string | lower) == 'not claimed'
    - (
        (assist_device_identifier_result.status | default(0) | int) != 200
        or (assist_security_token_result.status | default(0) | int) != 200
      )
  tags:
    - claim
    - aggregate

- name: Parse inline SaaS claim readiness payload
  ansible.builtin.set_fact:
    claim_readiness_payload: "{{ claim_readiness_helper_result.stdout | from_json }}"
  when:
    - claim_readiness_helper_result is defined
    - (claim_readiness_helper_result.stdout | default('') | string | trim | length) > 0
  tags:
    - claim
    - verify

- name: Apply refreshed SaaS claim context
  ansible.builtin.set_fact:
    effective_target_context: "{{ (claim_readiness_payload.claim_ready_target | default({})) if ((claim_readiness_payload.claim_ready_target | default({}) | length) > 0) else claim_target_context }}"
    claim_readiness_result: "{{ claim_readiness_payload.result | default({}) }}"
  when: claim_readiness_payload is defined
  tags:
    - claim
    - verify

- name: Default effective SaaS claim context
  ansible.builtin.set_fact:
    effective_target_context: "{{ claim_target_context }}"
    claim_readiness_result: "{{ {} }}"
  when: effective_target_context is not defined
  tags:
    - claim
    - verify

- name: Stop SaaS claim when inline readiness failed
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_device_type: "{{ claim_target_context.device_type | default(claim_target_context.target_category | default('unknown')) }}"
    static_direct_normalized_claim_key: "{{ (claim_target_context.normalized_claim_key | default(claim_target_context.claim_serial_number | default(resolved_endpoint))) | string | trim }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: failed
    static_direct_reason: "{{ claim_readiness_result.reason | default('claim_readiness_failed') }}"
    static_direct_messages: "{{ claim_readiness_result.messages | default(['Inline claim readiness failed']) }}"
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: ''
  when:
    - claim_readiness_payload is defined
    - (claim_readiness_payload.claim_ready_target | default({}) | length) == 0
  tags:
    - claim
    - aggregate

- name: Resolve effective claim key after inline refresh
  ansible.builtin.set_fact:
    normalized_claim_key: >-
      {{
        (
          effective_target_context.normalized_claim_key
          | default(effective_target_context.claim_serial_number | default(resolved_endpoint))
        )
        | string
        | trim
      }}
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Resolve duplicate logical target state
  ansible.builtin.set_fact:
    canonical_claim_endpoint: "{{ (hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') }}"
    claim_duplicate_detected: >-
      {{
        (normalized_claim_key | string | trim | length) > 0
        and ((hostvars['localhost'].seen_claim_target_map | default({})).get(normalized_claim_key, '') | string | trim | length) > 0
      }}
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Skip duplicate logical target before SaaS claim submission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_target_id: "{{ effective_target_context.target_id | default(claim_target_context.target_id | default('')) }}"
    static_direct_target_category: "{{ effective_target_context.target_category | default(claim_target_context.target_category | default('unknown')) }}"
    static_direct_serial: "{{ effective_target_context.serial | default(claim_target_context.serial | default('')) }}"
    static_direct_mgmt_ip: "{{ effective_target_context.mgmt_ip | default(claim_target_context.mgmt_ip | default('')) }}"
    static_direct_form_factor: "{{ effective_target_context.form_factor | default(claim_target_context.form_factor | default('')) }}"
    static_direct_management_type: "{{ effective_target_context.management_type | default(claim_target_context.management_type | default('')) }}"
    static_direct_canonical_endpoint: "{{ canonical_claim_endpoint }}"
    static_direct_normalized_claim_key: "{{ normalized_claim_key }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: skipped
    static_direct_reason: duplicate_logical_target
    static_direct_message: "Skipped claim submission because this claim target resolves to the same logical target as {{ canonical_claim_endpoint }}."
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_device_type: "{{ effective_target_context.device_type | default(effective_target_context.target_category | default('unknown')) }}"
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: ''
  when: claim_duplicate_detected | default(false) | bool
  tags:
    - claim
    - aggregate

- name: Record already-claimed target without SaaS resubmission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_target_id: "{{ effective_target_context.target_id | default(claim_target_context.target_id | default('')) }}"
    static_direct_target_category: "{{ effective_target_context.target_category | default(claim_target_context.target_category | default('unknown')) }}"
    static_direct_serial: "{{ effective_target_context.serial | default(claim_target_context.serial | default('')) }}"
    static_direct_mgmt_ip: "{{ effective_target_context.mgmt_ip | default(claim_target_context.mgmt_ip | default('')) }}"
    static_direct_form_factor: "{{ effective_target_context.form_factor | default(claim_target_context.form_factor | default('')) }}"
    static_direct_management_type: "{{ effective_target_context.management_type | default(claim_target_context.management_type | default('')) }}"
    static_direct_normalized_claim_key: "{{ normalized_claim_key }}"
    static_direct_execution_mode: saas_claim
    static_direct_status: already_claimed
    static_direct_reason: already_compliant
    static_direct_message: "Claim target is already claimed and does not require SaaS claim submission."
    static_direct_include_changed: true
    static_direct_changed: false
    static_direct_include_device_type: true
    static_direct_device_type: "{{ effective_target_context.device_type | default(effective_target_context.target_category | default('unknown')) }}"
    static_direct_include_registration_fields: true
    static_direct_registration_found: false
    static_direct_registration_moid: ''
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - not (effective_target_context.claim_submission_required | default(true) | bool)
  tags:
    - claim
    - aggregate

- name: Validate per-target credentials when SaaS inline readiness is required
  ansible.builtin.assert:
    that:
      - claim_target_username | string | trim | length > 0
      - (claim_target_password_ref | string | trim | length > 0) or (claim_target_password_direct | string | trim | length > 0)
      - claim_target_password | string | trim | length > 0
    fail_msg: "claim-devices-to-intersight requires claim_username plus either claim_password or a file-backed/env-backed claim_password_ref on each target when claim readiness must be refreshed inline"
  when:
    - claim_result is not defined
    - effective_target_context.claim_submission_required | default(true) | bool
    - claim_target_context.device_type | default('') | string | lower in ['imc', 'imm']
    - not (assist_claim_target | default(false) | bool)
    - (
        effective_target_context.claim_serial_number is not defined
        or effective_target_context.claim_serial_number | string | trim | length == 0
        or effective_target_context.claim_security_token is not defined
        or effective_target_context.claim_security_token | string | trim | length == 0
      )
  tags:
    - claim
    - verify

- name: Validate SaaS claim-ready target inputs
  ansible.builtin.assert:
    that:
      - effective_target_context.claim_serial_number is defined
      - effective_target_context.claim_serial_number | string | trim | length > 0
      - effective_target_context.claim_security_token is defined
      - effective_target_context.claim_security_token | string | trim | length > 0
    fail_msg: "Claim target is missing claim_serial_number or claim_security_token required for SaaS claim"
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - effective_target_context.claim_submission_required | default(true) | bool
  tags:
    - claim
    - verify

- name: Submit SaaS device claim
  intersight_scoped_claim:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    serial_number: "{{ effective_target_context.claim_serial_number }}"
    claim_code: "{{ effective_target_context.claim_security_token }}"
    organization: "{{ internal_organization | default('') }}"
  register: saas_claim_result
  failed_when: false
  no_log: false
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - effective_target_context.claim_submission_required | default(true) | bool
  tags:
    - claim

- name: Derive SaaS claim error text
  ansible.builtin.set_fact:
    claim_error_text: "{{ (saas_claim_result.msg | default('')) ~ ' ' ~ (saas_claim_result.api_response | default({}) | to_json) }}"
    claim_error_text_lower: "{{ ((saas_claim_result.msg | default('')) ~ ' ' ~ (saas_claim_result.api_response | default({}) | to_json)) | lower }}"
  when:
    - claim_result is not defined
    - saas_claim_result is defined
  tags:
    - claim

- name: Verify SaaS device registration exists
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /asset/DeviceRegistrations
    query_params:
      $filter: "Serial eq '{{ effective_target_context.claim_serial_number }}'"
      $top: 1
    return_list: true
  register: saas_registration_result
  failed_when: false
  no_log: false
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - effective_target_context.claim_submission_required | default(true) | bool
    - saas_claim_result is defined
    - not (saas_claim_result.failed | default(false) | bool)
  tags:
    - claim
    - verify

- name: Resolve claimed registration Moid
  ansible.builtin.set_fact:
    claimed_registration_moid: >-
      {{
        (
          ((saas_claim_result.api_response | default({})).Device | default({})).Moid
          | default('')
        )
        or
        (
          (saas_registration_result.api_response | default([]) | first | default({})).Moid
          | default('')
        )
      }}
  when:
    - claim_result is not defined
    - saas_claim_result is defined
    - not (saas_claim_result.failed | default(false) | bool)
  tags:
    - claim
    - verify

- name: Resolve SaaS registration verification state
  ansible.builtin.set_fact:
    saas_registration_lookup_failed: "{{ saas_registration_result.failed | default(false) | bool }}"
    saas_registration_found: "{{ (claimed_registration_moid | default('') | string | trim | length) > 0 }}"
  when:
    - claim_result is not defined
    - saas_claim_result is defined
    - not (saas_claim_result.failed | default(false) | bool)
  tags:
    - claim
    - verify

- name: Resolve SaaS direct claim outcome
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_post_operation_outcome.yaml"
  vars:
    post_api_failed: "{{ (saas_claim_result.failed | default(false) | bool) or (saas_registration_lookup_failed | default(false) | bool) }}"
    post_failure_reason: >-
      {{
        'registration_lookup_failed'
        if (saas_registration_lookup_failed | default(false) | bool)
        else 'claim_submission_failed'
      }}
    post_failure_message: >-
      {{
        'SaaS claim submission returned, but post-submit registration verification failed.'
        if (saas_registration_lookup_failed | default(false) | bool)
        else (saas_claim_result.msg | default('Claim submission failed'))
      }}
    post_conflict: "{{ 'conflict' in claim_error_text_lower or ('already' in claim_error_text_lower and 'claim' in claim_error_text_lower) }}"
    post_conflict_message: >-
      {{
        'Intersight reports the device is already claimed.'
        if ('already' in claim_error_text_lower and 'claim' in claim_error_text_lower)
        else 'Intersight reported a conflict while attempting the claim.'
      }}
    post_evidence_required: true
    post_evidence_found: "{{ saas_registration_found | default(false) | bool }}"
    post_evidence_missing_reason: registration_not_found
    post_evidence_missing_message: "SaaS claim submission returned, but no device registration evidence was found."
    post_success_status: submitted
    post_success_reason: claimed_and_configured
    post_success_message: "Claim submitted successfully."
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - effective_target_context.claim_submission_required | default(true) | bool
  tags:
    - claim
    - aggregate

- name: Record SaaS claim result
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_direct_claim_result.yaml"
  vars:
    direct_claim_target_id: "{{ effective_target_context.target_id | default(claim_target_context.target_id | default('')) }}"
    direct_claim_target_category: "{{ effective_target_context.target_category | default(claim_target_context.target_category | default('unknown')) }}"
    direct_claim_serial: "{{ effective_target_context.serial | default(claim_target_context.serial | default('')) }}"
    direct_claim_mgmt_ip: "{{ effective_target_context.mgmt_ip | default(claim_target_context.mgmt_ip | default('')) }}"
    direct_claim_form_factor: "{{ effective_target_context.form_factor | default(claim_target_context.form_factor | default('')) }}"
    direct_claim_management_type: "{{ effective_target_context.management_type | default(claim_target_context.management_type | default('')) }}"
    direct_claim_canonical_endpoint: "{{ resolved_endpoint }}"
    direct_claim_execution_mode: saas_claim
    direct_claim_status: "{{ post_operation_status }}"
    direct_claim_reason: "{{ post_operation_reason }}"
    direct_claim_message: "{{ post_operation_message }}"
    direct_claim_include_changed: true
    direct_claim_changed: "{{ saas_claim_result.changed | default(false) | bool }}"
    direct_claim_include_device_type: true
    direct_claim_device_type: "{{ effective_target_context.device_type | default(effective_target_context.target_category | default('unknown')) }}"
    direct_claim_include_registration_fields: true
    direct_claim_registration_found: "{{ saas_registration_found | default(false) | bool }}"
    direct_claim_registration_moid: "{{ claimed_registration_moid | default('') }}"
  when:
    - claim_result is not defined
    - not (claim_duplicate_detected | default(false) | bool)
    - effective_target_context.claim_submission_required | default(true) | bool
  tags:
    - claim
    - aggregate

- name: Collect SaaS claim result for target on localhost
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_collect_claim_result.yaml"
  vars:
    claim_success_statuses:
      - successful
      - submitted
      - already_claimed
    claim_track_seen_map: true
  tags:
    - aggregate
