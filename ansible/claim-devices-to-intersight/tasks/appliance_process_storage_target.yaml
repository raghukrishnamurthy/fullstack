---
- name: Resolve appliance storage claim target context
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_context.yaml"
  vars:
    claim_normalized_key_fallback: "{{ (hostvars[inventory_hostname].claim_target_context | default({})).target_id | default('') }}"
  tags:
    - claim
    - aggregate

- name: Resolve appliance storage target type
  ansible.builtin.set_fact:
    storage_platform: "{{ claim_target_context.storage_platform | default('') | string | trim | lower }}"
    assist_name: "{{ claim_target_context.assist_name | default('') | string | trim }}"
  tags:
    - claim
    - aggregate

- name: Resolve appliance storage target type mapping
  ansible.builtin.set_fact:
    storage_target_type: >-
      {{
        {
          'pure': 'PureStorageFlashArray'
        }.get(storage_platform, '')
      }}
  tags:
    - claim
    - aggregate

- name: Resolve appliance storage claim credentials
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_credentials.yaml"
  vars:
    claim_credentials_no_log: true
  tags:
    - claim
    - aggregate

- name: Validate appliance storage claim inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | length > 0
      - storage_target_type | length > 0
      - assist_name | length > 0
      - claim_target_username | length > 0
      - claim_target_password | length > 0
    fail_msg: "Storage claim requires endpoint, supported platform, assist name, username, and password"
  tags:
    - claim
    - verify

- name: Lookup existing appliance storage target
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: existing_storage_target_lookup
  failed_when: false
  tags:
    - claim
    - verify

- name: Record existing appliance storage target without resubmission
  ansible.builtin.set_fact:
    existing_storage_target: "{{ existing_storage_target_lookup.api_response | default([]) | first | default({}) }}"
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Record existing appliance storage target without resubmission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: appliance_storage_target_claim
    static_storage_status: already_claimed
    static_storage_reason: already_compliant
    static_storage_message: "Storage target already exists and does not require appliance claim resubmission."
    static_storage_include_executed: true
    static_storage_executed: false
    static_storage_include_target_fields: true
    static_storage_target_moid: "{{ existing_storage_target.Moid | default('') }}"
    static_storage_target_status: "{{ existing_storage_target.Status | default('') }}"
    static_storage_target_workflow_moid: "{{ (existing_storage_target.WorkflowInfo | default({})).Moid | default('') }}"
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Normalize Assist readiness wait configuration for appliance storage claim
  ansible.builtin.set_fact:
    storage_assist_wait_interval_seconds_normalized: "{{ [storage_assist_wait_interval_seconds | int, 1] | max }}"
    storage_assist_wait_timeout_seconds_normalized: "{{ [storage_assist_wait_timeout_seconds | int, 0] | max }}"
    storage_assist_wait_retries: >-
      {{
        [
          (
            (
              (
                ([storage_assist_wait_timeout_seconds | int, 0] | max) | float
              ) / (
                ([storage_assist_wait_interval_seconds | int, 1] | max) | float
              )
            ) | round(0, 'ceil') | int
          ),
          1
        ] | max
      }}
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Lookup referenced Assist target on appliance until Connected
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq 'IntersightAssist' and Name eq '{{ assist_name }}'"
      $top: 2
    return_list: true
  register: storage_assist_lookup
  failed_when: false
  ignore_errors: true
  retries: "{{ storage_assist_wait_retries }}"
  delay: "{{ storage_assist_wait_interval_seconds_normalized }}"
  until: >-
    (storage_assist_lookup.api_response | default([]) | length) > 0
    and (
      ((storage_assist_lookup.api_response | default([]) | first | default({})).Status | default('') | string | lower)
      == 'connected'
    )
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Resolve appliance account reference for storage target creation
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /iam/Accounts
    query_params:
      $top: 1
    return_list: true
  register: appliance_account_lookup
  failed_when: false
  tags:
    - claim
    - verify

- name: Record missing Assist lookup for appliance storage claim
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: appliance_storage_target_claim
    static_storage_status: failed
    static_storage_reason: assist_not_found
    static_storage_message: "Storage target Assist '{{ assist_name }}' was not found in the current appliance control plane after waiting {{ storage_assist_wait_timeout_seconds_normalized | default(storage_assist_wait_timeout_seconds | int) }} seconds."
    static_storage_include_executed: true
    static_storage_executed: false
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) == 0
  tags:
    - claim
    - aggregate

- name: Record unusable Assist state for appliance storage claim
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: appliance_storage_target_claim
    static_storage_status: failed
    static_storage_reason: assist_not_ready
    static_storage_message: "Storage target Assist '{{ assist_name }}' exists but did not reach Connected within {{ storage_assist_wait_timeout_seconds_normalized | default(storage_assist_wait_timeout_seconds | int) }} seconds."
    static_storage_include_executed: true
    static_storage_executed: false
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) > 0
    - (((storage_assist_lookup.api_response | default([]) | first | default({})).Status | default('') | string | lower) != 'connected')
  tags:
    - claim
    - aggregate

- name: Build appliance storage target request body
  ansible.builtin.set_fact:
    appliance_storage_target_request_body:
      Name: "{{ resolved_endpoint }}"
      TargetType: "{{ storage_target_type }}"
      ManagementLocation: IntersightAssist
      Account:
        ClassId: mo.MoRef
        ObjectType: iam.Account
        Moid: "{{ (appliance_account_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Assist:
        ClassId: mo.MoRef
        ObjectType: asset.Target
        Moid: "{{ (storage_assist_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Connections:
        - ClassId: asset.HttpConnection
          ObjectType: asset.HttpConnection
          ManagementAddress: "{{ resolved_endpoint }}"
          Port: 443
          IsSecure: true
          Credential:
            ClassId: asset.UsernamePasswordCredential
            ObjectType: asset.UsernamePasswordCredential
            Username: "{{ claim_target_username }}"
            Password: "{{ claim_target_password }}"
      Services:
        - ClassId: asset.WorkloadOptimizerService
          ObjectType: asset.WorkloadOptimizerService
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Submit appliance storage target claim
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    update_method: post
    api_body: "{{ appliance_storage_target_request_body }}"
  register: appliance_storage_claim_result
  failed_when: false
  retries: "{{ storage_assist_wait_retries }}"
  delay: "{{ storage_assist_wait_interval_seconds_normalized }}"
  until: >-
    not (
      (
        ((appliance_storage_claim_result.msg | default('')) ~ ' ' ~ (appliance_storage_claim_result.api_response | default({}) | to_json))
        | lower
      ) is search('aurora_target_assist_not_setup')
    )
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Derive appliance storage claim error text
  ansible.builtin.set_fact:
    storage_claim_error_text: "{{ (appliance_storage_claim_result.msg | default('')) ~ ' ' ~ (appliance_storage_claim_result.api_response | default({}) | to_json) }}"
    storage_claim_error_text_lower: "{{ ((appliance_storage_claim_result.msg | default('')) ~ ' ' ~ (appliance_storage_claim_result.api_response | default({}) | to_json)) | lower }}"
  when:
    - claim_result is not defined
    - appliance_storage_claim_result is defined
  tags:
    - claim

- name: Verify appliance storage target appears after submission
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: submitted_storage_target_lookup
  failed_when: false
  ignore_errors: true
  retries: "{{ storage_assist_wait_retries }}"
  delay: "{{ storage_assist_wait_interval_seconds_normalized }}"
  until: >-
    (submitted_storage_target_lookup.api_response | default([]) | length) > 0
  when:
    - claim_result is not defined
    - appliance_storage_claim_result is defined
    - not (appliance_storage_claim_result.failed | default(false) | bool)
    - "'already exists' not in (storage_claim_error_text_lower | default(''))"
    - "'conflict' not in (storage_claim_error_text_lower | default(''))"
  tags:
    - claim
    - verify

- name: Record missing appliance storage target after submission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_storage_claim_result.yaml"
  vars:
    static_storage_execution_mode: appliance_storage_target_claim
    static_storage_status: failed
    static_storage_reason: claim_not_visible_after_submission
    static_storage_message: "Storage target claim submission completed but the target did not appear in the appliance control plane within {{ storage_assist_wait_timeout_seconds_normalized | default(storage_assist_wait_timeout_seconds | int) }} seconds."
    static_storage_include_executed: true
    static_storage_executed: true
  when:
    - claim_result is not defined
    - appliance_storage_claim_result is defined
    - not (appliance_storage_claim_result.failed | default(false) | bool)
    - "'already exists' not in (storage_claim_error_text_lower | default(''))"
    - "'conflict' not in (storage_claim_error_text_lower | default(''))"
    - (submitted_storage_target_lookup.api_response | default([]) | length) == 0
  tags:
    - claim
    - aggregate

- name: Record appliance storage claim result
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_storage_claim_result.yaml"
  vars:
    storage_claim_execution_mode: appliance_storage_target_claim
    storage_claim_api_failed: "{{ appliance_storage_claim_result.failed | default(false) | bool }}"
    storage_claim_api_message: "{{ appliance_storage_claim_result.msg | default('Storage target claim submission failed') }}"
    storage_claim_api_response: >-
      {{
        (submitted_storage_target_lookup.api_response | default([]) | first | default({}))
        if (
          (submitted_storage_target_lookup is defined)
          and ((submitted_storage_target_lookup.api_response | default([]) | length) > 0)
        )
        else (appliance_storage_claim_result.api_response | default({}))
      }}
    storage_claim_conflict_message: "Appliance reported a conflict while attempting the storage claim."
    storage_claim_include_execution_payload: true
    storage_claim_execution_payload:
      requested: true
      executed: true
      execution_mode: appliance_storage_target_claim
      status: >-
        {{
          'failed'
          if (
            (appliance_storage_claim_result.failed | default(false) | bool)
            or ('aurora_target_assist_not_setup' in (storage_claim_error_text_lower | default('')))
          )
          else 'submitted'
        }}
      reason: >-
        {{
          'assist_not_setup'
          if ('aurora_target_assist_not_setup' in (storage_claim_error_text_lower | default('')))
          else (
            'claim_submission_failed'
            if (appliance_storage_claim_result.failed | default(false) | bool)
            else 'claimed_and_configured'
          )
        }}
      payload:
        endpoint: "{{ resolved_endpoint }}"
        normalized_claim_key: "{{ normalized_claim_key }}"
        target_type: "{{ storage_target_type }}"
        assist_name: "{{ assist_name }}"
        api_response: >-
          {{
            (submitted_storage_target_lookup.api_response | default([]) | first | default({}))
            if (
              (submitted_storage_target_lookup is defined)
              and ((submitted_storage_target_lookup.api_response | default([]) | length) > 0)
            )
            else (appliance_storage_claim_result.api_response | default({}))
          }}
        changed: "{{ appliance_storage_claim_result.changed | default(false) | bool }}"
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Append appliance storage claim result to aggregate
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_collect_claim_result.yaml"
  tags:
    - claim
    - aggregate
