---
- name: Resolve appliance storage claim target context
  ansible.builtin.set_fact:
    claim_target_context: "{{ hostvars[inventory_hostname].claim_target_context | default({}) }}"
    resolved_endpoint: "{{ (claim_target_context.endpoint | default(claim_target_context.canonical_endpoint | default(''))) | string | trim }}"
    storage_platform: "{{ claim_target_context.storage_platform | default('') | string | trim | lower }}"
    assist_name: "{{ claim_target_context.assist_name | default('') | string | trim }}"
    normalized_claim_key: >-
      {{
        (
          claim_target_context.normalized_claim_key
          | default(claim_target_context.target_id | default(resolved_endpoint))
        )
        | string
        | trim
      }}
  tags:
    - claim
    - aggregate

- name: Resolve appliance storage target type
  ansible.builtin.set_fact:
    storage_target_type: >-
      {{
        {
          'pure': 'PureStorageFlashArray'
        }.get(storage_platform, '')
      }}
    claim_target_username: "{{ claim_target_context.claim_username | default('') | string | trim }}"
    claim_target_password_ref: "{{ claim_target_context.claim_password_ref | default('') | string | trim }}"
    claim_target_password_direct: "{{ claim_target_context.claim_password | default('') | string }}"
    claim_target_password_env_name: >-
      {{
        (claim_target_context.claim_password_ref | regex_replace('^env://', ''))
        if (
          (claim_target_context.claim_password_ref | default('') | string | trim | length) > 0
          and (claim_target_context.claim_password_ref | string).startswith('env://')
        )
        else ''
      }}
  tags:
    - claim
    - aggregate

- name: Resolve appliance storage target password value
  ansible.builtin.set_fact:
    claim_target_password: >-
      {{
        claim_target_password_direct
        if (claim_target_password_direct | trim | length) > 0
        else
        lookup('ansible.builtin.env', claim_target_password_env_name)
        if (claim_target_password_env_name | string | trim | length) > 0
        else ''
      }}
  no_log: true
  tags:
    - claim
    - aggregate

- name: Validate appliance storage claim inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | length > 0
      - storage_target_type | length > 0
      - assist_name | length > 0
      - claim_target_username | length > 0
      - claim_target_password | length > 0
    fail_msg: "Storage claim requires endpoint, supported platform, assist name, username, and password"
  tags:
    - claim
    - verify

- name: Lookup referenced Assist target on appliance
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq 'IntersightAssist' and Name eq '{{ assist_name }}'"
      $top: 2
    return_list: true
  register: storage_assist_lookup
  failed_when: false
  tags:
    - claim
    - verify

- name: Lookup existing appliance storage target
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    query_params:
      $filter: "TargetType eq '{{ storage_target_type }}' and Name eq '{{ resolved_endpoint }}'"
      $top: 1
    return_list: true
  register: existing_storage_target_lookup
  failed_when: false
  tags:
    - claim
    - verify

- name: Resolve appliance account reference for storage target creation
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /iam/Accounts
    query_params:
      $top: 1
    return_list: true
  register: appliance_account_lookup
  failed_when: false
  tags:
    - claim
    - verify

- name: Record missing Assist lookup for appliance storage claim
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: appliance_storage_target_claim
      executed: false
      status: failed
      reason: assist_not_found
      deployment_name: "{{ internal_deployment_name | default('') }}"
      messages:
        - "Storage target Assist '{{ assist_name }}' was not found in the current appliance control plane."
  when:
    - (storage_assist_lookup.api_response | default([]) | length) == 0
  tags:
    - claim
    - aggregate

- name: Record unusable Assist state for appliance storage claim
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      organization: "{{ internal_organization | default('') }}"
      device_type: storage
      normalized_claim_key: "{{ normalized_claim_key }}"
      execution_mode: appliance_storage_target_claim
      executed: false
      status: failed
      reason: assist_not_ready
      deployment_name: "{{ internal_deployment_name | default('') }}"
      messages:
        - "Storage target Assist '{{ assist_name }}' exists but is not Connected."
  when:
    - claim_result is not defined
    - (storage_assist_lookup.api_response | default([]) | length) > 0
    - (((storage_assist_lookup.api_response | default([]) | first | default({})).Status | default('') | string | lower) != 'connected')
  tags:
    - claim
    - aggregate

- name: Record existing appliance storage target without resubmission
  ansible.builtin.set_fact:
    existing_storage_target: "{{ existing_storage_target_lookup.api_response | default([]) | first | default({}) }}"
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      normalized_claim_key: "{{ normalized_claim_key }}"
      deployment_name: "{{ internal_deployment_name | default('') }}"
      organization: "{{ internal_organization | default('') }}"
      execution_mode: appliance_storage_target_claim
      executed: false
      status: already_claimed
      reason: already_compliant
      target_moid: "{{ existing_storage_target.Moid | default('') }}"
      target_status: "{{ existing_storage_target.Status | default('') }}"
      target_workflow_moid: "{{ (existing_storage_target.WorkflowInfo | default({})).Moid | default('') }}"
      messages:
        - "Storage target already exists and does not require appliance claim resubmission."
  when:
    - claim_result is not defined
    - (existing_storage_target_lookup.api_response | default([]) | length) > 0
  tags:
    - claim
    - aggregate

- name: Build appliance storage target request body
  ansible.builtin.set_fact:
    appliance_storage_target_request_body:
      Name: "{{ resolved_endpoint }}"
      TargetType: "{{ storage_target_type }}"
      ManagementLocation: IntersightAssist
      Account:
        ClassId: mo.MoRef
        ObjectType: iam.Account
        Moid: "{{ (appliance_account_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Assist:
        ClassId: mo.MoRef
        ObjectType: asset.Target
        Moid: "{{ (storage_assist_lookup.api_response | default([]) | first | default({})).Moid | default('') }}"
      Connections:
        - ClassId: asset.HttpConnection
          ObjectType: asset.HttpConnection
          ManagementAddress: "{{ resolved_endpoint }}"
          Port: 443
          IsSecure: true
          Credential:
            ClassId: asset.UsernamePasswordCredential
            ObjectType: asset.UsernamePasswordCredential
            Username: "{{ claim_target_username }}"
            Password: "{{ claim_target_password }}"
      Services:
        - ClassId: asset.WorkloadOptimizerService
          ObjectType: asset.WorkloadOptimizerService
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Submit appliance storage target claim
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /asset/Targets
    update_method: post
    api_body: "{{ appliance_storage_target_request_body }}"
  register: appliance_storage_claim_result
  failed_when: false
  no_log: true
  when: claim_result is not defined
  tags:
    - claim

- name: Derive appliance storage claim error text
  ansible.builtin.set_fact:
    storage_claim_error_text: "{{ (appliance_storage_claim_result.msg | default('')) ~ ' ' ~ (appliance_storage_claim_result.api_response | default({}) | to_json) }}"
    storage_claim_error_text_lower: "{{ ((appliance_storage_claim_result.msg | default('')) ~ ' ' ~ (appliance_storage_claim_result.api_response | default({}) | to_json)) | lower }}"
  when:
    - claim_result is not defined
    - appliance_storage_claim_result is defined
  tags:
    - claim

- name: Record appliance storage claim result
  ansible.builtin.set_fact:
    claim_result:
      target_id: "{{ claim_target_context.target_id | default('') }}"
      target_category: storage
      serial: ''
      mgmt_ip: ''
      form_factor: ''
      management_type: "{{ claim_target_context.management_type | default('assist_managed') }}"
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      normalized_claim_key: "{{ normalized_claim_key }}"
      deployment_name: "{{ internal_deployment_name | default('') }}"
      organization: "{{ internal_organization | default('') }}"
      execution_mode: appliance_storage_target_claim
      executed: true
      status: >-
        {%- if (appliance_storage_claim_result.failed | default(false) | bool) -%}
        failed
        {%- elif 'already exists' in storage_claim_error_text_lower -%}
        already_claimed
        {%- elif 'conflict' in storage_claim_error_text_lower -%}
        conflict
        {%- else -%}
        submitted
        {%- endif -%}
      reason: >-
        {%- if (appliance_storage_claim_result.failed | default(false) | bool) -%}
        claim_submission_failed
        {%- elif 'already exists' in storage_claim_error_text_lower -%}
        already_compliant
        {%- elif 'conflict' in storage_claim_error_text_lower -%}
        conflict
        {%- else -%}
        claimed_and_configured
        {%- endif -%}
      target_moid: "{{ (appliance_storage_claim_result.api_response | default({})).Moid | default('') }}"
      target_status: "{{ (appliance_storage_claim_result.api_response | default({})).Status | default('') }}"
      target_workflow_moid: "{{ ((appliance_storage_claim_result.api_response | default({})).WorkflowInfo | default({})).Moid | default('') }}"
      assist_name: "{{ assist_name }}"
      storage_platform: "{{ storage_platform }}"
      messages:
        - >-
          {%- if (appliance_storage_claim_result.failed | default(false) | bool) -%}
          {{ appliance_storage_claim_result.msg | default('Storage target claim submission failed') }}
          {%- elif 'already exists' in storage_claim_error_text_lower -%}
          Storage target already exists.
          {%- elif 'conflict' in storage_claim_error_text_lower -%}
          Appliance reported a conflict while attempting the storage claim.
          {%- else -%}
          Storage target claim submitted successfully.
          {%- endif -%}
      appliance_claim_execution:
        requested: true
        executed: true
        execution_mode: appliance_storage_target_claim
        status: "{{ 'failed' if (appliance_storage_claim_result.failed | default(false) | bool) else 'submitted' }}"
        reason: >-
          {{
            'claim_submission_failed'
            if (appliance_storage_claim_result.failed | default(false) | bool)
            else 'claimed_and_configured'
          }}
        payload:
          endpoint: "{{ resolved_endpoint }}"
          normalized_claim_key: "{{ normalized_claim_key }}"
          target_type: "{{ storage_target_type }}"
          assist_name: "{{ assist_name }}"
          api_response: "{{ appliance_storage_claim_result.api_response | default({}) }}"
          changed: "{{ appliance_storage_claim_result.changed | default(false) | bool }}"
  when: claim_result is not defined
  tags:
    - claim
    - aggregate

- name: Append appliance storage claim result to aggregate
  ansible.builtin.set_fact:
    claim_results: "{{ (hostvars['localhost'].claim_results | default([])) + [claim_result] }}"
    successful_result_items: >-
      {{
        (hostvars['localhost'].successful_result_items | default([]))
        + ([claim_result] if (claim_result.status | default('')) in ['submitted', 'already_claimed'] else [])
      }}
    failed_result_items: >-
      {{
        (hostvars['localhost'].failed_result_items | default([]))
        + ([claim_result] if (claim_result.status | default('')) == 'failed' else [])
      }}
    conflict_result_items: >-
      {{
        (hostvars['localhost'].conflict_result_items | default([]))
        + ([claim_result] if (claim_result.status | default('')) == 'conflict' else [])
      }}
    skipped_result_items: >-
      {{
        (hostvars['localhost'].skipped_result_items | default([]))
        + ([claim_result] if (claim_result.status | default('')) == 'skipped' else [])
      }}
    changed_result_items: >-
      {{
        (hostvars['localhost'].changed_result_items | default([]))
        + ([claim_result] if (claim_result.executed | default(false) | bool and (claim_result.status | default('')) == 'submitted') else [])
      }}
  delegate_to: localhost
  delegate_facts: true
  tags:
    - claim
    - aggregate
