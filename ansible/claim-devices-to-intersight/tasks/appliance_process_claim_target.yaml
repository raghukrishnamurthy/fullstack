---
- name: Resolve appliance claim target context
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_context.yaml"
  vars:
    claim_normalized_key_fallback: "{{ (hostvars[inventory_hostname].claim_target_context | default({})).claim_key | default('') }}"
  tags:
    - claim
    - aggregate

- name: Resolve appliance claim platform type
  ansible.builtin.set_fact:
    pva_claim_platform_type: >-
      {{
        claim_target_context.platform_type
        | default(
            'IMCRack'
            if (
              (claim_target_context.target_category | default('')) == 'server'
              and (claim_target_context.form_factor | default('')) == 'rack'
              and (claim_target_context.management_type | default('')) == 'standalone'
            )
            else (
              'UCSFIISM'
              if ((claim_target_context.target_category | default('')) == 'fabric_interconnect')
              else (
                'IntersightAssist'
                if ((claim_target_context.target_category | default('')) == 'assist')
                else ''
              )
            )
          )
      }}
  tags:
    - claim
    - aggregate

- name: Resolve appliance claim credentials
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_claim_credentials.yaml"
  vars:
    claim_use_selected_target_credential: true
    claim_credentials_no_log: false
  tags:
    - claim
    - aggregate

- name: Record appliance target as already claimed without resubmission
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_static_direct_claim_result.yaml"
  vars:
    static_direct_canonical_endpoint: "{{ claim_target_context.canonical_endpoint | default(resolved_endpoint) }}"
    static_direct_execution_mode: appliance_claim
    static_direct_status: already_claimed
    static_direct_reason: already_compliant
    static_direct_message: "Claim target is already claimed and does not require appliance claim submission."
    static_direct_include_executed: true
    static_direct_executed: false
    static_direct_include_execution_payload: true
    static_direct_execution_payload:
      requested: false
      executed: false
      execution_mode: appliance_claim
      status: already_claimed
      reason: already_compliant
      payload:
        endpoint: "{{ resolved_endpoint }}"
        canonical_endpoint: "{{ claim_target_context.canonical_endpoint | default(resolved_endpoint) }}"
        normalized_claim_key: "{{ normalized_claim_key }}"
        platform_type: "{{ pva_claim_platform_type }}"
        username: "{{ claim_target_username }}"
  when: not (claim_target_context.claim_submission_required | default(true) | bool)
  tags:
    - claim
    - aggregate

- name: Validate appliance claim-ready target inputs
  ansible.builtin.assert:
    that:
      - resolved_endpoint | string | trim | length > 0
      - claim_target_username | string | trim | length > 0
      - claim_target_password | string | trim | length > 0
      - pva_claim_platform_type | string | trim | length > 0
    fail_msg: "Claim target is missing endpoint, platform type, or target credential required for appliance claim"
  when: claim_result is not defined
  tags:
    - claim
    - verify

- name: Validate Assist claim endpoint uses FQDN for appliance claim
  ansible.builtin.assert:
    that:
      - not ((resolved_endpoint | default('')) is match('^\\d{1,3}(\\.\\d{1,3}){3}$'))
    fail_msg: "Assist appliance claim requires endpoint to be a fully qualified domain name (FQDN), not an IP address"
  when:
    - claim_result is not defined
    - (claim_target_context.target_category | default('')) == 'assist'
  tags:
    - claim
    - verify

- name: Build appliance claim request body
  ansible.builtin.set_fact:
    pva_claim_request_body:
      Hostname: "{{ resolved_endpoint }}"
      Username: "{{ claim_target_username }}"
      Password: "{{ claim_target_password }}"
      PlatformType: "{{ pva_claim_platform_type }}"
  no_log: false
  when: claim_result is not defined
  tags:
    - claim

- name: Submit appliance claim request
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ claim_api_key_id }}"
    api_private_key: "{{ claim_api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    use_proxy: false
    validate_certs: "{{ claim_validate_certs | default(false) | bool }}"
    resource_path: /appliance/DeviceClaims
    update_method: post
    api_body: "{{ pva_claim_request_body }}"
  register: pva_appliance_claim_result
  failed_when: false
  no_log: false
  when: claim_result is not defined
  tags:
    - claim

- name: Derive appliance claim error text
  ansible.builtin.set_fact:
    pva_claim_error_text: "{{ (pva_appliance_claim_result.msg | default('')) ~ ' ' ~ (pva_appliance_claim_result.api_response | default({}) | to_json) }}"
    pva_claim_error_text_lower: "{{ (((pva_appliance_claim_result.msg | default('')) ~ ' ' ~ (pva_appliance_claim_result.api_response | default({}) | to_json)) | lower) }}"
    pva_claim_transport_failed: >-
      {{
        (pva_appliance_claim_result.failed | default(false) | bool)
        or ('request failed' in ((((pva_appliance_claim_result.msg | default('')) ~ ' ' ~ (pva_appliance_claim_result.api_response | default({}) | to_json)) | lower)))
        or ('code exception' in ((((pva_appliance_claim_result.msg | default('')) ~ ' ' ~ (pva_appliance_claim_result.api_response | default({}) | to_json)) | lower)))
        or ('urlopen error' in ((((pva_appliance_claim_result.msg | default('')) ~ ' ' ~ (pva_appliance_claim_result.api_response | default({}) | to_json)) | lower)))
      }}
  when:
    - claim_result is not defined
    - pva_appliance_claim_result is defined
  tags:
    - claim

- name: Record appliance claim result
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_post_operation_outcome.yaml"
  vars:
    post_api_failed: "{{ pva_claim_transport_failed | default(false) | bool }}"
    post_failure_reason: claim_submission_failed
    post_failure_message: "{{ pva_appliance_claim_result.msg | default('Claim submission failed') }}"
    post_already_claimed: >-
      {{
        ('already' in pva_claim_error_text_lower and 'claim' in pva_claim_error_text_lower)
        or ('already exists' in pva_claim_error_text_lower)
      }}
    post_already_claimed_reason: already_compliant
    post_already_claimed_message: "Claim target is already claimed and compliant."
    post_conflict: "{{ 'conflict' in pva_claim_error_text_lower }}"
    post_conflict_message: "{{ pva_appliance_claim_result.msg | default('Appliance reported a conflict while attempting the claim.') }}"
    post_evidence_required: false
    post_success_status: submitted
    post_success_reason: claimed_and_configured
    post_success_message: "{{ pva_appliance_claim_result.msg | default('Claim submitted successfully.') }}"
  no_log: false
  when: claim_result is not defined
  tags:
    - claim

- name: Record appliance claim result
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_build_direct_claim_result.yaml"
  vars:
    direct_claim_target_id: "{{ claim_target_context.target_id | default('') }}"
    direct_claim_target_category: "{{ claim_target_context.target_category | default('unknown') }}"
    direct_claim_serial: "{{ claim_target_context.serial | default('') }}"
    direct_claim_mgmt_ip: "{{ claim_target_context.mgmt_ip | default('') }}"
    direct_claim_form_factor: "{{ claim_target_context.form_factor | default('') }}"
    direct_claim_management_type: "{{ claim_target_context.management_type | default('') }}"
    direct_claim_canonical_endpoint: "{{ claim_target_context.canonical_endpoint | default(resolved_endpoint) }}"
    direct_claim_execution_mode: appliance_claim
    direct_claim_status: "{{ post_operation_status }}"
    direct_claim_reason: "{{ post_operation_reason }}"
    direct_claim_message: "{{ post_operation_message }}"
    direct_claim_include_executed: true
    direct_claim_executed: true
    direct_claim_include_execution_payload: true
    direct_claim_execution_payload:
      requested: true
      executed: true
      execution_mode: appliance_claim
      status: "{{ direct_claim_status }}"
      reason: "{{ direct_claim_reason }}"
      payload:
        endpoint: "{{ resolved_endpoint }}"
        canonical_endpoint: "{{ claim_target_context.canonical_endpoint | default(resolved_endpoint) }}"
        normalized_claim_key: "{{ normalized_claim_key }}"
        platform_type: "{{ pva_claim_platform_type }}"
        username: "{{ claim_target_username }}"
        api_response: "{{ pva_appliance_claim_result.api_response | default({}) }}"
        changed: "{{ pva_appliance_claim_result.changed | default(false) | bool }}"
  no_log: false
  when: claim_result is not defined
  tags:
    - claim

- name: Append appliance claim result to aggregate
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_collect_claim_result.yaml"
  tags:
    - claim
    - aggregate
