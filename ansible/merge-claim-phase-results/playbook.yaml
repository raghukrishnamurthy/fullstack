---
- name: Merge phased claim result sets
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    assist_results_input: "{{ assist_results_json | default([]) }}"
    direct_results_input: "{{ direct_results_json | default([]) }}"
    assist_dependent_results_input: "{{ assist_dependent_results_json | default([]) }}"

  pre_tasks:
    - name: Normalize merge-claim-phase-results inputs
      ansible.builtin.set_fact:
        assist_results: >-
          {{
            assist_results_input
            if (assist_results_input is not string)
            else (
              (assist_results_input | from_yaml)
              if (assist_results_input | string | trim | length) > 0
              else []
            )
          }}
        direct_results: >-
          {{
            direct_results_input
            if (direct_results_input is not string)
            else (
              (direct_results_input | from_yaml)
              if (direct_results_input | string | trim | length) > 0
              else []
            )
          }}
        assist_dependent_results: >-
          {{
            assist_dependent_results_input
            if (assist_dependent_results_input is not string)
            else (
              (assist_dependent_results_input | from_yaml)
              if (assist_dependent_results_input | string | trim | length) > 0
              else []
            )
          }}
      tags:
        - always
        - validate

    - name: Validate merge-claim-phase-results contract
      ansible.builtin.assert:
        that:
          - assist_results | type_debug == 'list'
          - direct_results | type_debug == 'list'
          - assist_dependent_results | type_debug == 'list'
        fail_msg: "merge-claim-phase-results requires result payloads as JSON or YAML lists"
      tags:
        - always
        - validate

  tasks:
    - name: Build merged claim results
      ansible.builtin.set_fact:
        claim_results: "{{ assist_results + direct_results + assist_dependent_results }}"
        successful_result_items: >-
          {{
            (assist_results + direct_results + assist_dependent_results)
            | selectattr('status', 'defined')
            | selectattr('status', 'in', ['successful', 'submitted', 'already_claimed'])
            | list
          }}
        failed_result_items: >-
          {{
            (assist_results + direct_results + assist_dependent_results)
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'failed')
            | list
          }}
        conflict_result_items: >-
          {{
            (assist_results + direct_results + assist_dependent_results)
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'conflict')
            | list
          }}
        skipped_result_items: >-
          {{
            (assist_results + direct_results + assist_dependent_results)
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'skipped')
            | list
          }}
        changed_result_items: >-
          {{
            (assist_results + direct_results + assist_dependent_results)
            | selectattr('changed', 'defined')
            | selectattr('changed', 'equalto', true)
            | list
          }}
      tags:
        - merge
        - aggregate

    - name: Build merged claim aggregate outputs
      ansible.builtin.set_fact:
        batch_status: "{{ 'failed' if (failed_result_items | length) > 0 else 'successful' }}"
        successful_targets: "{{ successful_result_items | length | string }}"
        failed_targets: "{{ failed_result_items | length | string }}"
        conflict_targets: "{{ conflict_result_items | length | string }}"
        skipped_targets: "{{ skipped_result_items | length | string }}"
        changed_targets: "{{ changed_result_items | length | string }}"
        results_json: "{{ claim_results | to_json }}"
        normalized_claim_results:
          summary:
            total_results: "{{ claim_results | length }}"
            appliance_result_count: "{{ claim_results | selectattr('execution_mode', 'defined') | selectattr('execution_mode', 'equalto', 'appliance_claim') | list | length }}"
            saas_result_count: "{{ claim_results | selectattr('execution_mode', 'defined') | selectattr('execution_mode', 'equalto', 'saas_claim') | list | length }}"
            successful_count: "{{ successful_result_items | length }}"
            failed_count: "{{ failed_result_items | length }}"
            conflict_count: "{{ conflict_result_items | length }}"
            skipped_count: "{{ skipped_result_items | length }}"
            changed_count: "{{ changed_result_items | length }}"
            batch_status: "{{ 'failed' if (failed_result_items | length) > 0 else 'successful' }}"
          results: "{{ claim_results }}"
      tags:
        - merge
        - outputs

    - name: Finalize merged claim aggregate outputs
      ansible.builtin.set_fact:
        normalized_claim_results_json: "{{ normalized_claim_results | to_json }}"
        normalized_claim_batch_status: "{{ normalized_claim_results.summary.batch_status }}"
        normalized_claim_successful_count: "{{ normalized_claim_results.summary.successful_count | string }}"
        normalized_claim_failed_count: "{{ normalized_claim_results.summary.failed_count | string }}"
        normalized_claim_conflict_count: "{{ normalized_claim_results.summary.conflict_count | string }}"
        normalized_claim_skipped_count: "{{ normalized_claim_results.summary.skipped_count | string }}"
        normalized_claim_changed_count: "{{ normalized_claim_results.summary.changed_count | string }}"
      tags:
        - merge
        - outputs

    - name: Export merge-claim-phase-results outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          batch_status: "{{ batch_status }}"
          successful_targets: "{{ successful_targets }}"
          failed_targets: "{{ failed_targets }}"
          conflict_targets: "{{ conflict_targets }}"
          skipped_targets: "{{ skipped_targets }}"
          changed_targets: "{{ changed_targets }}"
          results_json: "{{ results_json }}"
          normalized_claim_results_json: "{{ normalized_claim_results_json }}"
          normalized_claim_batch_status: "{{ normalized_claim_batch_status }}"
          normalized_claim_successful_count: "{{ normalized_claim_successful_count }}"
          normalized_claim_failed_count: "{{ normalized_claim_failed_count }}"
          normalized_claim_conflict_count: "{{ normalized_claim_conflict_count }}"
          normalized_claim_skipped_count: "{{ normalized_claim_skipped_count }}"
          normalized_claim_changed_count: "{{ normalized_claim_changed_count }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
