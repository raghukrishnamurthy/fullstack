---
- name: Initialize Fabric Interconnect pair validation facts
  ansible.builtin.set_fact:
    fi_pair_errors_local: []
    fi_pair_records: "{{ fi_lookup_result.api_response | default([]) }}"
    fi_requested_serials: "{{ fi_lookup_result.query_batch.serial_numbers | default([]) }}"
  changed_when: false
  tags:
    - validate
    - intersight

- name: Flag invalid Fabric Interconnect pair size
  ansible.builtin.set_fact:
    fi_pair_errors_local: "{{ fi_pair_errors_local + ['FabricInterconnect fi_pair domains must resolve to exactly 2 serial numbers'] }}"
  when: fi_requested_serials | length != 2
  changed_when: false
  tags:
    - validate
    - intersight

- name: Flag missing Fabric Interconnect pair members
  ansible.builtin.set_fact:
    fi_pair_errors_local: "{{ fi_pair_errors_local + ['FabricInterconnect A/B pair validation requires both serials to be present in network/Elements'] }}"
  when: fi_pair_records | length != 2
  changed_when: false
  tags:
    - validate
    - intersight

- name: Flag mismatched Fabric Interconnect target ownership
  ansible.builtin.set_fact:
    fi_pair_errors_local: "{{ fi_pair_errors_local + ['FabricInterconnect serials are not part of the same target pair'] }}"
  when:
    - fi_pair_records | length == 2
    - (fi_pair_records | map(attribute='DeviceMoId') | unique | list | length) != 1
  changed_when: false
  tags:
    - validate
    - intersight

- name: Flag invalid Fabric Interconnect switch IDs
  ansible.builtin.set_fact:
    fi_pair_errors_local: "{{ fi_pair_errors_local + ['FabricInterconnect serials must resolve to one switch A and one switch B'] }}"
  when:
    - fi_pair_records | length == 2
    - (fi_pair_records | map(attribute='SwitchId') | sort | list) != ['A', 'B']
  changed_when: false
  tags:
    - validate
    - intersight

- name: Accumulate Fabric Interconnect pair validation failures
  ansible.builtin.set_fact:
    fi_pair_validation_errors: "{{ fi_pair_validation_errors + [fi_pair_failure] }}"
    intersight_not_ready_devices: "{{ intersight_not_ready_devices + [fi_pair_failure] }}"
  vars:
    fi_pair_failure:
      category: FabricInterconnect
      domain_id: "{{ fi_lookup_result.query_batch.domain_id | default('') }}"
      serial: "{{ fi_requested_serials | join(',') }}"
      status: invalid_pair
      discovery_field: "SwitchId+DeviceMoId"
      actual_discovery_state: >-
        {{
          fi_pair_records
          | map(attribute='Serial')
          | zip(fi_pair_records | map(attribute='SwitchId'), fi_pair_records | map(attribute='DeviceMoId'))
          | list
          | to_json
        }}
      allowed_discovery_states:
        - same DeviceMoId
        - SwitchId A/B pair
      error_messages: "{{ fi_pair_errors_local }}"
  when: fi_pair_errors_local | length > 0
  changed_when: false
  tags:
    - validate
    - intersight
