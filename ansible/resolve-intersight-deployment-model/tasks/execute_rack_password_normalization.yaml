---
- name: Resolve manufacturing credential secret refs for rack normalization
  ansible.builtin.set_fact:
    rack_normalization_manufacturing_password_ref: "{{ claim_target_payload.selected_manufacturing_credential.password_ref | default('') }}"
    rack_normalization_manufacturing_password_env_name: >-
      {{
        (
          claim_target_payload.selected_manufacturing_credential.password_ref | default('')
        )
        | regex_replace('^env://', '')
        if (
          (claim_target_payload.selected_manufacturing_credential.password_ref | default('')) is string
          and (claim_target_payload.selected_manufacturing_credential.password_ref | default('')).startswith('env://')
        )
        else ''
      }}
    rack_normalization_probe_allowed: >-
      {{
        (validation_mode | default('strict') | string | lower) in ['live', 'intersight_live']
      }}
  when: claim_target_payload.preclaim_normalization.required | default(false) | bool
  tags:
    - onboarding
    - action
    - normalization

- name: Resolve manufacturing credential secret value for rack normalization
  ansible.builtin.set_fact:
    rack_normalization_manufacturing_password: >-
      {{
        lookup('ansible.builtin.env', rack_normalization_manufacturing_password_env_name)
        if (rack_normalization_manufacturing_password_env_name | default('') | length > 0)
        else ''
      }}
  when: claim_target_payload.preclaim_normalization.required | default(false) | bool
  tags:
    - onboarding
    - action
    - normalization

- name: Probe Redfish root for rack normalization readiness
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/redfish/v1"
    method: GET
    user: "{{ claim_target_payload.selected_manufacturing_credential.username | default('') }}"
    password: "{{ rack_normalization_manufacturing_password }}"
    force_basic_auth: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    return_content: true
    status_code:
      - 200
      - 401
      - 403
    timeout: 15
  register: rack_redfish_root_probe
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - claim_target_payload.preclaim_normalization.required | default(false) | bool
    - claim_target_payload.preclaim_normalization.ready | default(false) | bool
    - rack_normalization_probe_allowed | default(false) | bool
    - (claim_target_payload.endpoint | default('') | string | trim | length) > 0
    - (claim_target_payload.selected_manufacturing_credential.username | default('') | string | trim | length) > 0
    - (rack_normalization_manufacturing_password | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - normalization
    - probe

- name: Build rack password normalization execution result
  ansible.builtin.set_fact:
    rack_password_normalization_execution_result:
      requested: "{{ claim_target_payload.preclaim_normalization.required | default(false) | bool }}"
      executed: false
      execution_mode: guarded_hook
      status: >-
        {{
          'normalization_probe_complete'
          if (
            (claim_target_payload.preclaim_normalization.ready | default(false) | bool)
            and (rack_normalization_probe_allowed | default(false) | bool)
            and (rack_redfish_root_probe is defined)
          )
          else 'normalization_probe_not_run'
          if (
            (claim_target_payload.preclaim_normalization.ready | default(false) | bool)
            and not (rack_normalization_probe_allowed | default(false) | bool)
          )
          else 'normalization_credentials_missing'
        }}
      reason: >-
        {{
          'Standalone rack target completed a non-mutating Redfish root probe using the manufacturing credential.'
          if (
            (claim_target_payload.preclaim_normalization.ready | default(false) | bool)
            and (rack_normalization_probe_allowed | default(false) | bool)
            and (rack_redfish_root_probe is defined)
          )
          else 'Standalone rack target is ready for password normalization, but live endpoint probing was not requested.'
          if (
            (claim_target_payload.preclaim_normalization.ready | default(false) | bool)
            and not (rack_normalization_probe_allowed | default(false) | bool)
          )
          else 'Standalone rack target is missing manufacturing and/or target credentials for password normalization.'
        }}
      payload:
        target_id: "{{ claim_target_payload.target_id }}"
        endpoint: "{{ claim_target_payload.endpoint }}"
        normalization_workflow: rack_password_normalization
        ready: "{{ claim_target_payload.preclaim_normalization.ready | default(false) | bool }}"
        manufacturing_credential:
          username: "{{ claim_target_payload.selected_manufacturing_credential.username | default('') }}"
          password_ref: "{{ claim_target_payload.selected_manufacturing_credential.password_ref | default('') }}"
        target_credential:
          username: "{{ claim_target_payload.selected_target_credential.username | default('') }}"
          password_ref: "{{ claim_target_payload.selected_target_credential.password_ref | default('') }}"
        probe:
          attempted: "{{ (rack_redfish_root_probe is defined) and not (rack_redfish_root_probe.skipped | default(false)) }}"
          status_code: "{{ rack_redfish_root_probe.status | default(0) }}"
          ok: "{{ (rack_redfish_root_probe is defined) and not (rack_redfish_root_probe.skipped | default(false)) and ((rack_redfish_root_probe.status | default(0) | int) == 200) }}"
          content_type: "{{ rack_redfish_root_probe.content_type | default('') }}"
  when: claim_target_payload.preclaim_normalization.required | default(false) | bool
  tags:
    - onboarding
    - action
    - normalization

- name: Build non-applicable rack password normalization execution result
  ansible.builtin.set_fact:
    rack_password_normalization_execution_result:
      requested: false
      executed: false
      execution_mode: guarded_hook
      status: not_applicable
      reason: "Target does not require password normalization before claim."
      payload: {}
  when: not (claim_target_payload.preclaim_normalization.required | default(false) | bool)
  tags:
    - onboarding
    - action
    - normalization
