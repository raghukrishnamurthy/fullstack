---
- name: Normalize shared secret reference
  ansible.builtin.set_fact:
    "{{ secret_ref_fact_name | default('_resolved_secret_ref') }}": "{{ secret_value_ref | default('') | string | trim }}"
  tags:
    - configure
    - verify

- name: Derive shared secret lookup selectors
  ansible.builtin.set_fact:
    "{{ secret_env_name_fact_name | default('_resolved_secret_env_name') }}": >-
      {{
        ((lookup_secret_ref | regex_replace('^env://', '')) | string | trim)
        if ((lookup_secret_ref | string).startswith('env://'))
        else ''
      }}
    "{{ secret_file_path_fact_name | default('_resolved_secret_file_path') }}": >-
      {{
        (lookup_secret_ref | regex_replace('^file://', ''))
        if ((lookup_secret_ref | string).startswith('file://'))
        else ''
      }}
    "{{ secret_source_fact_name | default('_resolved_secret_source') }}": >-
      {{
        'direct'
        if (secret_value_direct | default('') | string | length) > 0
        else 'file'
        if ((lookup_secret_ref | string).startswith('file://'))
        else 'env'
        if ((lookup_secret_ref | string).startswith('env://'))
        else 'unset'
      }}
  vars:
    lookup_secret_ref: "{{ lookup('vars', secret_ref_fact_name | default('_resolved_secret_ref'), default='') }}"
  tags:
    - configure
    - verify

- name: Resolve shared secret value
  ansible.builtin.set_fact:
    "{{ secret_resolved_fact_name | default('_resolved_secret_value') }}": >-
      {{
        secret_value_direct
        if (secret_value_direct | default('') | string | length) > 0
        else
        lookup('ansible.builtin.file', secret_file_path_value, errors='ignore')
        if (secret_file_path_value | string | trim | length) > 0
        else
        lookup('ansible.builtin.env', secret_env_name_value)
        if (secret_env_name_value | string | trim | length) > 0
        else ''
      }}
  vars:
    secret_env_name_value: "{{ lookup('vars', secret_env_name_fact_name | default('_resolved_secret_env_name'), default='') }}"
    secret_file_path_value: "{{ lookup('vars', secret_file_path_fact_name | default('_resolved_secret_file_path'), default='') }}"
  no_log: "{{ secret_no_log | default(true) | bool }}"
  tags:
    - configure
    - verify
