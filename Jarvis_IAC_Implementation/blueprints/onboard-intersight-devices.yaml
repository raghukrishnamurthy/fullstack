spec_version: 2
description: Focused Intersight claim workflow for reusable context, credential-resolution, claim, and normalization grains
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_yaml:
    type: string
    description: Optional deployment YAML payload for claim traceability
    default: |
      deployment:
        id: ai-pod-sjc01-prod
        site: sjc01
        environment: production
  intersight_endpoint:
    type: string
    description: Intersight SaaS or appliance endpoint
    default: https://intersight.com/api/v1
  intersight_api_key_id:
    type: string
    description: Intersight API key id
  intersight_api_private_key:
    type: string
    description: Intersight API private key PEM content
    sensitive: true
  validate_certs:
    type: boolean
    description: Validate TLS certificates for the Intersight endpoint
    default: true
  organization:
    type: string
    description: Intersight organization
    default: ai-prod
  reuse_existing_organization:
    type: boolean
    description: Reuse an existing organization when present
    default: true
  reuse_existing_resource_group:
    type: boolean
    description: Reuse an existing resource group when present
    default: false
  fi_target_username:
    type: string
    description: Username for fabric interconnect claim readiness and appliance claim
    default: admin
  fi_target_password:
    type: string
    description: Password for fabric interconnect claim readiness and appliance claim
    sensitive: true
  rack_target_username:
    type: string
    description: Username for standalone rack claim readiness and appliance claim
    default: admin
  rack_target_password:
    type: string
    description: Password for standalone rack claim readiness and appliance claim
    sensitive: true
  claim_targets_json:
    type: string
    description: Claim target list for reusable claim grains
    default: '[]'
grains:
  ensure_intersight_context:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/ensure-intersight-context/playbook.yaml
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.intersight_endpoint }}
                validate_certs: {{ .inputs.validate_certs }}
                credentials:
                  api_key_id: |
                    {{ .inputs.intersight_api_key_id }}
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: |
            placement:
              intersight:
                organization: {{ .inputs.organization }}
                policy:
                  reuse_existing_organization: {{ .inputs.reuse_existing_organization }}
                  reuse_existing_resource_group: {{ .inputs.reuse_existing_resource_group }}
        - organization: '{{ .inputs.organization }}'
      outputs:
        - context_status
        - org_status
        - org_name
        - org_action
        - org_result_json
        - context_result_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/ensure-intersight-context/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  resolve_claim_target_credentials:
    kind: ansible
    depends-on: ensure_intersight_context
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/resolve-claim-target-credentials/playbook.yaml
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .inputs.claim_targets_json }}'
        - credential_candidates_yaml: |
            credential_candidates:
              - credential_role: target
                target_category: server
                target_form_factor: rack
                target_management_type: standalone
                username: {{ .inputs.rack_target_username }}
                password: |
                  {{ .inputs.rack_target_password }}
              - credential_role: target
                target_category: fabric_interconnect
                username: {{ .inputs.fi_target_username }}
                password: |
                  {{ .inputs.fi_target_password }}
      outputs:
        - resolved_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/resolve-claim-target-credentials/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  claim_to_saas:
    kind: ansible
    depends-on: resolve_claim_target_credentials
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-to-saas/playbook.yaml
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: '{{ .inputs.deployment_yaml }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.intersight_endpoint }}
                validate_certs: {{ .inputs.validate_certs }}
                credentials:
                  api_key_id: |
                    {{ .inputs.intersight_api_key_id }}
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: |
            placement:
              intersight:
                organization: {{ .inputs.organization }}
                policy:
                  reuse_existing_organization: {{ .inputs.reuse_existing_organization }}
                  reuse_existing_resource_group: {{ .inputs.reuse_existing_resource_group }}
        - organization: '{{ .grains.ensure_intersight_context.outputs.org_name }}'
        - claim_targets_json: '{{ .grains.resolve_claim_target_credentials.outputs.resolved_claim_targets_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/claim-to-saas/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  claim_to_appliance:
    kind: ansible
    depends-on: claim_to_saas
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-to-appliance/playbook.yaml
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: '{{ .inputs.deployment_yaml }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.intersight_endpoint }}
                validate_certs: {{ .inputs.validate_certs }}
                credentials:
                  api_key_id: |
                    {{ .inputs.intersight_api_key_id }}
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: |
            placement:
              intersight:
                organization: {{ .inputs.organization }}
                policy:
                  reuse_existing_organization: {{ .inputs.reuse_existing_organization }}
                  reuse_existing_resource_group: {{ .inputs.reuse_existing_resource_group }}
        - organization: '{{ .grains.ensure_intersight_context.outputs.org_name }}'
        - claim_targets_json: '{{ .grains.resolve_claim_target_credentials.outputs.resolved_claim_targets_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/claim-to-appliance/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  normalize_claim_results:
    kind: ansible
    depends-on: claim_to_appliance
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/normalize-claim-results/playbook.yaml
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - appliance_claim_results_json: '{{ .grains.claim_to_appliance.outputs.results_json }}'
        - saas_claim_results_json: '{{ .grains.claim_to_saas.outputs.results_json }}'
      outputs:
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/normalize-claim-results/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
outputs:
  context_result_json:
    value: '{{ .grains.ensure_intersight_context.outputs.context_result_json }}'
  appliance_claim_results_json:
    value: '{{ .grains.claim_to_appliance.outputs.results_json }}'
  saas_claim_results_json:
    value: '{{ .grains.claim_to_saas.outputs.results_json }}'
  normalized_claim_results_json:
    value: '{{ .grains.normalize_claim_results.outputs.normalized_claim_results_json }}'
