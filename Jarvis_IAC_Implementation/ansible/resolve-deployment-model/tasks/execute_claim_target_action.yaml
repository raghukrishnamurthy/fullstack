---
- name: Record guarded claim hook result for target
  ansible.builtin.set_fact:
    claim_execution_results: "{{ (claim_execution_results | default([])) + [claim_execution_result] }}"
  vars:
    claim_execution_result:
      target_id: "{{ claim_action_item.target_id | default('') }}"
      target_category: "{{ claim_action_item.target_category | default('unknown') }}"
      claim_key: "{{ claim_action_item.claim_key | default('') }}"
      connectivity_path: "{{ claim_action_item.connectivity_path | default('direct_endpoint') }}"
      action_type: "{{ claim_action_item.action_type | default('claim_and_onboard') }}"
      execution_mode: guarded_hook
      executed: false
      status: hook_ready_not_implemented
      reason: "Target passed readiness and entered the guarded claim hook, but real claim/onboarding mutation is not wired yet."
  tags:
    - onboarding
    - action
    - claim
