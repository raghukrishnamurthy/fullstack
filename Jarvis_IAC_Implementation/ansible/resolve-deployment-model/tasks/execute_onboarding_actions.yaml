---
- name: Initialize onboarding action plan facts
  ansible.builtin.set_fact:
    onboarding_actions_requested: "{{ (execution_intent | default('validate_only') | string | trim | lower) in ['apply', 'onboard', 'claim_and_onboard'] }}"
    onboarding_action_plan: []
    claim_execution_results: []
  tags:
    - onboarding
    - action

- name: Build claim-capable target action plan entries
  ansible.builtin.set_fact:
    onboarding_action_plan: "{{ onboarding_action_plan + [claim_action_plan_item] }}"
  vars:
    claim_action_plan_item:
      target_id: "{{ item.id | default('') }}"
      target_category: "{{ item.category | default('unknown') }}"
      serial: "{{ item.serial | default('') }}"
      mgmt_ip: "{{ item.mgmt_ip | default('') }}"
      form_factor: "{{ item.form_factor | default('') }}"
      management_type: "{{ item.management_type | default('') }}"
      readiness_mode: "{{ item.readiness_mode | default('claim_and_onboard') }}"
      connectivity_path: "{{ item.connectivity_path | default('direct_endpoint') }}"
      action_type: "{{ 'claim_and_onboard' if (onboarding_readiness.ready | default(false) | bool) else 'defer' }}"
      execution_mode: would_execute
      claim_key: "{{ item.claim_key | default('') }}"
      endpoint_hint: "{{ item.mgmt_ip | default(item.claim_key | default(item.id | default(''))) }}"
      reason: >-
        {{
          'Target is claim-capable and onboarding readiness passed'
          if (onboarding_readiness.ready | default(false) | bool)
          else 'Target is claim-capable but onboarding readiness is not satisfied'
        }}
  loop: "{{ onboarding_readiness.claim_candidate_targets | default([]) }}"
  loop_control:
    label: "{{ item.id | default(item.claim_key | default('claim-target')) }}"
  when: onboarding_actions_requested | bool
  tags:
    - onboarding
    - action

- name: Build reachability-only target action plan entries
  ansible.builtin.set_fact:
    onboarding_action_plan: "{{ onboarding_action_plan + [reachability_action_plan_item] }}"
  vars:
    reachability_action_plan_item:
      target_id: "{{ item.id | default('') }}"
      target_category: "{{ item.category | default('unknown') }}"
      serial: "{{ item.serial | default('') }}"
      mgmt_ip: "{{ item.mgmt_ip | default('') }}"
      readiness_mode: "{{ item.readiness_mode | default('reachability_only') }}"
      connectivity_path: "{{ item.connectivity_path | default('direct_endpoint') }}"
      action_type: reachability_probe
      execution_mode: would_execute
      probe_key: "{{ item.probe_key | default('') }}"
      endpoint_hint: "{{ item.mgmt_ip | default(item.probe_key | default(item.id | default(''))) }}"
      reason: "Target is modeled as reachability-only and should not enter claim workflows"
  loop: "{{ onboarding_readiness.reachability_only_targets | default([]) }}"
  loop_control:
    label: "{{ item.id | default(item.probe_key | default('probe-target')) }}"
  when: onboarding_actions_requested | bool
  tags:
    - onboarding
    - action

- name: Run guarded claim hook for claim-and-onboard actions
  ansible.builtin.include_tasks: execute_claim_target_action.yaml
  vars:
    claim_action_item: "{{ item }}"
  loop: >-
    {{
      onboarding_action_plan
      | selectattr('action_type', 'equalto', 'claim_and_onboard')
      | list
    }}
  loop_control:
    label: "{{ item.target_id | default(item.claim_key | default('claim-action')) }}"
  when: onboarding_actions_requested | bool
  tags:
    - onboarding
    - action
    - claim

- name: Record onboarding action boundary
  ansible.builtin.set_fact:
    onboarding_action_execution:
      requested: "{{ onboarding_actions_requested }}"
      executed: "{{ (claim_execution_results | default([]) | selectattr('executed', 'equalto', true) | list | length) > 0 }}"
      status: >-
        {{
          'appliance_claim_submitted'
          if ((claim_execution_results | default([]) | selectattr('execution_mode', 'equalto', 'appliance_claim') | selectattr('executed', 'equalto', true) | list | length) > 0)
          else 'guarded_claim_hook_ready'
          if (claim_execution_results | default([]) | length) > 0
          else 'planned_only'
          if (onboarding_action_plan | default([]) | length) > 0
          else 'placeholder_only'
        }}
      message: >-
        {{
          'One or more claim-capable targets were submitted to the appliance claim API.'
          if ((claim_execution_results | default([]) | selectattr('execution_mode', 'equalto', 'appliance_claim') | selectattr('executed', 'equalto', true) | list | length) > 0)
          else 'Claim-capable targets entered the guarded claim hook, but remote mutation is not implemented for the remaining targets.'
          if (claim_execution_results | default([]) | length) > 0
          else 'Onboarding actions are represented as a non-mutating action plan only. This scaffold stops before remote mutation.'
          if (onboarding_action_plan | default([]) | length) > 0
          else 'Onboarding action execution is intentionally not implemented yet. This scaffold stops at readiness evaluation.'
        }}
      action_plan: "{{ onboarding_action_plan | default([]) }}"
      claim_execution_results: "{{ claim_execution_results | default([]) }}"
  tags:
    - onboarding
    - action

- name: Explain why onboarding actions were not executed
  ansible.builtin.debug:
    msg: "{{ onboarding_action_execution.message }}"
  when: onboarding_actions_requested | bool
  tags:
    - onboarding
    - action
