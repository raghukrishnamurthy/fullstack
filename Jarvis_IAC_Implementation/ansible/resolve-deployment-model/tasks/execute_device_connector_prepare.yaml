---
- name: Resolve target credential secret refs for device connector prepare
  ansible.builtin.set_fact:
    connector_prepare_password_ref: "{{ claim_target_payload.selected_target_credential.password_ref | default('') }}"
    connector_prepare_password_env_name: >-
      {{
        (
          claim_target_payload.selected_target_credential.password_ref | default('')
        )
        | regex_replace('^env://', '')
        if (
          (claim_target_payload.selected_target_credential.password_ref | default('')) is string
          and (claim_target_payload.selected_target_credential.password_ref | default('')).startswith('env://')
        )
        else ''
      }}
    connector_prepare_supported: >-
      {{
        (derived_intersight_mode | default('')) == 'pva'
        and ((validation_mode | default('strict') | string | lower) in ['live', 'intersight_live'])
        and (
          ((claim_target_payload.target_category | default('')) == 'fabric_interconnect')
          or
          (
            (claim_target_payload.target_category | default('')) == 'server'
            and (claim_target_payload.form_factor | default('')) == 'rack'
            and (claim_target_payload.management_type | default('')) == 'standalone'
          )
        )
        and ((claim_target_payload.endpoint | default('') | string | trim | length) > 0)
        and ((claim_target_payload.selected_target_credential.username | default('') | string | trim | length) > 0)
      }}
  tags:
    - onboarding
    - action
    - prepare

- name: Resolve target credential secret value for device connector prepare
  ansible.builtin.set_fact:
    connector_prepare_password: >-
      {{
        lookup('ansible.builtin.env', connector_prepare_password_env_name)
        if (connector_prepare_password_env_name | default('') | length > 0)
        else ''
      }}
  tags:
    - onboarding
    - action
    - prepare

- name: Try UCS XML API login for device connector prepare
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/nuova"
    method: POST
    body: >-
      <aaaLogin inName="{{ claim_target_payload.selected_target_credential.username | default('') }}"
      inPassword="{{ connector_prepare_password | default('') }}" />
    body_format: raw
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_xml_login_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_password | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Derive UCS XML API cookie for device connector prepare
  ansible.builtin.set_fact:
    connector_prepare_xml_cookie: >-
      {{
        (
          connector_prepare_xml_login_result.content
          | default('')
          | regex_findall('outCookie=\"([^\"]+)\"')
          | first
        ) | default('')
      }}
  when:
    - connector_prepare_supported | default(false) | bool
    - connector_prepare_xml_login_result is defined
  tags:
    - onboarding
    - action
    - prepare

- name: Query connector systems via UCS XML API session
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/connector/Systems"
    method: GET
    headers:
      ucsmcookie: "ucsm-cookie={{ connector_prepare_xml_cookie }}"
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_xml_systems_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_xml_cookie | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Logout UCS XML API session after connector prepare
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/nuova"
    method: POST
    body: '<aaaLogout inCookie="{{ connector_prepare_xml_cookie }}" />'
    body_format: raw
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_xml_logout_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_xml_cookie | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Try IMM login for device connector prepare when XML path is not ready
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/Login"
    method: POST
    body_format: json
    body:
      User: "{{ claim_target_payload.selected_target_credential.username | default('') }}"
      Password: "{{ connector_prepare_password | default('') }}"
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_imm_login_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_password | default('') | string | trim | length) > 0
    - not (
        (connector_prepare_xml_systems_result.status | default(0) | int) == 200
      )
  tags:
    - onboarding
    - action
    - prepare

- name: Derive IMM session id for device connector prepare
  ansible.builtin.set_fact:
    connector_prepare_imm_login_payload: >-
      {{
        connector_prepare_imm_login_result.json
        if (connector_prepare_imm_login_result.json is defined)
        else (
          (connector_prepare_imm_login_result.content | default('{}') | from_json)
          if (connector_prepare_imm_login_result.content | default('') | string | trim | length) > 0
          else {}
        )
      }}
    connector_prepare_imm_session_id: "{{ connector_prepare_imm_login_payload.SessionId | default('') }}"
    connector_prepare_imm_cookies_string: "{{ connector_prepare_imm_login_result.cookies_string | default('') }}"
    connector_prepare_imm_csrf_token: "{{ connector_prepare_imm_login_result.x_csrf_token | default('') }}"
  when:
    - connector_prepare_supported | default(false) | bool
    - connector_prepare_imm_login_result is defined
  tags:
    - onboarding
    - action
    - prepare

- name: Query connector systems via IMM session
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/connector/Systems"
    method: GET
    headers:
      Cookie: >-
        {{
          connector_prepare_imm_cookies_string
          if (connector_prepare_imm_cookies_string | default('') | string | trim | length) > 0
          else 'sessionId=' ~ connector_prepare_imm_session_id
        }}
      X-CSRF-Token: "{{ connector_prepare_imm_csrf_token }}"
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_imm_systems_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_imm_cookies_string | default('') | string | trim | length) > 0 or (connector_prepare_imm_session_id | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Logout IMM session after connector prepare
  ansible.builtin.uri:
    url: "https://{{ claim_target_payload.endpoint }}/Logout"
    method: POST
    headers:
      Cookie: >-
        {{
          connector_prepare_imm_cookies_string
          if (connector_prepare_imm_cookies_string | default('') | string | trim | length) > 0
          else 'sessionId=' ~ connector_prepare_imm_session_id
        }}
      X-CSRF-Token: "{{ connector_prepare_imm_csrf_token }}"
    return_content: true
    validate_certs: "{{ claim_target_payload.endpoint_validate_certs | default(false) | bool }}"
    timeout: 20
  register: connector_prepare_imm_logout_result
  failed_when: false
  no_log: true
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_imm_cookies_string | default('') | string | trim | length) > 0 or (connector_prepare_imm_session_id | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Build device connector prepare execution result
  ansible.builtin.set_fact:
    connector_prepare_execution_result:
      requested: true
      executed: >-
        {{
          (
            (connector_prepare_xml_login_result is defined)
            or (connector_prepare_imm_login_result is defined)
          )
          and (connector_prepare_supported | default(false) | bool)
        }}
      execution_mode: endpoint_connector_prepare
      status: >-
        {{
          'ready_for_claim'
          if (
            (connector_prepare_xml_systems_result.status | default(0) | int) == 200
            or (connector_prepare_imm_systems_result.status | default(0) | int) == 200
          )
          else 'connector_prepare_failed'
        }}
      reason: >-
        {{
          'connector_status_retrieved'
          if (
            (connector_prepare_xml_systems_result.status | default(0) | int) == 200
            or (connector_prepare_imm_systems_result.status | default(0) | int) == 200
          )
          else 'endpoint_login_or_connector_status_failed'
        }}
      payload:
        endpoint: "{{ claim_target_payload.endpoint }}"
        xml_login_status: "{{ connector_prepare_xml_login_result.status | default(0) }}"
        xml_connector_status: "{{ connector_prepare_xml_systems_result.status | default(0) }}"
        xml_logout_status: "{{ connector_prepare_xml_logout_result.status | default(0) }}"
        imm_login_status: "{{ connector_prepare_imm_login_result.status | default(0) }}"
        imm_connector_status: "{{ connector_prepare_imm_systems_result.status | default(0) }}"
        imm_logout_status: "{{ connector_prepare_imm_logout_result.status | default(0) }}"
        imm_cookies_string_present: "{{ (connector_prepare_imm_cookies_string | default('') | string | trim | length) > 0 }}"
        imm_csrf_token_present: "{{ (connector_prepare_imm_csrf_token | default('') | string | trim | length) > 0 }}"
  when:
    - connector_prepare_supported | default(false) | bool
    - (connector_prepare_password | default('') | string | trim | length) > 0
  tags:
    - onboarding
    - action
    - prepare

- name: Build skipped device connector prepare execution result
  ansible.builtin.set_fact:
    connector_prepare_execution_result:
      requested: false
      executed: false
      execution_mode: guarded_hook
      status: not_applicable
      reason: >-
        {{
          'Target is not eligible for endpoint connector preparation in the current execution mode.'
          if not (connector_prepare_supported | default(false) | bool)
          else 'Target credential data was not available for endpoint connector preparation.'
        }}
      payload: {}
  when:
    - not (connector_prepare_supported | default(false) | bool)
      or (connector_prepare_password | default('') | string | trim | length) == 0
  tags:
    - onboarding
    - action
    - prepare
