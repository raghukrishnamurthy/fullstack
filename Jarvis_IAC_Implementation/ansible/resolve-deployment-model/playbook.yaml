---
- name: Discover Jarvis infrastructure
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    default_intersight_query_rules_json: |
      {
        "Blade": {
          "resource_path": "/compute/PhysicalSummaries",
          "serial_field": "Serial",
          "discovery_field": "Lifecycle",
          "allowed_discovery_states": ["Active"]
        },
        "Rack": {
          "resource_path": "/compute/PhysicalSummaries",
          "serial_field": "Serial",
          "discovery_field": "ManagementMode",
          "allowed_discovery_states": ["IMM", "IntersightStandalone"]
        },
        "FabricInterconnect": {
          "resource_path": "/network/Elements",
          "serial_field": "Serial",
          "discovery_field": "Operability",
          "allowed_discovery_states": ["online"],
          "pair_validation": true
        }
      }
    deployment_root: "{{ (deployment_yaml | default('') | trim | length > 0) | ternary(deployment_yaml | from_yaml, {}) }}"
    platform_root: "{{ (platform_yaml | default('') | trim | length > 0) | ternary(platform_yaml | from_yaml, {}) }}"
    placement_root: "{{ (placement_yaml | default('') | trim | length > 0) | ternary(placement_yaml | from_yaml, {}) }}"
    site_root: "{{ (site_yaml | default('') | trim | length > 0) | ternary(site_yaml | from_yaml, {}) }}"
    inventory_root: "{{ (inventory_yaml | default('') | trim | length > 0) | ternary(inventory_yaml | from_yaml, {}) }}"
    solution_root: "{{ (solution_yaml | default('') | trim | length > 0) | ternary(solution_yaml | from_yaml, {}) }}"
    deployment_data: "{{ deployment_root.deployment | default(deployment_root) }}"
    platform_data: "{{ platform_root.platform | default(platform_root) }}"
    placement_data: "{{ placement_root.placement | default(placement_root) }}"
    site_data: "{{ site_root.site | default(site_root) }}"
    inventory_data: "{{ inventory_root.inventory | default(inventory_root) }}"
    solution_data: "{{ solution_root.solution | default(solution_root) }}"
    site_global_settings: "{{ site_data.global_settings | default({}) }}"
    inventory_defaults: "{{ inventory_data.defaults | default({}) }}"
    inventory_devices: "{{ inventory_data.devices | default([]) }}"
    inventory_domains: "{{ inventory_data.domains | default([]) }}"
    assists: "{{ platform_data.intersight.assists | default([]) }}"
    intersight_query_rules: "{{ default_intersight_query_rules_json | from_json }}"
    derived_intersight_mode: "{{ 'saas' if ('intersight.com' in (platform_data.intersight.endpoint | default(''))) else 'pva' }}"
    effective_resource_group: "{{ placement_data.intersight.resource_group | default(placement_data.intersight.organization | default('')) }}"
    intersight_validate_certs: "{{ (platform_data.intersight.validate_certs | default('true') | string | lower) in ['true', '1', 'yes'] }}"
    api_key_id_ref: "{{ platform_data.intersight.credentials.api_key_id_ref | default('') }}"
    api_private_key_ref: "{{ platform_data.intersight.credentials.api_private_key_ref | default('') }}"
    api_key_id_env_name: "{{ (api_key_id_ref is string and api_key_id_ref.startswith('env://')) | ternary(api_key_id_ref | regex_replace('^env://', ''), '') }}"
    api_private_key_env_name: "{{ (api_private_key_ref is string and api_private_key_ref.startswith('env://')) | ternary(api_private_key_ref | regex_replace('^env://', ''), '') }}"
    resolved_api_key_id: "{{ (api_key_id_env_name | length > 0) | ternary(lookup('ansible.builtin.env', api_key_id_env_name), '') }}"
    resolved_api_private_key: "{{ (api_private_key_env_name | length > 0) | ternary(lookup('ansible.builtin.env', api_private_key_env_name), '') }}"
    intersight_live_validation_requested: "{{ (validation_mode | default('strict') | string | lower) in ['live', 'intersight_live'] }}"
    intersight_live_validation_enabled: >-
      {{
        intersight_live_validation_requested
        and (resolved_api_key_id | string | trim | length > 0)
        and (resolved_api_private_key | string | trim | length > 0)
      }}
    fi_count: "{{ inventory_devices | selectattr('category', 'equalto', 'fabric_interconnect') | list | length }}"
    server_count: "{{ inventory_devices | selectattr('category', 'equalto', 'server') | list | length }}"
    storage_count: "{{ inventory_devices | selectattr('category', 'equalto', 'storage') | list | length }}"
    ethernet_switch_count: "{{ inventory_devices | selectattr('category', 'equalto', 'ethernet_switch') | list | length }}"
    san_switch_count: "{{ inventory_devices | selectattr('category', 'equalto', 'san_switch') | list | length }}"
    gpu_server_count: "{{ inventory_devices | selectattr('category', 'equalto', 'server') | selectattr('attributes.accelerator_profile', 'defined') | selectattr('attributes.accelerator_profile', 'equalto', 'gpu') | list | length }}"
    normalized_device_ids: "{{ inventory_devices | map(attribute='id') | list }}"
    classification: >-
      {% if fi_count | int > 0 and storage_count | int > 0 and (ethernet_switch_count | int > 0 or san_switch_count | int > 0) %}
      converged_compute_network_storage
      {% elif fi_count | int > 0 and (inventory_domains | length > 0) and server_count | int > fi_count | int %}
      mixed_mode_infrastructure
      {% elif fi_count | int > 0 and server_count | int > 0 %}
      fi_managed_compute_domain
      {% elif gpu_server_count | int > 0 %}
      standalone_gpu_cluster
      {% elif server_count | int > 0 %}
      standalone_rack_servers
      {% else %}
      unknown
      {% endif %}

  pre_tasks:
    - name: Validate discovery inputs
      ansible.builtin.assert:
        that:
          - deployment_yaml is defined
          - deployment_yaml | string | trim | length > 0
          - platform_yaml is defined
          - platform_yaml | string | trim | length > 0
          - placement_yaml is defined
          - placement_yaml | string | trim | length > 0
          - inventory_yaml is defined
          - inventory_yaml | string | trim | length > 0
          - solution_yaml is defined
          - solution_yaml | string | trim | length > 0
        fail_msg: "deployment_yaml, platform_yaml, placement_yaml, inventory_yaml, and solution_yaml are required"
      tags:
        - always
        - validate
        - precheck

    - name: Validate deployment wrapper and core fields
      ansible.builtin.assert:
        that:
          - deployment_data.id is defined
          - deployment_data.id | string | trim | length > 0
          - deployment_data.site is defined
          - deployment_data.site | string | trim | length > 0
          - deployment_data.environment is defined
          - deployment_data.environment | string | trim | length > 0
        fail_msg: "deployment_yaml must define deployment.id, deployment.site, and deployment.environment"
      tags: [always, validate, precheck]

    - name: Validate platform wrapper and Intersight core fields
      ansible.builtin.assert:
        that:
          - platform_data.intersight is defined
          - platform_data.intersight.endpoint is defined
          - platform_data.intersight.endpoint | string | trim | length > 0
          - platform_data.intersight.credentials is defined
          - platform_data.intersight.credentials.api_key_id_ref is defined
          - platform_data.intersight.credentials.api_private_key_ref is defined
        fail_msg: "platform_yaml must define platform.intersight.endpoint and Intersight credential references"
      tags: [always, validate, precheck]

    - name: Validate live Intersight mode uses supported credential references
      ansible.builtin.assert:
        that:
          - api_key_id_ref.startswith('env://')
          - api_private_key_ref.startswith('env://')
          - resolved_api_key_id | string | trim | length > 0
          - resolved_api_private_key | string | trim | length > 0
        fail_msg: >-
          validation_mode=live currently supports env:// credential references only,
          and the referenced environment variables must be present.
      when: intersight_live_validation_requested
      tags: [always, validate, precheck]

    - name: Validate placement wrapper and required organization
      ansible.builtin.assert:
        that:
          - placement_data.intersight is defined
          - placement_data.intersight.organization is defined
          - placement_data.intersight.organization | string | trim | length > 0
        fail_msg: "placement_yaml must define placement.intersight.organization"
      tags: [always, validate, precheck]

    - name: Validate solution wrapper and required fields
      ansible.builtin.assert:
        that:
          - solution_data.profile is defined
          - solution_data.profile | string | trim | length > 0
          - solution_data.delivery_scope is defined
          - solution_data.delivery_scope | string | trim | length > 0
        fail_msg: "solution_yaml must define solution.profile and solution.delivery_scope"
      tags: [always, validate, precheck]

    - name: Validate optional site wrapper when provided
      ansible.builtin.assert:
        that:
          - site_root == {} or site_root.site is defined or site_data.id is defined or site_data.global_settings is defined
        fail_msg: "site_yaml must use a site: wrapper when provided"
      when: site_yaml is defined and site_yaml | string | trim | length > 0
      tags: [always, validate, precheck]

  tasks:
    - name: Validate inventory contains devices
      ansible.builtin.assert:
        that:
          - inventory_devices | length > 0
        fail_msg: "inventory_yaml must contain one or more devices under inventory.devices"
      tags:
        - always
        - validate
        - inventory

    - name: Validate allowed device categories
      ansible.builtin.assert:
        that:
          - item.category in ['fabric_interconnect', 'server', 'storage', 'ethernet_switch', 'san_switch']
          - item.id is defined
          - item.id | string | trim | length > 0
          - (item.serial is defined and item.serial | string | trim | length > 0) or (item.mgmt_ip is defined and item.mgmt_ip | string | trim | length > 0)
        fail_msg: "Each device must define id, an allowed category, and at least one identity field such as serial or mgmt_ip"
      loop: "{{ inventory_devices }}"
      loop_control:
        label: "{{ item.id | default('unknown-device') }}"
      tags:
        - always
        - validate
        - inventory

    - name: Validate device IDs are unique
      ansible.builtin.assert:
        that:
          - normalized_device_ids | unique | length == normalized_device_ids | length
        fail_msg: "Device IDs must be unique within inventory.devices"
      tags:
        - always
        - validate
        - inventory

    - name: Validate rack or standalone-managed servers provide mgmt_ip
      ansible.builtin.assert:
        that:
          - item.mgmt_ip is defined
          - item.mgmt_ip | string | trim | length > 0
        fail_msg: "Standalone or IMM-managed rack servers must define mgmt_ip"
      loop: >-
        {{
          inventory_devices
          | selectattr('category', 'equalto', 'server')
          | selectattr('attributes.form_factor', 'defined')
          | selectattr('attributes.form_factor', 'equalto', 'rack')
          | list
        }}
      loop_control:
        label: "{{ item.id }}"
      when: "(item.attributes.management_type | default(inventory_defaults.server_management_type | default(''))) in ['standalone', 'imm']"
      tags:
        - always
        - validate
        - inventory

    - name: Validate inventory domains reference known members
      ansible.builtin.assert:
        that:
          - item.domain_id is defined
          - item.domain_id | string | trim | length > 0
          - item.type is defined
          - item.members is defined
          - item.members | length > 0
          - item.members | difference(normalized_device_ids) | length == 0
        fail_msg: "Each inventory domain must define domain_id, type, and known device members"
      loop: "{{ inventory_domains }}"
      loop_control:
        label: "{{ item.domain_id | default('unknown-domain') }}"
      tags:
        - always
        - validate
        - topology

    - name: Validate Assist entries when provided
      ansible.builtin.assert:
        that:
          - item.id is defined
          - item.id | string | trim | length > 0
          - item.endpoint is defined
          - item.endpoint | string | trim | length > 0
        fail_msg: "Each Assist entry must define id and endpoint"
      loop: "{{ assists }}"
      loop_control:
        label: "{{ item.id | default('unknown-assist') }}"
      tags:
        - always
        - validate
        - platform

    - name: Validate site DNS server list when provided
      ansible.builtin.assert:
        that:
          - site_global_settings.dns.servers is iterable
          - site_global_settings.dns.servers | length > 0
        fail_msg: "site.global_settings.dns.servers must be a non-empty list when provided"
      when: site_global_settings.dns is defined and site_global_settings.dns.servers is defined
      tags:
        - always
        - validate
        - site

    - name: Validate site NTP server list when provided
      ansible.builtin.assert:
        that:
          - site_global_settings.ntp.servers is iterable
          - site_global_settings.ntp.servers | length > 0
        fail_msg: "site.global_settings.ntp.servers must be a non-empty list when provided"
      when: site_global_settings.ntp is defined and site_global_settings.ntp.servers is defined
      tags:
        - always
        - validate
        - site

    - name: Validate proxy certificate refs when provided
      ansible.builtin.assert:
        that:
          - site_global_settings.proxy.certificates.ca_bundle_ref | string | trim | length > 0
        fail_msg: "site.global_settings.proxy.certificates.ca_bundle_ref must be non-empty when provided"
      when:
        - site_global_settings.proxy is defined
        - site_global_settings.proxy.certificates is defined
        - site_global_settings.proxy.certificates.ca_bundle_ref is defined
      tags:
        - always
        - validate
        - site

    - name: Validate peer relationships reference known devices
      ansible.builtin.assert:
        that:
          - item.peer in normalized_device_ids
        fail_msg: "Device peer must reference another known device id"
      loop: "{{ inventory_devices | selectattr('peer', 'defined') | list }}"
      loop_control:
        label: "{{ item.id }}"
      tags:
        - always
        - validate
        - topology

    - name: Validate parent relationships reference known devices
      ansible.builtin.assert:
        that:
          - item.parent in normalized_device_ids
        fail_msg: "Device parent must reference another known device id"
      loop: "{{ inventory_devices | selectattr('parent', 'defined') | list }}"
      loop_control:
        label: "{{ item.id }}"
      tags:
        - always
        - validate
        - topology

    - name: Initialize live Intersight validation facts
      ansible.builtin.set_fact:
        device_batches: []
        intersight_present_devices: []
        intersight_missing_devices: []
        intersight_not_ready_devices: []
        fi_pair_validation_errors: []
        placement_validation:
          organization:
            requested_name: "{{ placement_data.intersight.organization }}"
            exists: false
            action: unchecked
            moid: ""
          resource_group:
            requested_name: "{{ effective_resource_group }}"
            exists: false
            action: unchecked
            moid: ""
            matches_requested_organization: true
          ready: true
          errors: []
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight

    - name: Query requested organization by name
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ resolved_api_key_id }}"
        api_private_key: "{{ resolved_api_private_key }}"
        api_uri: "{{ platform_data.intersight.endpoint }}"
        validate_certs: "{{ intersight_validate_certs }}"
        resource_path: /organization/Organizations
        query_params:
          $filter: "Name eq '{{ placement_data.intersight.organization }}'"
          $top: 1
        return_list: true
      register: existing_org_query
      changed_when: false
      no_log: true
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight
        - placement

    - name: Query requested resource group by name
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ resolved_api_key_id }}"
        api_private_key: "{{ resolved_api_private_key }}"
        api_uri: "{{ platform_data.intersight.endpoint }}"
        validate_certs: "{{ intersight_validate_certs }}"
        resource_path: /resource/Groups
        query_params:
          $filter: "Name eq '{{ effective_resource_group }}'"
          $top: 1
        return_list: true
      register: existing_resource_group_query
      changed_when: false
      no_log: true
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight
        - placement

    - name: Build placement validation result from live Intersight queries
      ansible.builtin.set_fact:
        placement_validation:
          organization:
            requested_name: "{{ placement_data.intersight.organization }}"
            exists: "{{ org_exists }}"
            action: "{{ org_action }}"
            moid: "{{ org_moid }}"
          resource_group:
            requested_name: "{{ effective_resource_group }}"
            exists: "{{ resource_group_exists }}"
            action: "{{ resource_group_action }}"
            moid: "{{ resource_group_moid }}"
            matches_requested_organization: "{{ resource_group_matches_org }}"
          ready: "{{ placement_errors | length == 0 }}"
          errors: "{{ placement_errors }}"
      vars:
        org_record: "{{ (existing_org_query.api_response | default([]) | first) | default({}) }}"
        resource_group_record: "{{ (existing_resource_group_query.api_response | default([]) | first) | default({}) }}"
        org_exists: "{{ (existing_org_query.api_response | default([]) | length) > 0 }}"
        resource_group_exists: "{{ (existing_resource_group_query.api_response | default([]) | length) > 0 }}"
        org_moid: "{{ org_record.Moid | default('') }}"
        resource_group_moid: "{{ resource_group_record.Moid | default('') }}"
        requested_reuse_org: "{{ placement_data.intersight.policy.reuse_existing_organization | default(true) | bool }}"
        requested_reuse_resource_group: "{{ placement_data.intersight.policy.reuse_existing_resource_group | default(false) | bool }}"
        resource_group_org_moids: >-
          {{
            resource_group_record.Organizations | default([])
            | map(attribute='Moid')
            | map('string')
            | list
          }}
        resource_group_matches_org: >-
          {{
            (not resource_group_exists)
            or (not org_exists)
            or (org_moid in resource_group_org_moids)
          }}
        org_action: >-
          {{
            'existing'
            if (org_exists and requested_reuse_org)
            else 'conflict_existing_not_reusable'
            if (org_exists and not requested_reuse_org)
            else 'would_create'
          }}
        resource_group_action: >-
          {{
            'existing'
            if (resource_group_exists and requested_reuse_resource_group)
            else 'conflict_existing_not_reusable'
            if (resource_group_exists and not requested_reuse_resource_group)
            else 'would_create'
          }}
        placement_errors: >-
          {%- set errors = [] -%}
          {%- if org_exists and not requested_reuse_org -%}
          {%- set _ = errors.append('Requested organization already exists but placement policy forbids reuse') -%}
          {%- endif -%}
          {%- if resource_group_exists and not requested_reuse_resource_group -%}
          {%- set _ = errors.append('Requested resource group already exists but placement policy forbids reuse') -%}
          {%- endif -%}
          {%- if org_exists and resource_group_exists and not resource_group_matches_org -%}
          {%- set _ = errors.append('Requested resource group is not associated with the requested organization') -%}
          {%- endif -%}
          {{ errors }}
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight
        - placement

    - name: Build blade readiness query batches
      ansible.builtin.set_fact:
        device_batches: "{{ device_batches + [blade_batch] }}"
      vars:
        blade_serials: >-
          {{
            inventory_devices
            | selectattr('category', 'equalto', 'server')
            | selectattr('attributes.form_factor', 'defined')
            | selectattr('attributes.form_factor', 'equalto', 'blade')
            | selectattr('serial', 'defined')
            | map(attribute='serial')
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        blade_batch:
          category: Blade
          serial_numbers: "{{ blade_serials }}"
          rule: "{{ intersight_query_rules.Blade }}"
          serial_filter: "{{ blade_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      when:
        - intersight_live_validation_enabled
        - blade_serials | length > 0
      tags:
        - validate
        - intersight

    - name: Build rack readiness query batches
      ansible.builtin.set_fact:
        device_batches: "{{ device_batches + [rack_batch] }}"
      vars:
        rack_serials: >-
          {{
            inventory_devices
            | selectattr('category', 'equalto', 'server')
            | selectattr('attributes.form_factor', 'defined')
            | selectattr('attributes.form_factor', 'equalto', 'rack')
            | selectattr('serial', 'defined')
            | map(attribute='serial')
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        rack_batch:
          category: Rack
          serial_numbers: "{{ rack_serials }}"
          rule: "{{ intersight_query_rules.Rack }}"
          serial_filter: "{{ rack_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      when:
        - intersight_live_validation_enabled
        - rack_serials | length > 0
      tags:
        - validate
        - intersight

    - name: Build Fabric Interconnect pair query batches from declared domains
      ansible.builtin.set_fact:
        device_batches: "{{ device_batches + [fi_batch] }}"
      vars:
        fi_serials: >-
          {{
            (
              inventory_devices
              | selectattr('serial', 'defined')
              | list
            )
            | json_query("[?contains(`" ~ ((item.members | default([])) | to_json) ~ "`, id)].serial")
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}
        fi_batch:
          category: FabricInterconnect
          domain_id: "{{ item.domain_id }}"
          serial_numbers: "{{ fi_serials }}"
          rule: "{{ intersight_query_rules.FabricInterconnect }}"
          serial_filter: "{{ fi_serials | map('regex_replace', '^(.*)$', \"Serial eq '\\1'\") | join(' or ') }}"
      loop: "{{ inventory_domains | selectattr('type', 'defined') | selectattr('type', 'equalto', 'fi_pair') | list }}"
      loop_control:
        label: "{{ item.domain_id }}"
      when:
        - intersight_live_validation_enabled
        - fi_serials | length > 0
      tags:
        - validate
        - intersight

    - name: Query Intersight for each device batch
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ resolved_api_key_id }}"
        api_private_key: "{{ resolved_api_private_key }}"
        api_uri: "{{ platform_data.intersight.endpoint }}"
        validate_certs: "{{ intersight_validate_certs }}"
        resource_path: "{{ query_batch.rule.resource_path }}"
        return_list: true
        query_params:
          $filter: "{{ query_batch.serial_filter }}"
          $top: 1000
      register: intersight_lookup
      loop: "{{ device_batches }}"
      loop_control:
        loop_var: query_batch
        label: "{{ query_batch.category }}{{ ':' ~ query_batch.domain_id if query_batch.domain_id is defined else '' }}"
      changed_when: false
      no_log: true
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight

    - name: Evaluate Intersight query results
      ansible.builtin.include_tasks: tasks/evaluate_intersight_batch.yaml
      vars:
        response_results: "{{ readiness_query_result.api_response | default([]) }}"
        requested_serials: "{{ readiness_query_result.query_batch.serial_numbers }}"
        category_name: "{{ readiness_query_result.query_batch.category }}"
        discovery_field: "{{ readiness_query_result.query_batch.rule.discovery_field | default('') }}"
        allowed_states: "{{ readiness_query_result.query_batch.rule.allowed_discovery_states | default([]) }}"
      loop: "{{ intersight_lookup.results | default([]) }}"
      loop_control:
        loop_var: readiness_query_result
        label: "{{ readiness_query_result.query_batch.category }}"
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight

    - name: Validate declared FI pairs against Intersight results
      ansible.builtin.include_tasks: tasks/validate_fi_pair.yaml
      loop: >-
        {{
          intersight_lookup.results
          | default([])
          | selectattr('query_batch.category', 'equalto', 'FabricInterconnect')
          | list
        }}
      loop_control:
        loop_var: fi_lookup_result
        label: "{{ fi_lookup_result.query_batch.domain_id | default(fi_lookup_result.query_batch.serial_numbers | join(',')) }}"
      when: intersight_live_validation_enabled
      tags:
        - validate
        - intersight

    - name: Build normalized discovery model
      ansible.builtin.set_fact:
        discovery_model:
          deployment:
            id: "{{ deployment_data.id }}"
            site: "{{ deployment_data.site }}"
            environment: "{{ deployment_data.environment }}"
          platform:
            intersight:
              endpoint: "{{ platform_data.intersight.endpoint }}"
              deployment_mode: "{{ derived_intersight_mode }}"
              credentials: "{{ platform_data.intersight.credentials }}"
              assists: "{{ assists }}"
            raw_platform: "{{ platform_data }}"
          placement:
            intersight:
              organization: "{{ placement_data.intersight.organization }}"
              resource_group: "{{ effective_resource_group }}"
              policy: "{{ placement_data.intersight.policy | default({}) }}"
              naming: "{{ placement_data.intersight.naming | default({}) }}"
          site:
            id: "{{ site_data.id | default(deployment_data.site) }}"
            global_settings: "{{ site_global_settings }}"
          inventory:
            defaults: "{{ inventory_defaults }}"
            devices: "{{ inventory_devices }}"
            domains: "{{ inventory_domains }}"
          solution:
            profile: "{{ solution_data.profile }}"
            extension: "{{ solution_data.extension | default('') }}"
            goal: "{{ solution_data.goal | default('') }}"
            delivery_scope: "{{ solution_data.delivery_scope }}"
            parameters: "{{ solution_data.parameters | default({}) }}"
          derived:
            infrastructure_classification: "{{ classification | trim }}"
            device_count: "{{ inventory_devices | length }}"
            fabric_interconnect_count: "{{ fi_count }}"
            server_count: "{{ server_count }}"
            storage_count: "{{ storage_count }}"
            ethernet_switch_count: "{{ ethernet_switch_count }}"
            san_switch_count: "{{ san_switch_count }}"
            gpu_server_count: "{{ gpu_server_count }}"
            assist_count: "{{ assists | length }}"
            domain_count: "{{ inventory_domains | length }}"
            validation_mode: "{{ validation_mode | default('strict') }}"
            intersight_live_validation_enabled: "{{ intersight_live_validation_enabled }}"
            intersight_validation:
              present_devices: "{{ intersight_present_devices | default([]) }}"
              missing_devices: "{{ intersight_missing_devices | default([]) }}"
              not_ready_devices: "{{ intersight_not_ready_devices | default([]) }}"
              fi_pair_errors: "{{ fi_pair_validation_errors | default([]) }}"
            placement_validation: "{{ placement_validation | default({}) }}"
      tags: [discover]

    - name: Build discovery summary output
      ansible.builtin.set_fact:
        discovery_summary:
          deployment:
            id: "{{ discovery_model.deployment.id }}"
            site: "{{ discovery_model.deployment.site }}"
            environment: "{{ discovery_model.deployment.environment }}"
          placement:
            organization: "{{ discovery_model.placement.intersight.organization }}"
            resource_group: "{{ discovery_model.placement.intersight.resource_group }}"
          site:
            id: "{{ discovery_model.site.id | default('') }}"
            location: "{{ discovery_model.site.global_settings.location | default('') }}"
            dns_server_count: "{{ discovery_model.site.global_settings.dns.servers | default([]) | length }}"
            ntp_server_count: "{{ discovery_model.site.global_settings.ntp.servers | default([]) | length }}"
            proxy_enabled: "{{ discovery_model.site.global_settings.proxy.enabled | default(false) }}"
          platform:
            intersight_deployment_mode: "{{ discovery_model.platform.intersight.deployment_mode }}"
            endpoint: "{{ discovery_model.platform.intersight.endpoint }}"
            assist_count: "{{ discovery_model.derived.assist_count }}"
          solution:
            profile: "{{ discovery_model.solution.profile }}"
            delivery_scope: "{{ discovery_model.solution.delivery_scope }}"
          inventory_summary:
            infrastructure_classification: "{{ discovery_model.derived.infrastructure_classification }}"
            device_count: "{{ discovery_model.derived.device_count }}"
            fabric_interconnect_count: "{{ discovery_model.derived.fabric_interconnect_count }}"
            server_count: "{{ discovery_model.derived.server_count }}"
            storage_count: "{{ discovery_model.derived.storage_count }}"
            ethernet_switch_count: "{{ discovery_model.derived.ethernet_switch_count }}"
            san_switch_count: "{{ discovery_model.derived.san_switch_count }}"
            domain_count: "{{ discovery_model.derived.domain_count }}"
            live_validation_enabled: "{{ discovery_model.derived.intersight_live_validation_enabled }}"
            present_device_count: "{{ discovery_model.derived.intersight_validation.present_devices | default([]) | length }}"
            missing_device_count: "{{ discovery_model.derived.intersight_validation.missing_devices | default([]) | length }}"
            not_ready_device_count: "{{ discovery_model.derived.intersight_validation.not_ready_devices | default([]) | length }}"
          placement_validation:
            ready: "{{ discovery_model.derived.placement_validation.ready | default(true) }}"
            organization_action: "{{ discovery_model.derived.placement_validation.organization.action | default('not_run') }}"
            resource_group_action: "{{ discovery_model.derived.placement_validation.resource_group.action | default('not_run') }}"
            error_count: "{{ discovery_model.derived.placement_validation.errors | default([]) | length }}"
          validation_mode: "{{ discovery_model.derived.validation_mode }}"
      tags: [discover, summary]

  post_tasks:
    - name: Validate discovery output contract
      ansible.builtin.assert:
        that:
          - discovery_model is defined
          - discovery_summary is defined
          - discovery_model.deployment.id | string | trim | length > 0
          - discovery_model.derived.infrastructure_classification | string | trim | length > 0
        fail_msg: "discover-infrastructure did not produce the expected output contract"
      tags:
        - always
        - verify

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          discovery_model_json: "{{ discovery_model | to_json }}"
          discovery_summary_json: "{{ discovery_summary | to_json }}"
      delegate_to: localhost
      run_once: true
      tags: always
      ignore_errors: true
