---
- import_playbook: /Users/rkrishn2/Documents/Jarvis_IAC/Jarvis_IAC_Implementation/ansible/ensure-intersight-context/playbook.yaml
  vars:
    organization: "{{ organization | default('') }}"
    placement_yaml: "{{ placement_yaml | default('') }}"
    platform_yaml: "{{ platform_yaml | default('') }}"

- import_playbook: /Users/rkrishn2/Documents/Jarvis_IAC/Jarvis_IAC_Implementation/ansible/resolve-claim-target-credentials/playbook.yaml
  vars:
    claim_targets_json: "{{ claim_targets_json | default('[]') }}"
    credential_candidates_yaml: "{{ credential_candidates_yaml | default('credential_candidates: []') }}"

- name: Prepare direct wrapper branch inputs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Persist runtime branch claim target inputs
      ansible.builtin.set_fact:
        saas_claim_targets_json_runtime: >-
          {{
            resolved_claim_targets_json | default('[]')
            if ((platform_yaml | default('') | string).find('intersight.com') != -1)
            else '[]'
          }}
        appliance_claim_targets_json_runtime: >-
          {{
            '[]'
            if ((platform_yaml | default('') | string).find('intersight.com') != -1)
            else (resolved_claim_targets_json | default('[]'))
          }}

- import_playbook: /Users/rkrishn2/Documents/Jarvis_IAC/Jarvis_IAC_Implementation/ansible/claim-to-saas/playbook.yaml
  vars:
    deployment_yaml: "{{ deployment_yaml | default('') }}"
    platform_yaml: "{{ platform_yaml | default('') }}"
    placement_yaml: "{{ placement_yaml | default('') }}"

- name: Capture SaaS branch outputs for direct orchestration
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Persist SaaS branch result JSON
      ansible.builtin.set_fact:
        saas_claim_results_json_runtime: "{{ results_json | default('[]') }}"

- import_playbook: /Users/rkrishn2/Documents/Jarvis_IAC/Jarvis_IAC_Implementation/ansible/claim-to-appliance/playbook.yaml
  vars:
    deployment_yaml: "{{ deployment_yaml | default('') }}"
    platform_yaml: "{{ platform_yaml | default('') }}"
    placement_yaml: "{{ placement_yaml | default('') }}"

- name: Capture appliance branch outputs for direct orchestration
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Persist appliance branch result JSON
      ansible.builtin.set_fact:
        appliance_claim_results_json_runtime: "{{ results_json | default('[]') }}"

- import_playbook: /Users/rkrishn2/Documents/Jarvis_IAC/Jarvis_IAC_Implementation/ansible/normalize-claim-results/playbook.yaml
  vars:
    appliance_claim_results_json: "{{ appliance_claim_results_json_runtime | default('[]') }}"
    saas_claim_results_json: "{{ saas_claim_results_json_runtime | default('[]') }}"
