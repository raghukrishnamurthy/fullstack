---
- name: Render Jarvis discovery summary
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    discovery_model: "{{ discovery_model_json | from_json }}"
    discovery_summary: "{{ (discovery_summary_json | default('{}')) | from_json }}"

  pre_tasks:
    - name: Validate discovery-summary input contract
      ansible.builtin.assert:
        that:
          - discovery_model_json is defined
          - discovery_model_json | string | trim | length > 0
          - discovery_summary_json is defined
          - discovery_summary_json | string | trim | length > 0
        fail_msg: "discovery_model_json and discovery_summary_json are required"
      tags:
        - always
        - validate
        - precheck

  tasks:
    - name: Build discovery report structure
      ansible.builtin.set_fact:
        discovery_report:
          deployment:
            id: "{{ discovery_model.deployment.id }}"
            site: "{{ discovery_model.deployment.site }}"
            environment: "{{ discovery_model.deployment.environment }}"
          platform:
            endpoint: "{{ discovery_model.platform.intersight.endpoint }}"
            deployment_mode: "{{ discovery_model.platform.intersight.deployment_mode }}"
            organization: "{{ discovery_model.placement.intersight.organization }}"
            resource_group: "{{ discovery_model.placement.intersight.resource_group }}"
            assist_count: "{{ discovery_model.derived.assist_count }}"
          site:
            id: "{{ discovery_model.site.id | default('') }}"
            location: "{{ discovery_model.site.global_settings.location | default('') }}"
            dns_server_count: "{{ discovery_model.site.global_settings.dns.servers | default([]) | length }}"
            ntp_server_count: "{{ discovery_model.site.global_settings.ntp.servers | default([]) | length }}"
            proxy_enabled: "{{ discovery_model.site.global_settings.proxy.enabled | default(false) }}"
          baseline_resolution:
            source_type: "{{ discovery_model.baseline_resolution.customer_baseline.source_type | default('none') }}"
            built_in_baseline: "{{ discovery_model.baseline_resolution.selected_built_in_baseline | default('') }}"
            built_in_baseline_file: "{{ discovery_model.baseline_resolution.built_in_baseline.baseline_file | default('') }}"
            overrides_enabled: "{{ discovery_model.baseline_resolution.overrides.enabled | default(false) }}"
            customer_baseline_loaded: "{{ discovery_model.baseline_resolution.customer_baseline.loaded | default(false) }}"
            effective_baseline_key_count: "{{ discovery_model.baseline_resolution.effective_baseline | default({}) | length }}"
          inventory_summary:
            infrastructure_classification: "{{ discovery_model.derived.infrastructure_classification }}"
            device_count: "{{ discovery_model.derived.device_count }}"
            fabric_interconnect_count: "{{ discovery_model.derived.fabric_interconnect_count }}"
            server_count: "{{ discovery_model.derived.server_count }}"
            storage_count: "{{ discovery_model.derived.storage_count }}"
            ethernet_switch_count: "{{ discovery_model.derived.ethernet_switch_count }}"
            san_switch_count: "{{ discovery_model.derived.san_switch_count }}"
            gpu_server_count: "{{ discovery_model.derived.gpu_server_count }}"
            domain_count: "{{ discovery_model.derived.domain_count }}"
          solution:
            profile: "{{ discovery_model.solution.profile }}"
            delivery_scope: "{{ discovery_model.solution.delivery_scope }}"
          placement_validation:
            ready: "{{ discovery_model.derived.placement_validation.ready | default(true) }}"
            organization_action: "{{ discovery_model.derived.placement_validation.organization.action | default('not_run') }}"
            resource_group_action: "{{ discovery_model.derived.placement_validation.resource_group.action | default('not_run') }}"
            errors: "{{ discovery_model.derived.placement_validation.errors | default([]) }}"
          summary_view: "{{ discovery_summary }}"
          next_steps:
            - "Use validated inventory and declared domains to confirm onboarding readiness"
            - "Validate placement targets before claiming or placing devices in Intersight"
            - "Use the selected solution profile only after discovery outputs are reviewed"
            - "Add policy, pool, and domain-profile generation in later workflow phases"
      tags: [render]

    - name: Build markdown discovery summary
      ansible.builtin.set_fact:
        discovery_summary_markdown_text: |
          # Discovery Summary
          
          - Deployment ID: {{ discovery_report.deployment.id }}
          - Site: {{ discovery_report.deployment.site }}
          - Environment: {{ discovery_report.deployment.environment }}
          - Site ID: {{ discovery_report.site.id }}
          - Site Location: {{ discovery_report.site.location }}
          - Baseline Source Type: {{ discovery_report.baseline_resolution.source_type }}
          - Built-in Baseline: {{ discovery_report.baseline_resolution.built_in_baseline }}
          - Built-in Baseline File: {{ discovery_report.baseline_resolution.built_in_baseline_file }}
          - Overrides Enabled: {{ discovery_report.baseline_resolution.overrides_enabled }}
          - Customer Baseline Loaded: {{ discovery_report.baseline_resolution.customer_baseline_loaded }}
          - Effective Baseline Key Count: {{ discovery_report.baseline_resolution.effective_baseline_key_count }}
          - Infrastructure Classification: {{ discovery_report.inventory_summary.infrastructure_classification }}
          - Intersight Mode: {{ discovery_report.platform.deployment_mode }}
          - Device Count: {{ discovery_report.inventory_summary.device_count }}
          - Fabric Interconnect Count: {{ discovery_report.inventory_summary.fabric_interconnect_count }}
          - Server Count: {{ discovery_report.inventory_summary.server_count }}
          - Domain Count: {{ discovery_report.inventory_summary.domain_count }}
          - Solution Profile: {{ discovery_report.solution.profile }}
          - Delivery Scope: {{ discovery_report.solution.delivery_scope }}
          - Organization: {{ discovery_report.platform.organization }}
          - Resource Group: {{ discovery_report.platform.resource_group }}
          - Assist Count: {{ discovery_report.platform.assist_count }}
          - DNS Server Count: {{ discovery_report.site.dns_server_count }}
          - NTP Server Count: {{ discovery_report.site.ntp_server_count }}
          - Proxy Enabled: {{ discovery_report.site.proxy_enabled }}
          - Placement Ready: {{ discovery_report.placement_validation.ready }}
          - Organization Action: {{ discovery_report.placement_validation.organization_action }}
          - Resource Group Action: {{ discovery_report.placement_validation.resource_group_action }}
          - Live Validation Enabled: {{ discovery_report.inventory_summary.live_validation_enabled }}
          - Present Device Count: {{ discovery_report.inventory_summary.present_device_count }}
          - Missing Device Count: {{ discovery_report.inventory_summary.missing_device_count }}
          - Not Ready Device Count: {{ discovery_report.inventory_summary.not_ready_device_count }}
      tags: [render, summary]

  post_tasks:
    - name: Validate discovery-summary output contract
      ansible.builtin.assert:
        that:
          - discovery_report is defined
          - discovery_summary_markdown_text is defined
          - discovery_report.deployment.id | string | trim | length > 0
        fail_msg: "render-discovery-summary did not produce the expected output contract"
      tags:
        - always
        - verify

    - name: Export outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          discovery_report_json: "{{ discovery_report | to_json }}"
          discovery_summary_markdown: "{{ discovery_summary_markdown_text }}"
      delegate_to: localhost
      run_once: true
      tags: always
      ignore_errors: true
