---
- name: Normalize claim results across claim grains
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    appliance_claim_results_input: "{{ appliance_claim_results_json | default('[]') }}"
    appliance_claim_results: >-
      {{
        appliance_claim_results_input
        if (appliance_claim_results_input is not string)
        else (
          (appliance_claim_results_input | from_yaml)
          if (appliance_claim_results_input | string | trim | length) > 0
          else []
        )
      }}
    saas_claim_results_input: "{{ saas_claim_results_json | default('[]') }}"
    saas_claim_results: >-
      {{
        saas_claim_results_input
        if (saas_claim_results_input is not string)
        else (
          (saas_claim_results_input | from_yaml)
          if (saas_claim_results_input | string | trim | length) > 0
          else []
        )
      }}
  tasks:
    - name: Validate normalize-claim-results contract
      ansible.builtin.assert:
        that:
          - appliance_claim_results | type_debug == 'list'
          - saas_claim_results | type_debug == 'list'
        fail_msg: "normalize-claim-results expects appliance_claim_results_json and saas_claim_results_json to decode to lists"
      tags:
        - always
        - validate
        - precheck

    - name: Build combined claim result list
      ansible.builtin.set_fact:
        combined_claim_results: "{{ (appliance_claim_results | default([])) + (saas_claim_results | default([])) }}"
      tags:
        - always
        - normalize

    - name: Build normalized claim result buckets
      ansible.builtin.set_fact:
        successful_result_items: >-
          {{
            (
              (combined_claim_results | selectattr('status', 'defined') | selectattr('status', 'equalto', 'successful') | list)
              +
              (combined_claim_results | selectattr('status', 'defined') | selectattr('status', 'equalto', 'submitted') | list)
              +
              (combined_claim_results | selectattr('status', 'defined') | selectattr('status', 'equalto', 'already_claimed') | list)
            )
          }}
        failed_result_items: >-
          {{
            combined_claim_results
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'failed')
            | list
          }}
        conflict_result_items: >-
          {{
            combined_claim_results
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'conflict')
            | list
          }}
        skipped_result_items: >-
          {{
            combined_claim_results
            | selectattr('status', 'defined')
            | selectattr('status', 'equalto', 'skipped')
            | list
          }}
        changed_result_items: >-
          {{
            combined_claim_results
            | selectattr('changed', 'defined')
            | selectattr('changed', 'equalto', true)
            | list
          }}
      tags:
        - always
        - normalize

    - name: Build normalized claim result contract
      ansible.builtin.set_fact:
        normalized_claim_results:
          summary:
            total_results: "{{ combined_claim_results | length }}"
            appliance_result_count: "{{ appliance_claim_results | length }}"
            saas_result_count: "{{ saas_claim_results | length }}"
            successful_count: "{{ successful_result_items | length }}"
            failed_count: "{{ failed_result_items | length }}"
            conflict_count: "{{ conflict_result_items | length }}"
            skipped_count: "{{ skipped_result_items | length }}"
            changed_count: "{{ changed_result_items | length }}"
            batch_status: "{{ 'failed' if (failed_result_items | length) > 0 else 'successful' }}"
          results: "{{ combined_claim_results }}"
      tags:
        - always
        - normalize

    - name: Export normalized claim result outputs
      ansible.builtin.set_fact:
        normalized_claim_results_json: "{{ normalized_claim_results | to_json }}"
        normalized_claim_batch_status: "{{ normalized_claim_results.summary.batch_status }}"
        normalized_claim_successful_count: "{{ normalized_claim_results.summary.successful_count | string }}"
        normalized_claim_failed_count: "{{ normalized_claim_results.summary.failed_count | string }}"
        normalized_claim_conflict_count: "{{ normalized_claim_results.summary.conflict_count | string }}"
        normalized_claim_skipped_count: "{{ normalized_claim_results.summary.skipped_count | string }}"
        normalized_claim_changed_count: "{{ normalized_claim_results.summary.changed_count | string }}"
      tags:
        - outputs

    - name: Validate normalized claim result outputs
      ansible.builtin.assert:
        that:
          - normalized_claim_results_json is defined
          - normalized_claim_batch_status is defined
          - normalized_claim_successful_count is defined
          - normalized_claim_failed_count is defined
          - normalized_claim_conflict_count is defined
          - normalized_claim_skipped_count is defined
          - normalized_claim_changed_count is defined
        fail_msg: "normalize-claim-results did not produce the expected outputs"
      tags:
        - always
        - verify

    - name: Export normalize-claim-results outputs to Torque
      torque.collections.export_torque_outputs:
        outputs:
          normalized_claim_results_json: "{{ normalized_claim_results_json }}"
          normalized_claim_batch_status: "{{ normalized_claim_batch_status }}"
          normalized_claim_successful_count: "{{ normalized_claim_successful_count }}"
          normalized_claim_failed_count: "{{ normalized_claim_failed_count }}"
          normalized_claim_conflict_count: "{{ normalized_claim_conflict_count }}"
          normalized_claim_skipped_count: "{{ normalized_claim_skipped_count }}"
          normalized_claim_changed_count: "{{ normalized_claim_changed_count }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
