spec_version: 2
description: Nested blueprint experiment producer
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: Wrapped deployment context JSON string
  platform_json:
    type: string
    description: Wrapped platform context JSON string
  name_prefix:
    type: string
    description: Prefix used to build sample managed object names

grains:
  produce_chain_payload:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/blueprint_chain_experiment_producer/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_json: '{{ .inputs.deployment_json }}'
        - platform_json: '{{ .inputs.platform_json }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
      outputs:
        - phase_a_status
        - phase_a_payload_json
        - phase_a_summary_json

outputs:
  phase_a_status:
    value: '{{ .grains.produce_chain_payload.outputs.phase_a_status }}'
  phase_a_payload_json:
    value: '{{ .grains.produce_chain_payload.outputs.phase_a_payload_json }}'
  phase_a_summary_json:
    value: '{{ .grains.produce_chain_payload.outputs.phase_a_summary_json }}'
