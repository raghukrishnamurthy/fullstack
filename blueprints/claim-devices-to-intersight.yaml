spec_version: 2
description: Focused Intersight claim workflow for reusable context, credential-resolution, claim, and normalization grains
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  api_uri:
    type: string
    description: Intersight SaaS or appliance API base URI
    default: https://intersight.com/api/v1
  intersight_api_key_id_ref:
    type: string
    description: Secret reference for Intersight API key id, for example env://... or file://...
    default: env://INTERSIGHT_API_KEY_ID
  intersight_api_private_key_ref:
    type: string
    description: Secret reference for Intersight API private key, for example env://... or file://...
    default: env://INTERSIGHT_API_PRIVATE_KEY
  organization:
    type: string
    description: Intersight organization
    default: ai-prod
  fi_target_username:
    type: string
    description: Username for fabric interconnect claim readiness and appliance claim
    default: admin
  fi_target_password_ref:
    type: string
    description: Secret reference for fabric interconnect password, for example env://... or file://...
    default: env://FI_TARGET_PASSWORD
  rack_target_username:
    type: string
    description: Username for standalone rack claim readiness and appliance claim
    default: admin
  rack_target_password_ref:
    type: string
    description: Secret reference for standalone rack password, for example env://... or file://...
    default: env://RACK_TARGET_PASSWORD
  claim_targets_json:
    type: string
    description: JSON array of Intersight claim targets to process
    default: '[]'
grains:
  resolve_claim_target_credentials:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/prepare-claim-target-credentials/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .inputs.claim_targets_json }}'
        - internal_debug_enabled: 'true'
        - credential_candidates_yaml: |
            credential_candidates:
              - credential_role: target
                target_category: server
                target_form_factor: rack
                target_management_type: standalone
                username: {{ .inputs.rack_target_username }}
                password_ref: {{ .inputs.rack_target_password_ref }}
              - credential_role: target
                target_category: fabric_interconnect
                username: {{ .inputs.fi_target_username }}
                password_ref: {{ .inputs.fi_target_password_ref }}
      outputs:
        - resolved_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/prepare-claim-target-credentials/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  split_claim_target_phases:
    kind: ansible
    depends-on: resolve_claim_target_credentials
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/split-claim-target-phases/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .grains.resolve_claim_target_credentials.outputs.resolved_claim_targets_json }}'
      outputs:
        - assist_claim_targets_json
        - direct_claim_targets_json
        - assist_dependent_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/split-claim-target-phases/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  claim_assist_targets_to_intersight:
    kind: ansible
    depends-on: split_claim_target_phases
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: |
            deployment:
              id: claim-devices-to-intersight
        - internal_debug_enabled: 'true'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: {{ .inputs.intersight_api_key_id_ref }}
                  api_private_key_ref: {{ .inputs.intersight_api_private_key_ref }}
        - organization: '{{ .inputs.organization }}'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.assist_claim_targets_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  claim_direct_targets_to_intersight:
    kind: ansible
    depends-on: claim_assist_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: |
            deployment:
              id: claim-devices-to-intersight
        - internal_debug_enabled: 'true'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: {{ .inputs.intersight_api_key_id_ref }}
                  api_private_key_ref: {{ .inputs.intersight_api_private_key_ref }}
        - organization: '{{ .inputs.organization }}'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.direct_claim_targets_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  claim_assist_dependent_targets_to_intersight:
    kind: ansible
    depends-on: claim_direct_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: |
            deployment:
              id: claim-devices-to-intersight
        - internal_debug_enabled: 'true'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: {{ .inputs.intersight_api_key_id_ref }}
                  api_private_key_ref: {{ .inputs.intersight_api_private_key_ref }}
        - organization: '{{ .inputs.organization }}'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.assist_dependent_claim_targets_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  merge_claim_phase_results:
    kind: ansible
    depends-on: claim_assist_dependent_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/merge-claim-phase-results/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - assist_results_json: '{{ .grains.claim_assist_targets_to_intersight.outputs.results_json }}'
        - direct_results_json: '{{ .grains.claim_direct_targets_to_intersight.outputs.results_json }}'
        - assist_dependent_results_json: '{{ .grains.claim_assist_dependent_targets_to_intersight.outputs.results_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/claim-devices-to-intersight/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
outputs:
  claim_results_json:
    value: '{{ .grains.merge_claim_phase_results.outputs.results_json }}'
  normalized_claim_results_json:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_results_json }}'
  normalized_claim_batch_status:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_batch_status }}'
  normalized_claim_successful_count:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_successful_count }}'
  normalized_claim_failed_count:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_failed_count }}'
  normalized_claim_conflict_count:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_conflict_count }}'
  normalized_claim_skipped_count:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_skipped_count }}'
  normalized_claim_changed_count:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_changed_count }}'
