spec_version: 2
description: Minimal Torque blueprint to confirm where staged files appear inside a shell grain sandbox and can be copied into /tmp
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  staged_file_name:
    type: string
    description: Expected runtime filename for the staged file
    default: torque-file-test.txt
grains:
  test_staged_file:
    kind: shell
    spec:
      files:
        - source: intersight-fullstack-repo
          path: assets/secrets/torque-file-test.txt
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - |
              set -eu
              STAGED_FILE_NAME='{{ .inputs.staged_file_name }}'
              REPO_RELATIVE_PATH="assets/secrets/${STAGED_FILE_NAME}"
              REPO_ABSOLUTE_PATH="$(pwd)/${REPO_RELATIVE_PATH}"
              TMP_ROOT="/tmp/torque-staged-file-test"
              TMP_COPY_PATH="${TMP_ROOT}/${STAGED_FILE_NAME}"

              echo "Current workspace: $(pwd)"
              echo "Checking staged file at ${REPO_ABSOLUTE_PATH}"

              if [ ! -f "${REPO_RELATIVE_PATH}" ]; then
                echo "staged_file_pwd=$(pwd)"
                echo "staged_file_candidate_path=$(pwd)/${STAGED_FILE_NAME}"
                echo "staged_file_repo_relative_candidate_path=${REPO_ABSOLUTE_PATH}"
                echo "staged_file_tmp_copy_path=${TMP_COPY_PATH}"
                echo "staged_file_exists=false"
                echo "staged_file_content="
                echo "staged_file_find_output=$(find "$(pwd)" -name "${STAGED_FILE_NAME}" -print || true)"
                exit 1
              fi

              mkdir -p "${TMP_ROOT}"
              cp "${REPO_RELATIVE_PATH}" "${TMP_COPY_PATH}"

              echo "staged_file_pwd=$(pwd)"
              echo "staged_file_candidate_path=$(pwd)/${STAGED_FILE_NAME}"
              echo "staged_file_repo_relative_candidate_path=${REPO_ABSOLUTE_PATH}"
              echo "staged_file_tmp_copy_path=${TMP_COPY_PATH}"
              echo "staged_file_exists=true"
              echo "staged_file_content=$(cat "${TMP_COPY_PATH}")"
              echo "staged_file_find_output=$(find "$(pwd)" -name "${STAGED_FILE_NAME}" -print)"
      outputs:
        - staged_file_pwd
        - staged_file_candidate_path
        - staged_file_repo_relative_candidate_path
        - staged_file_tmp_copy_path
        - staged_file_exists
        - staged_file_content
        - staged_file_find_output
