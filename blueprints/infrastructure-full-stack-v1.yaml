spec_version: 2
description: Full-stack infrastructure orchestration blueprint that chains onboarding, network provisioning, domain validation, and resource provisioning.

inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.

  # Onboarding JSON contracts
  deployment_json:
    type: string
    description: JSON deployment context for onboarding.
  api_uri:
    type: string
    description: Intersight SaaS or appliance API base URI.
    default: https://intersight.com/api/v1
  intersight_api_key_id:
    type: string
    description: Intersight API key id.
  intersight_api_private_key:
    type: string
    description: Intersight API private key PEM content.
  platform_json:
    type: string
    description: Optional JSON platform context override for onboarding.
    default: ''
  placement_json:
    type: string
    description: JSON placement context for onboarding.
  inventory_json:
    type: string
    description: JSON inventory context for onboarding.
  solution_json:
    type: string
    description: JSON solution profile context for onboarding.
  credential_candidates_json:
    type: string
    description: Structured YAML or JSON device credential contract for onboarding-capable targets.
    default: '{}'
  encrypted_device_secret_bundle_path:
    type: string
    description: Optional encrypted device secret bundle path.
    default: ''
  device_secret_bundle_key:
    type: string
    description: Optional unwrap key used to decrypt encrypted_device_secret_bundle_path at runtime.
    default: ''
  site_json:
    type: string
    description: Optional JSON site context for onboarding.
    default: ''
  baseline_input_source:
    type: string
    description: Optional HTTP(S) customer baseline source.
    default: ''
  baseline_directory:
    type: string
    description: Optional local customer baseline directory.
    default: ''
  overrides_json:
    type: string
    description: Optional JSON overrides applied after baseline resolution.
    default: ''

  # YAML contracts for later phases
  deployment_yaml:
    type: string
    description: Wrapped deployment context YAML for network, validation, and resource phases.
  platform_yaml:
    type: string
    description: Wrapped platform context YAML for network, validation, and resource phases.
  placement_yaml:
    type: string
    description: Wrapped placement context YAML for network, validation, and resource phases.
  inventory_yaml:
    type: string
    description: Wrapped inventory context YAML for network, validation, and resource phases.
  solution_yaml:
    type: string
    description: Optional wrapped solution context YAML.
    default: ''
  site_yaml:
    type: string
    description: Optional wrapped site context YAML.
    default: ''
  overrides_yaml:
    type: string
    description: Optional wrapped deployment overrides YAML.
    default: ''

  name_prefix:
    type: string
    description: Prefix used to construct managed object names.

  # Phase controls
  onboarding_validation_mode:
    type: string
    default: live
  onboarding_execution_intent:
    type: string
    default: apply
  onboarding_wait_for_completion:
    type: string
    default: 'true'
  onboarding_validation_poll_interval:
    type: string
    default: '30'
  onboarding_validation_timeout_seconds:
    type: string
    default: '300'

  network_validation_mode:
    type: string
    default: strict
  network_execution_intent:
    type: string
    default: apply
  policy_profile:
    type: string
    default: recommended
  port_mapping_profile:
    type: string
    default: ethernet
  domain_profile_selections_json:
    type: string
    default: '{"domains":{}}'

  validator_validation_mode:
    type: string
    default: strict
  wait_for_readiness:
    type: string
    default: 'true'
  readiness_poll_interval:
    type: string
    default: '30'
  readiness_max_attempts:
    type: string
    default: '240'

  resource_execution_intent:
    type: string
    default: apply
  resource_lifecycle_action:
    type: string
    default: create
  chassis_profile:
    type: string
    default: recommended
  resource_profile_selections_json:
    type: string
    default: '{"domains":{}}'

grains:
  onboarding:
    kind: blueprint
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/infrastructure-onboard-devices.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_json: '{{ .inputs.deployment_json }}'
        - api_uri: '{{ .inputs.api_uri }}'
        - intersight_api_key_id: '{{ .inputs.intersight_api_key_id }}'
        - intersight_api_private_key: '{{ .inputs.intersight_api_private_key }}'
        - platform_json: '{{ .inputs.platform_json }}'
        - placement_json: '{{ .inputs.placement_json }}'
        - inventory_json: '{{ .inputs.inventory_json }}'
        - solution_json: '{{ .inputs.solution_json }}'
        - credential_candidates_json: '{{ .inputs.credential_candidates_json }}'
        - encrypted_device_secret_bundle_path: '{{ .inputs.encrypted_device_secret_bundle_path }}'
        - device_secret_bundle_key: '{{ .inputs.device_secret_bundle_key }}'
        - site_json: '{{ .inputs.site_json }}'
        - baseline_input_source: '{{ .inputs.baseline_input_source }}'
        - baseline_directory: '{{ .inputs.baseline_directory }}'
        - overrides_json: '{{ .inputs.overrides_json }}'
        - validation_mode: '{{ .inputs.onboarding_validation_mode }}'
        - execution_intent: '{{ .inputs.onboarding_execution_intent }}'
        - wait_for_completion: '{{ .inputs.onboarding_wait_for_completion }}'
        - validation_poll_interval: '{{ .inputs.onboarding_validation_poll_interval }}'
        - validation_timeout_seconds: '{{ .inputs.onboarding_validation_timeout_seconds }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - phase_summary_json
        - claim_execution_results_json

  network:
    kind: blueprint
    depends-on: onboarding
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/infrastructure-network-provisioning.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_json: '{{ .inputs.deployment_json }}'
        - api_uri: '{{ .inputs.api_uri }}'
        - intersight_api_key_id: '{{ .inputs.intersight_api_key_id }}'
        - intersight_api_private_key: '{{ .inputs.intersight_api_private_key }}'
        - platform_json: '{{ .inputs.platform_json }}'
        - placement_json: '{{ .inputs.placement_json }}'
        - inventory_json: '{{ .inputs.inventory_json }}'
        - solution_json: '{{ .inputs.solution_json }}'
        - site_json: '{{ .inputs.site_json }}'
        - baseline_input_source: '{{ .inputs.baseline_input_source }}'
        - baseline_directory: '{{ .inputs.baseline_directory }}'
        - overrides_json: '{{ .inputs.overrides_json }}'
        - validation_mode: '{{ .inputs.network_validation_mode }}'
        - execution_intent: '{{ .inputs.network_execution_intent }}'
        - organization_moid: '{{ .grains.onboarding.outputs.org_moid }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
        - policy_profile: '{{ .inputs.policy_profile }}'
        - port_mapping_profile: '{{ .inputs.port_mapping_profile }}'
        - domain_profile_selections_json: '{{ .inputs.domain_profile_selections_json }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - validation_summary_json
        - deploy_summary_json

  domain_validator:
    kind: blueprint
    depends-on: network
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/infrastructure-domain-post-validation-v1.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_yaml: '{{ .inputs.deployment_yaml }}'
        - platform_yaml: '{{ .inputs.platform_yaml }}'
        - placement_yaml: '{{ .inputs.placement_yaml }}'
        - inventory_yaml: '{{ .inputs.inventory_yaml }}'
        - site_yaml: '{{ .inputs.site_yaml }}'
        - validation_mode: '{{ .inputs.validator_validation_mode }}'
        - wait_for_readiness: '{{ .inputs.wait_for_readiness }}'
        - readiness_poll_interval: '{{ .inputs.readiness_poll_interval }}'
        - readiness_max_attempts: '{{ .inputs.readiness_max_attempts }}'
        - execution_intent: validate_only
        - lifecycle_action: create
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - validation_summary_json
        - tac_handoff_json

  resource:
    kind: blueprint
    depends-on: domain_validator
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/infrastructure-resource-provisioning-v1.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_yaml: '{{ .inputs.deployment_yaml }}'
        - platform_yaml: '{{ .inputs.platform_yaml }}'
        - placement_yaml: '{{ .inputs.placement_yaml }}'
        - inventory_yaml: '{{ .inputs.inventory_yaml }}'
        - solution_yaml: '{{ .inputs.solution_yaml }}'
        - site_yaml: '{{ .inputs.site_yaml }}'
        - execution_intent: '{{ .inputs.resource_execution_intent }}'
        - lifecycle_action: '{{ .inputs.resource_lifecycle_action }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
        - chassis_profile: '{{ .inputs.chassis_profile }}'
        - resource_profile_selections_json: '{{ .inputs.resource_profile_selections_json }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - validation_summary_json
        - tac_handoff_json

outputs:
  onboarding_phase_status:
    value: '{{ .grains.onboarding.outputs.phase_status }}'
  onboarding_phase_ready:
    value: '{{ .grains.onboarding.outputs.phase_ready }}'
  network_phase_status:
    value: '{{ .grains.network.outputs.phase_status }}'
  network_phase_ready:
    value: '{{ .grains.network.outputs.phase_ready }}'
  domain_validator_phase_status:
    value: '{{ .grains.domain_validator.outputs.phase_status }}'
  domain_validator_phase_ready:
    value: '{{ .grains.domain_validator.outputs.phase_ready }}'
  resource_phase_status:
    value: '{{ .grains.resource.outputs.phase_status }}'
  resource_phase_ready:
    value: '{{ .grains.resource.outputs.phase_ready }}'
