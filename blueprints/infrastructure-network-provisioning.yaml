spec_version: 2
description: Infrastructure network provisioning for Intersight IMM FI-attached domains using onboarding-style public inputs
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: JSON deployment context for the infrastructure domain
  api_uri:
    type: string
    description: Intersight SaaS or appliance API base URI
    default: https://intersight.com/api/v1
  intersight_api_key_id:
    type: string
    description: Intersight API key id
  intersight_api_private_key:
    type: string
    description: Intersight API private key PEM content
  platform_json:
    type: string
    description: Optional JSON platform context override including Intersight endpoint and non-secret settings
    default: ''
  placement_json:
    type: string
    description: JSON placement context for Intersight organization and related settings
  inventory_json:
    type: string
    description: JSON inventory context for the infrastructure domain
  solution_json:
    type: string
    description: Optional JSON solution profile context
    default: ''
  site_json:
    type: string
    description: Optional JSON site context for shared operational defaults
    default: ''
  baseline_input_source:
    type: string
    description: Optional HTTP(S) customer baseline source
    default: ''
  baseline_directory:
    type: string
    description: Optional local customer baseline directory
    default: ''
  overrides_json:
    type: string
    description: Optional JSON overrides applied after baseline resolution
    default: ''
  validation_mode:
    type: string
    description: Validation mode for discovery and optional live Intersight validation
    default: strict
  execution_intent:
    type: string
    description: Execution intent for the network phase
    default: validate_only
  name_prefix:
    type: string
    description: Prefix used to construct managed object names
  policy_profile:
    type: string
    description: Named built-in policy profile id
    default: recommended
  port_mapping_profile:
    type: string
    description: Named built-in port mapping profile id
    default: ethernet
  domain_profile_selections_json:
    type: string
    description: Optional per-domain selection refinements as JSON
    default: '{"domains":{}}'

grains:
  resolve_infrastructure_network_model:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/resolve_infrastructure_network_model/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: '{{ .inputs.deployment_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id: '{{ .inputs.intersight_api_key_id }}'
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: '{{ .inputs.placement_json }}'
        - inventory_yaml: '{{ .inputs.inventory_json }}'
        - solution_yaml: '{{ .inputs.solution_json }}'
        - site_yaml: '{{ .inputs.site_json }}'
        - baseline_input_source: '{{ .inputs.baseline_input_source }}'
        - baseline_directory: '{{ .inputs.baseline_directory }}'
        - overrides_yaml: '{{ .inputs.overrides_json }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
        - policy_profile: '{{ .inputs.policy_profile }}'
        - port_mapping_profile: '{{ .inputs.port_mapping_profile }}'
        - domain_profile_selections_json: '{{ .inputs.domain_profile_selections_json }}'
      outputs:
        - infrastructure_network_model_json
        - infrastructure_network_summary_json

  discover_and_validate_infrastructure_network:
    kind: ansible
    depends-on: resolve_infrastructure_network_model
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/discover_and_validate_infrastructure_network/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - infrastructure_network_model_json: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_model_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id: '{{ .inputs.intersight_api_key_id }}'
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: '{{ .inputs.placement_json }}'
        - validation_mode: '{{ .inputs.validation_mode }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - infrastructure_network_live_state_json
        - infrastructure_network_effective_model_json
        - infrastructure_network_validation_json
        - phase_ready
        - phase_status
        - phase_readiness_json

  realize_infrastructure_network_policies:
    kind: ansible
    depends-on: discover_and_validate_infrastructure_network
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/realize_infrastructure_network_policies/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - infrastructure_network_model_json: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_model_json }}'
        - infrastructure_network_effective_model_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_effective_model_json }}'
        - infrastructure_network_live_state_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_live_state_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id: '{{ .inputs.intersight_api_key_id }}'
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: '{{ .inputs.placement_json }}'
        - site_yaml: '{{ .inputs.site_json }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - realized_policy_state_json
        - policy_realization_summary_json

  realize_and_deploy_infrastructure_domain_profiles:
    kind: ansible
    depends-on: realize_infrastructure_network_policies
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/realize_and_deploy_infrastructure_domain_profiles/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - infrastructure_network_model_json: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_model_json }}'
        - infrastructure_network_effective_model_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_effective_model_json }}'
        - infrastructure_network_live_state_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_live_state_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id: '{{ .inputs.intersight_api_key_id }}'
                  api_private_key: |
                    {{ .inputs.intersight_api_private_key }}
        - placement_yaml: '{{ .inputs.placement_json }}'
        - realized_policy_state_json: '{{ .grains.realize_infrastructure_network_policies.outputs.realized_policy_state_json }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - domain_profile_state_json
        - policy_attachment_state_json
        - deploy_state_json
        - deploy_summary_json

  validate_and_summarize_infrastructure_network:
    kind: ansible
    depends-on: realize_and_deploy_infrastructure_domain_profiles
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/validate_and_summarize_infrastructure_network/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - infrastructure_network_model_json: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_model_json }}'
        - infrastructure_network_effective_model_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_effective_model_json }}'
        - infrastructure_network_summary_json: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_summary_json }}'
        - infrastructure_network_validation_json: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_validation_json }}'
        - realized_policy_state_json: '{{ .grains.realize_infrastructure_network_policies.outputs.realized_policy_state_json }}'
        - policy_realization_summary_json: '{{ .grains.realize_infrastructure_network_policies.outputs.policy_realization_summary_json }}'
        - domain_profile_state_json: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.domain_profile_state_json }}'
        - policy_attachment_state_json: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.policy_attachment_state_json }}'
        - deploy_state_json: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.deploy_state_json }}'
        - deploy_summary_json: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.deploy_summary_json }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - managed_object_inventory_json
        - validation_summary_json
        - tac_handoff_json

outputs:
  phase_ready:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.phase_ready }}'
  phase_status:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.phase_status }}'
  phase_readiness_json:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.phase_readiness_json }}'
  infrastructure_network_model_json:
    value: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_model_json }}'
  infrastructure_network_effective_model_json:
    value: '{{ .grains.discover_and_validate_infrastructure_network.outputs.infrastructure_network_effective_model_json }}'
  infrastructure_network_summary_json:
    value: '{{ .grains.resolve_infrastructure_network_model.outputs.infrastructure_network_summary_json }}'
  realized_policy_state_json:
    value: '{{ .grains.realize_infrastructure_network_policies.outputs.realized_policy_state_json }}'
  domain_profile_state_json:
    value: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.domain_profile_state_json }}'
  deploy_summary_json:
    value: '{{ .grains.realize_and_deploy_infrastructure_domain_profiles.outputs.deploy_summary_json }}'
  managed_object_inventory_json:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.managed_object_inventory_json }}'
  validation_summary_json:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.validation_summary_json }}'
  tac_handoff_json:
    value: '{{ .grains.validate_and_summarize_infrastructure_network.outputs.tac_handoff_json }}'
