spec_version: 2
description: Infrastructure network provisioning phase blueprint that plans shared FI and fabric/network foundation from shared JSON-string context
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: JSON deployment context for the infrastructure domain
  api_uri:
    type: string
    description: Intersight SaaS or appliance API base URI
    default: https://intersight.com/api/v1
  intersight_api_key_id:
    type: string
    description: Intersight API key id
  intersight_api_private_key:
    type: string
    description: Intersight API private key PEM content
  platform_json:
    type: string
    description: Optional JSON platform override; direct Intersight inputs are preferred
    default: ''
  placement_json:
    type: string
    description: JSON placement context for Intersight organization and related settings
  inventory_json:
    type: string
    description: JSON inventory context for the infrastructure domain
  solution_json:
    type: string
    description: JSON solution profile context used to resolve built-in baseline selection
  credential_candidates_json:
    type: string
    description: Optional JSON credential-candidate contract used by the integrated model grain
    default: "{}"
  encrypted_device_secret_bundle_path:
    type: string
    description: Optional encrypted device secret bundle path; defaults to the repo-staged bundle when present
    default: ''
  device_secret_bundle_key:
    type: string
    description: Optional unwrap key used to decrypt encrypted_device_secret_bundle_path at runtime
    default: ''
  site_json:
    type: string
    description: Optional JSON site context for shared operational defaults
    default: ''
  baseline_input_source:
    type: string
    description: Optional HTTP(S) customer baseline source
    default: ''
  baseline_directory:
    type: string
    description: Optional local customer baseline directory
    default: ''
  overrides_json:
    type: string
    description: Optional JSON overrides applied after baseline resolution
    default: ''
  validation_mode:
    type: string
    description: Validation mode for discovery and optional live Intersight validation
    default: strict
  execution_intent:
    type: string
    description: Execution intent for the network phase
    default: validate_only
grains:
  prepare_device_secret_bundle:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/prepare-device-secret-bundle/playbook.yaml
      files:
        - source: intersight-fullstack-repo
          path: assets/secrets/device-secrets.enc
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - encrypted_device_secret_bundle_path: '{{ .inputs.encrypted_device_secret_bundle_path }}'
        - device_secret_bundle_key: '{{ .inputs.device_secret_bundle_key }}'
        - credential_candidates_yaml: '{{ .inputs.credential_candidates_json }}'
      outputs:
        - resolved_credential_candidates_yaml
        - resolved_device_secret_bundle_root
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/prepare-device-secret-bundle/playbook.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  build_infrastructure_domain_model:
    kind: ansible
    depends-on: prepare_device_secret_bundle
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/build-infrastructure-domain-model/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: '{{ .inputs.deployment_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - placement_yaml: '{{ .inputs.placement_json }}'
        - inventory_yaml: '{{ .inputs.inventory_json }}'
        - solution_yaml: '{{ .inputs.solution_json }}'
        - credential_candidates_yaml: '{{ .grains.prepare_device_secret_bundle.outputs.resolved_credential_candidates_yaml }}'
        - site_yaml: '{{ .inputs.site_json }}'
        - baseline_input_source: '{{ .inputs.baseline_input_source }}'
        - baseline_directory: '{{ .inputs.baseline_directory }}'
        - overrides_yaml: '{{ .inputs.overrides_json }}'
        - validation_mode: '{{ .inputs.validation_mode }}'
        - execution_intent: validate_only
      outputs:
        - discovery_model_json
        - discovery_summary_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/build-infrastructure-domain-model/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  infrastructure_network_provisioning:
    kind: ansible
    depends-on: build_infrastructure_domain_model
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/infrastructure-network-provisioning/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - discovery_model_json: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_model_json }}'
        - discovery_summary_json: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_summary_json }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
        - network_foundation_plan_json
        - network_foundation_summary_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/infrastructure-network-provisioning/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
outputs:
  phase_ready:
    value: '{{ .grains.infrastructure_network_provisioning.outputs.phase_ready }}'
  phase_status:
    value: '{{ .grains.infrastructure_network_provisioning.outputs.phase_status }}'
  phase_readiness_json:
    value: '{{ .grains.infrastructure_network_provisioning.outputs.phase_readiness_json }}'
  network_foundation_plan_json:
    value: '{{ .grains.infrastructure_network_provisioning.outputs.network_foundation_plan_json }}'
  network_foundation_summary_json:
    value: '{{ .grains.infrastructure_network_provisioning.outputs.network_foundation_summary_json }}'
  discovery_model_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_model_json }}'
  discovery_summary_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_summary_json }}'
