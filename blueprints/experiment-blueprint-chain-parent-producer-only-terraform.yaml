spec_version: 2

description: Parent diagnostic that nests only the terraform-backed child blueprint.

inputs:
  name_prefix:
    type: string
    default: vf1

  Agent:
    type: agent

grains:
  phase_a:
    kind: blueprint
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/experiment-blueprint-chain-producer-terraform.yaml
      inputs:
        - name_prefix: '{{ .inputs.name_prefix }}'
        - Agent: '{{ .inputs.Agent }}'
      outputs:
        - phase_a_status
        - phase_a_payload_json
        - phase_a_summary_json

outputs:
  phase_a_status:
    value: '{{ .grains.phase_a.outputs.phase_a_status }}'
  phase_a_payload_json:
    value: '{{ .grains.phase_a.outputs.phase_a_payload_json }}'
  phase_a_summary_json:
    value: '{{ .grains.phase_a.outputs.phase_a_summary_json }}'
