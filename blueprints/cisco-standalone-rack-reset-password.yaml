spec_version: 2
description: Focused standalone rack password reset workflow for manufacturing-to-target credential normalization
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  targets_json:
    type: string
    description: JSON array of standalone rack server targets to reset
    default: '[]'
  manufacturing_username:
    type: string
    description: Username for manufacturing or factory-default rack login
    default: admin
  manufacturing_password:
    type: string
    description: Password for manufacturing or factory-default rack login
    sensitive: true
  target_username:
    type: string
    description: Username for desired standalone rack login after normalization
    default: admin
  target_password:
    type: string
    description: Password for desired standalone rack login after normalization
    sensitive: true
grains:
  reset_standalone_rack_password:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/reset-standalone-rack-password/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - MANUFACTURING_RACK_PASSWORD: '{{ .inputs.manufacturing_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - targets_json: '{{ .inputs.targets_json }}'
        - credential_candidates_yaml: |
            credential_candidates:
              - credential_role: manufacturing
                target_category: server
                target_form_factor: rack
                target_management_type: standalone
                username: {{ .inputs.manufacturing_username }}
                password_ref: env://MANUFACTURING_RACK_PASSWORD
              - credential_role: target
                target_category: server
                target_form_factor: rack
                target_management_type: standalone
                username: {{ .inputs.target_username }}
                password_ref: env://RACK_TARGET_PASSWORD
      outputs:
        - rack_password_reset_results_json
        - password_reset_ready_targets_json
        - password_reset_pending_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/reset-standalone-rack-password/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
outputs:
  rack_password_reset_results_json:
    value: '{{ .grains.reset_standalone_rack_password.outputs.rack_password_reset_results_json }}'
  password_reset_ready_targets_json:
    value: '{{ .grains.reset_standalone_rack_password.outputs.password_reset_ready_targets_json }}'
  password_reset_pending_targets_json:
    value: '{{ .grains.reset_standalone_rack_password.outputs.password_reset_pending_targets_json }}'
