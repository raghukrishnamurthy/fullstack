spec_version: 2
description: Parent blueprint that tests nested blueprint chaining and output handoff
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: Wrapped deployment context JSON string
  platform_json:
    type: string
    description: Wrapped platform context JSON string
  name_prefix:
    type: string
    description: Prefix used to build sample managed object names

grains:
  phase_a:
    kind: blueprint
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/experiment-blueprint-chain-producer.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_json: '{{ .inputs.deployment_json }}'
        - platform_json: '{{ .inputs.platform_json }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
      outputs:
        - phase_a_status
        - phase_a_payload_json
        - phase_a_summary_json

  phase_b:
    kind: blueprint
    depends-on: phase_a
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/experiment-blueprint-chain-consumer.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - phase_a_payload_json: '{{ .grains.phase_a.outputs.phase_a_payload_json }}'
        - phase_a_summary_json: '{{ .grains.phase_a.outputs.phase_a_summary_json }}'
      outputs:
        - phase_b_status
        - phase_b_payload_json
        - phase_b_summary_json

outputs:
  phase_a_status:
    value: '{{ .grains.phase_a.outputs.phase_a_status }}'
  phase_a_payload_json:
    value: '{{ .grains.phase_a.outputs.phase_a_payload_json }}'
  phase_b_status:
    value: '{{ .grains.phase_b.outputs.phase_b_status }}'
  phase_b_payload_json:
    value: '{{ .grains.phase_b.outputs.phase_b_payload_json }}'
  phase_b_summary_json:
    value: '{{ .grains.phase_b.outputs.phase_b_summary_json }}'
