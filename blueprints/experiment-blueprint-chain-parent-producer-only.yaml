spec_version: 2
description: Parent blueprint that tests nested producer blueprint output materialization only
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: Wrapped deployment context JSON string
  platform_json:
    type: string
    description: Wrapped platform context JSON string
  name_prefix:
    type: string
    description: Prefix used to build sample managed object names

grains:
  bp_phase_a:
    kind: blueprint
    spec:
      source:
        store: intersight-fullstack-repo
        path: blueprints/experiment-blueprint-chain-producer.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - deployment_json: '{{ .inputs.deployment_json }}'
        - platform_json: '{{ .inputs.platform_json }}'
        - name_prefix: '{{ .inputs.name_prefix }}'
      outputs:
        - phase_a_status
        - phase_a_payload_json
        - phase_a_summary_json

outputs:
  phase_a_status:
    value: '{{ .grains.bp_phase_a.outputs.phase_a_status }}'
  phase_a_payload_json:
    value: '{{ .grains.bp_phase_a.outputs.phase_a_payload_json }}'
  phase_a_summary_json:
    value: '{{ .grains.bp_phase_a.outputs.phase_a_summary_json }}'
