spec_version: 2
description: Infrastructure onboarding phase blueprint that uses shared YAML context to discover, validate, and onboard devices into Intersight
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_yaml:
    type: string
    description: YAML deployment context for the infrastructure domain
  platform_yaml:
    type: string
    description: YAML platform context including Intersight endpoint and credential refs
  placement_yaml:
    type: string
    description: YAML placement context for Intersight organization and related settings
  inventory_yaml:
    type: string
    description: YAML inventory context for the infrastructure domain
  solution_yaml:
    type: string
    description: YAML solution profile context used to resolve built-in baseline selection
  credential_candidates_yaml:
    type: string
    description: YAML credential-candidate contract for onboarding-capable targets
    default: ''
  site_yaml:
    type: string
    description: Optional YAML site context for shared operational defaults
    default: ''
  baseline_input_source:
    type: string
    description: Optional HTTP(S) customer baseline source
    default: ''
  baseline_directory:
    type: string
    description: Optional local customer baseline directory
    default: ''
  overrides_yaml:
    type: string
    description: Optional YAML overrides applied after baseline resolution
    default: ''
  validation_mode:
    type: string
    description: Validation mode for discovery and optional live Intersight validation
    default: strict
  execution_intent:
    type: string
    description: Execution intent for the onboarding phase
    default: validate_only
  wait_for_completion:
    type: string
    description: Optional polling mode for asynchronous onboarding validation
    default: 'false'
  validation_poll_interval:
    type: string
    description: Poll interval in seconds when wait_for_completion is enabled
    default: '60'
  validation_timeout_seconds:
    type: string
    description: Total timeout in seconds when wait_for_completion is enabled
    default: '3600'
grains:
  build_infrastructure_domain_model:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/resolve-intersight-deployment-model/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_yaml: '{{ .inputs.deployment_yaml }}'
        - platform_yaml: '{{ .inputs.platform_yaml }}'
        - placement_yaml: '{{ .inputs.placement_yaml }}'
        - inventory_yaml: '{{ .inputs.inventory_yaml }}'
        - solution_yaml: '{{ .inputs.solution_yaml }}'
        - credential_candidates_yaml: '{{ .inputs.credential_candidates_yaml }}'
        - site_yaml: '{{ .inputs.site_yaml }}'
        - baseline_input_source: '{{ .inputs.baseline_input_source }}'
        - baseline_directory: '{{ .inputs.baseline_directory }}'
        - overrides_yaml: '{{ .inputs.overrides_yaml }}'
        - validation_mode: '{{ .inputs.validation_mode }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - discovery_model_json
        - discovery_summary_json
        - phase_ready
        - phase_status
        - phase_readiness_json
        - claim_candidate_targets_json
        - reachability_only_targets_json
        - onboarding_action_execution_json
        - claim_execution_results_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/resolve-intersight-deployment-model/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  validate_infrastructure_onboarding_completion:
    kind: ansible
    depends-on: build_infrastructure_domain_model
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/validate-infrastructure-onboarding-completion/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - discovery_model_json: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_model_json }}'
        - wait_for_completion: '{{ .inputs.wait_for_completion }}'
        - validation_poll_interval: '{{ .inputs.validation_poll_interval }}'
        - validation_timeout_seconds: '{{ .inputs.validation_timeout_seconds }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/validate-infrastructure-onboarding-completion/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
  render_infrastructure_onboarding_summary:
    kind: ansible
    depends-on: build_infrastructure_domain_model
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/render-intersight-deployment-summary/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - discovery_model_json: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_model_json }}'
        - discovery_summary_json: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_summary_json }}'
      outputs:
        - discovery_report_json
        - discovery_summary_markdown
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/render-intersight-deployment-summary/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
outputs:
  phase_ready:
    value: '{{ .grains.validate_infrastructure_onboarding_completion.outputs.phase_ready }}'
  phase_status:
    value: '{{ .grains.validate_infrastructure_onboarding_completion.outputs.phase_status }}'
  phase_readiness_json:
    value: '{{ .grains.validate_infrastructure_onboarding_completion.outputs.phase_readiness_json }}'
  claim_candidate_targets_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.claim_candidate_targets_json }}'
  reachability_only_targets_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.reachability_only_targets_json }}'
  onboarding_action_execution_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.onboarding_action_execution_json }}'
  claim_execution_results_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.claim_execution_results_json }}'
  discovery_model_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_model_json }}'
  discovery_summary_json:
    value: '{{ .grains.build_infrastructure_domain_model.outputs.discovery_summary_json }}'
  discovery_report_json:
    value: '{{ .grains.render_infrastructure_onboarding_summary.outputs.discovery_report_json }}'
  discovery_summary_markdown:
    value: '{{ .grains.render_infrastructure_onboarding_summary.outputs.discovery_summary_markdown }}'
