spec_version: 2
description: Infrastructure onboarding phase blueprint that composes explicit onboarding grains for context, target build, reset, prepare, claim, and validation
inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  deployment_json:
    type: string
    description: JSON deployment context for the infrastructure domain
  api_uri:
    type: string
    description: Intersight SaaS or appliance API base URI
    default: https://intersight.com/api/v1
  intersight_api_key_id:
    type: string
    description: Intersight API key id
  intersight_api_private_key:
    type: string
    description: Intersight API private key PEM content
  platform_json:
    type: string
    description: Optional JSON platform context override including Intersight endpoint and non-secret settings
    default: ''
  placement_json:
    type: string
    description: JSON placement context for Intersight organization and related settings
  inventory_json:
    type: string
    description: JSON inventory context for the infrastructure domain
  solution_json:
    type: string
    description: JSON solution profile context used to resolve built-in baseline selection
  fi_target_username:
    type: string
    description: Username for fabric interconnect onboarding targets
    default: admin
  fi_target_password:
    type: string
    description: Password for fabric interconnect onboarding targets
  rack_target_username:
    type: string
    description: Username for standalone rack onboarding targets
    default: admin
  rack_target_password:
    type: string
    description: Password for standalone rack onboarding targets
  manufacturing_rack_username:
    type: string
    description: Username for manufacturing or factory-default standalone rack login
    default: admin
  manufacturing_rack_password:
    type: string
    description: Password for manufacturing or factory-default standalone rack login
  credential_candidates_json:
    type: string
    description: Optional JSON credential-candidate contract override for onboarding-capable targets
    default: ''
  site_json:
    type: string
    description: Optional JSON site context for shared operational defaults
    default: ''
  baseline_input_source:
    type: string
    description: Optional HTTP(S) customer baseline source
    default: ''
  baseline_directory:
    type: string
    description: Optional local customer baseline directory
    default: ''
  overrides_json:
    type: string
    description: Optional JSON overrides applied after baseline resolution
    default: ''
  validation_mode:
    type: string
    description: Validation mode for discovery and optional live Intersight validation
    default: live
  execution_intent:
    type: string
    description: Execution intent for the onboarding phase
    default: apply
  wait_for_completion:
    type: string
    description: Optional polling mode for asynchronous onboarding validation
    default: 'true'
  validation_poll_interval:
    type: string
    description: Poll interval in seconds when wait_for_completion is enabled
    default: '30'
  validation_timeout_seconds:
    type: string
    description: Total timeout in seconds when wait_for_completion is enabled
    default: '300'
grains:
  prepare_intersight_context:
    kind: ansible
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/prepare-intersight-context/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - bootstrap_python_requirements: 'true'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - placement_yaml: '{{ .inputs.placement_json }}'
      outputs:
        - context_status
        - org_status
        - org_name
        - org_action
        - org_result_json
        - context_result_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/prepare-intersight-context/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  build_infrastructure_onboarding_targets:
    kind: ansible
    depends-on: prepare_intersight_context
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/build-infrastructure-onboarding-targets/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - inventory_yaml: '{{ .inputs.inventory_json }}'
      outputs:
        - claim_targets_json
        - reset_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/build-infrastructure-onboarding-targets/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  reset_standalone_rack_passwords:
    kind: ansible
    depends-on: build_infrastructure_onboarding_targets
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/reset-standalone-rack-password/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - MANUFACTURING_RACK_PASSWORD: '{{ .inputs.manufacturing_rack_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.rack_target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - deployment_json: '{{ .inputs.deployment_json }}'
        - targets_json: '{{ .grains.build_infrastructure_onboarding_targets.outputs.reset_targets_json }}'
        - credential_candidates_yaml: |
            {{ .inputs.credential_candidates_json }}
        - validation_mode: '{{ .inputs.validation_mode }}'
        - execution_intent: '{{ .inputs.execution_intent }}'
      outputs:
        - rack_password_reset_results_json
        - password_reset_ready_targets_json
        - password_reset_pending_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/reset-standalone-rack-password/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  prepare_claim_target_credentials:
    kind: ansible
    depends-on: reset_standalone_rack_passwords
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/prepare-claim-target-credentials/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - FI_TARGET_PASSWORD: '{{ .inputs.fi_target_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.rack_target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .grains.build_infrastructure_onboarding_targets.outputs.claim_targets_json }}'
        - credential_candidates_yaml: |
            {{ .inputs.credential_candidates_json }}
      outputs:
        - resolved_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/prepare-claim-target-credentials/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  prepare_device_connector:
    kind: ansible
    depends-on: prepare_claim_target_credentials
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/prepare-device-connector/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .grains.prepare_claim_target_credentials.outputs.resolved_claim_targets_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - validation_mode: '{{ .inputs.validation_mode }}'
      outputs:
        - connector_prep_results_json
        - prepared_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/prepare-device-connector/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  split_claim_target_phases:
    kind: ansible
    depends-on: prepare_device_connector
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/split-claim-target-phases/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - claim_targets_json: '{{ .grains.prepare_device_connector.outputs.prepared_claim_targets_json }}'
      outputs:
        - assist_claim_targets_json
        - direct_claim_targets_json
        - assist_dependent_claim_targets_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/split-claim-target-phases/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

  claim_assist_targets_to_intersight:
    kind: ansible
    depends-on: split_claim_target_phases
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
        - FI_TARGET_PASSWORD: '{{ .inputs.fi_target_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.rack_target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - bootstrap_python_requirements: 'true'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.assist_claim_targets_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - deployment_json: '{{ .inputs.deployment_json }}'
        - organization: '{{ .grains.prepare_intersight_context.outputs.org_name }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  claim_direct_targets_to_intersight:
    kind: ansible
    depends-on: claim_assist_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
        - FI_TARGET_PASSWORD: '{{ .inputs.fi_target_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.rack_target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - bootstrap_python_requirements: 'true'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.direct_claim_targets_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - deployment_json: '{{ .inputs.deployment_json }}'
        - organization: '{{ .grains.prepare_intersight_context.outputs.org_name }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  claim_assist_dependent_targets_to_intersight:
    kind: ansible
    depends-on: claim_direct_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/claim-devices-to-intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
        - FI_TARGET_PASSWORD: '{{ .inputs.fi_target_password }}'
        - RACK_TARGET_PASSWORD: '{{ .inputs.rack_target_password }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - bootstrap_python_requirements: 'true'
        - claim_targets_json: '{{ .grains.split_claim_target_phases.outputs.assist_dependent_claim_targets_json }}'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - deployment_json: '{{ .inputs.deployment_json }}'
        - organization: '{{ .grains.prepare_intersight_context.outputs.org_name }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  merge_claim_phase_results:
    kind: ansible
    depends-on: claim_assist_dependent_targets_to_intersight
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/merge-claim-phase-results/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - assist_results_json: '{{ .grains.claim_assist_targets_to_intersight.outputs.results_json }}'
        - direct_results_json: '{{ .grains.claim_direct_targets_to_intersight.outputs.results_json }}'
        - assist_dependent_results_json: '{{ .grains.claim_assist_dependent_targets_to_intersight.outputs.results_json }}'
      outputs:
        - batch_status
        - successful_targets
        - failed_targets
        - conflict_targets
        - skipped_targets
        - changed_targets
        - results_json
        - normalized_claim_results_json
        - normalized_claim_batch_status
        - normalized_claim_successful_count
        - normalized_claim_failed_count
        - normalized_claim_conflict_count
        - normalized_claim_skipped_count
        - normalized_claim_changed_count

  validate_infrastructure_onboarding:
    kind: ansible
    depends-on: merge_claim_phase_results
    spec:
      source:
        store: intersight-fullstack-repo
        path: ansible/validate-infrastructure-onboarding/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - INTERSIGHT_API_KEY_ID: '{{ .inputs.intersight_api_key_id }}'
        - INTERSIGHT_API_PRIVATE_KEY: '{{ .inputs.intersight_api_private_key }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - bootstrap_python_requirements: 'true'
        - platform_yaml: |
            platform:
              intersight:
                endpoint: {{ .inputs.api_uri }}
                validate_certs: false
                credentials:
                  api_key_id_ref: env://INTERSIGHT_API_KEY_ID
                  api_private_key_ref: env://INTERSIGHT_API_PRIVATE_KEY
        - inventory_yaml: '{{ .inputs.inventory_json }}'
        - claim_execution_results_json: '{{ .grains.merge_claim_phase_results.outputs.results_json }}'
        - wait_for_completion: '{{ .inputs.wait_for_completion }}'
        - validation_poll_interval: '{{ .inputs.validation_poll_interval }}'
        - validation_timeout_seconds: '{{ .inputs.validation_timeout_seconds }}'
      outputs:
        - phase_ready
        - phase_status
        - phase_readiness_json
    on-destroy:
      - source:
          store: intersight-fullstack-repo
          path: ansible/validate-infrastructure-onboarding/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local

outputs:
  phase_ready:
    value: '{{ .grains.validate_infrastructure_onboarding.outputs.phase_ready }}'
  phase_status:
    value: '{{ .grains.validate_infrastructure_onboarding.outputs.phase_status }}'
  phase_readiness_json:
    value: '{{ .grains.validate_infrastructure_onboarding.outputs.phase_readiness_json }}'
  claim_candidate_targets_json:
    value: '{{ .grains.build_infrastructure_onboarding_targets.outputs.claim_targets_json }}'
  onboarding_action_execution_json:
    value: '{{ .grains.merge_claim_phase_results.outputs.normalized_claim_results_json }}'
  claim_execution_results_json:
    value: '{{ .grains.merge_claim_phase_results.outputs.results_json }}'
